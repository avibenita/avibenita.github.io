# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Ensure .nojekyll exists
        run: |
          if [ ! -f .nojekyll ]; then
            touch .nojekyll
            echo "Created .nojekyll file"
          else
            echo ".nojekyll file already exists"
          fi
      - name: Sync power UI into analytics embed (Pages serves /statistico-analytics reliably)
        run: |
          mkdir -p statistico-analytics/embed
          cp -f statistico-calculators/power-sample-size-calculator/index-calculator.html statistico-analytics/embed/
          cp -f statistico-calculators/power-sample-size-calculator/index-formulas.html statistico-analytics/embed/
          ls -la statistico-analytics/embed
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
