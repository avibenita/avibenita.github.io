# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ensure .nojekyll exists
        run: |
          if [ ! -f .nojekyll ]; then
            touch .nojekyll
            echo "Created .nojekyll file"
          else
            echo ".nojekyll file already exists"
          fi

      # Mirror power UI into analytics/embed for GitHub Pages: statistico.live currently 404s deep paths under
      # statistico-calculators/ even though sources live in git; embed sits next to ANOVA and deploys reliably.
      - name: Sync power UI into statistico-analytics/embed
        run: |
          mkdir -p statistico-analytics/embed
          cp -f statistico-calculators/power-sample-size-calculator/PowerCalculator.html statistico-analytics/embed/
          cp -f statistico-calculators/power-sample-size-calculator/index-formulas.html statistico-analytics/embed/
          test -f statistico-analytics/embed/PowerCalculator.html
          ls -la statistico-analytics/embed

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy on transient Pages failure
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4

      - name: Fail if both deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
