<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-labelledby="title desc">
  <title id="title">Statistico taskpane animated preview</title>
  <desc id="desc">Animated preview showing the Office taskpane as the main hub and calculators as secondary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a2b"/>
      <stop offset="100%" stop-color="#081322"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10243a"/>
      <stop offset="100%" stop-color="#0c1c30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1bcf79"/>
      <stop offset="100%" stop-color="#34f58f"/>
    </linearGradient>
    <style>
      .label { fill: #ecf4ff; font: 700 14px 'Segoe UI', Arial, sans-serif; }
      .small { fill: #b8cbe3; font: 500 11px 'Segoe UI', Arial, sans-serif; }
      .tag { fill: #d8fbe8; font: 700 10px 'Segoe UI', Arial, sans-serif; }
      .muted { fill: #8ea5c2; font: 500 10px 'Segoe UI', Arial, sans-serif; }

      .pulse {
        transform-origin: center;
        animation: pulseGlow 2.4s ease-in-out infinite;
      }

      .hub-emphasis {
        animation: hubBorder 2.4s ease-in-out infinite;
      }

      .cards {
        animation: cardsShift 4.8s ease-in-out infinite;
      }

      .calc-tag {
        animation: calcTag 4.8s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%, 100% { opacity: .75; }
        50% { opacity: 1; }
      }

      @keyframes hubBorder {
        0%, 100% { stroke: #35d488; stroke-width: 2; }
        50% { stroke: #7af4bd; stroke-width: 3; }
      }

      @keyframes cardsShift {
        0%, 25% { transform: translateY(0); }
        45%, 70% { transform: translateY(-34px); }
        100% { transform: translateY(0); }
      }

      @keyframes calcTag {
        0%, 35% { opacity: .4; }
        45%, 70% { opacity: 1; }
        100% { opacity: .4; }
      }
    </style>
  </defs>

  <rect width="360" height="640" rx="24" fill="url(#bg)"/>
  <rect x="22" y="18" width="316" height="604" rx="24" fill="url(#panel)" stroke="#18304a"/>

  <rect x="40" y="38" width="280" height="92" rx="16" fill="#0f6d4c" class="pulse"/>
  <rect x="44" y="42" width="272" height="84" rx="14" fill="#0d5e42"/>
  <text x="62" y="72" class="label" font-size="20">Interactive Analytics</text>
  <text x="62" y="93" class="small">Main Office.js entry to all apps</text>
  <text x="62" y="110" class="small">Analytics, Calculators, Applications</text>

  <rect x="40" y="146" width="280" height="44" rx="14" fill="#20364f"/>
  <rect x="45" y="151" width="95" height="34" rx="11" fill="url(#accent)"/>
  <text x="76" y="172" text-anchor="middle" class="tag">Analytics</text>
  <rect x="145" y="151" width="92" height="34" rx="11" fill="#2b4663"/>
  <text x="191" y="172" text-anchor="middle" class="small">Calculators</text>
  <rect x="242" y="151" width="73" height="34" rx="11" fill="#2b4663"/>
  <text x="278" y="172" text-anchor="middle" class="small">Apps</text>

  <rect x="40" y="202" width="280" height="72" rx="12" fill="#1b2f46" stroke="#274564"/>
  <text x="56" y="225" class="small" font-size="12">CURRENT DATA</text>
  <text x="56" y="247" class="small">Sheet1!A1:R301</text>
  <rect x="236" y="232" width="70" height="24" rx="10" fill="#214766"/>
  <text x="271" y="248" text-anchor="middle" class="small">Default</text>

  <g class="cards" transform="translate(0,0)">
    <rect x="40" y="292" width="280" height="88" rx="14" fill="#17314a" class="hub-emphasis"/>
    <rect x="46" y="300" width="4" height="72" rx="2" fill="url(#accent)"/>
    <text x="62" y="326" class="label">Explore data</text>
    <text x="62" y="346" class="muted">Univariate and correlation from hub</text>
    <rect x="62" y="354" width="74" height="20" rx="9" fill="#214766"/>
    <text x="99" y="368" text-anchor="middle" class="small">Univariate</text>
    <rect x="142" y="354" width="76" height="20" rx="9" fill="#214766"/>
    <text x="180" y="368" text-anchor="middle" class="small">Correlation</text>

    <rect x="40" y="392" width="280" height="88" rx="14" fill="#152d43" stroke="#21415d"/>
    <rect x="46" y="400" width="4" height="72" rx="2" fill="#35d488"/>
    <text x="62" y="426" class="label">Analyze groups</text>
    <text x="62" y="446" class="muted">ANOVA and mixed models</text>
    <rect x="62" y="454" width="58" height="20" rx="9" fill="#214766"/>
    <text x="91" y="468" text-anchor="middle" class="small">ANOVA</text>
    <rect x="126" y="454" width="52" height="20" rx="9" fill="#214766"/>
    <text x="152" y="468" text-anchor="middle" class="small">Mixed</text>

    <rect x="40" y="492" width="280" height="88" rx="14" fill="#15293d" stroke="#1d3a54"/>
    <rect x="46" y="500" width="4" height="72" rx="2" fill="#35d488"/>
    <text x="62" y="526" class="label">Compare means</text>
    <text x="62" y="546" class="muted">Independent and repeated means</text>
    <rect x="62" y="554" width="108" height="20" rx="9" fill="#214766"/>
    <text x="116" y="568" text-anchor="middle" class="small">Independent</text>
    <rect x="176" y="554" width="94" height="20" rx="9" fill="#214766"/>
    <text x="223" y="568" text-anchor="middle" class="small">Repeated</text>
  </g>

  <g class="calc-tag">
    <rect x="104" y="602" width="152" height="24" rx="10" fill="#1f3f5a" stroke="#2f5e81"/>
    <text x="180" y="618" text-anchor="middle" class="small">Standalone calculators: secondary</text>
  </g>
</svg>
