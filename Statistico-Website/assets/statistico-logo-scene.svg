<svg viewBox="0 0 750 206" width="750" height="206" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Statistico Interactive">
  <defs>
    <linearGradient id="slBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4ac9"/>
      <stop offset="55%" stop-color="#133a9f"/>
      <stop offset="100%" stop-color="#0d2f86"/>
    </linearGradient>
    <linearGradient id="slCurve" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f6ff"/>
      <stop offset="55%" stop-color="#4fdcf2"/>
      <stop offset="100%" stop-color="#1fb9dd"/>
    </linearGradient>
    <linearGradient id="slScene" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#081c4e"/>
      <stop offset="60%" stop-color="#123a7e"/>
      <stop offset="100%" stop-color="#174a86"/>
    </linearGradient>
    <radialGradient id="slSunset" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb36b" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ff8f4d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff8f4d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slBanner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2356e2"/>
      <stop offset="100%" stop-color="#1a46c4"/>
    </linearGradient>
    <clipPath id="slCurveClip">
      <path d="M18 196 C60 196 70 18 115 18 C160 18 170 196 212 196 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="750" height="206" rx="8" fill="url(#slBg)"/>

  <!-- Scene inside the bell curve -->
  <g clip-path="url(#slCurveClip)">
    <rect x="0" y="0" width="240" height="206" fill="url(#slScene)"/>
    <!-- sunset glow behind the desk -->
    <circle cx="176" cy="142" r="72" fill="url(#slSunset)"/>
    <!-- distant skyline -->
    <g fill="#0b2a5e" opacity="0.85">
      <rect x="148" y="116" width="10" height="82"/>
      <rect x="162" y="102" width="12" height="96"/>
      <rect x="178" y="124" width="9" height="74"/>
      <rect x="191" y="110" width="12" height="88"/>
      <rect x="207" y="128" width="9" height="70"/>
    </g>
    <g fill="#ffd9a8" opacity="0.55">
      <rect x="165" y="112" width="2.4" height="3"/>
      <rect x="170" y="122" width="2.4" height="3"/>
      <rect x="165" y="134" width="2.4" height="3"/>
      <rect x="194" y="120" width="2.4" height="3"/>
      <rect x="198" y="132" width="2.4" height="3"/>
    </g>
    <!-- floor -->
    <rect x="0" y="168" width="240" height="38" fill="#0a1c46" opacity="0.9"/>

    <!-- chair -->
    <rect x="56" y="100" width="9" height="42" rx="4.5" fill="#101f3a"/>
    <rect x="58" y="136" width="34" height="7" rx="3.5" fill="#101f3a"/>
    <rect x="72" y="142" width="6" height="26" fill="#101f3a"/>
    <rect x="60" y="166" width="30" height="4" rx="2" fill="#101f3a"/>

    <!-- analyst -->
    <path d="M84 142 L112 148 L110 168" stroke="#2c3d5c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M76 142 Q76 104 98 100 Q116 98 120 118 L122 130 L106 134 Q102 120 96 122 Q90 126 90 142 Z" fill="#5f7ea8"/>
    <path d="M112 112 L142 128" stroke="#5f7ea8" stroke-width="9" stroke-linecap="round"/>
    <circle cx="144" cy="129" r="4" fill="#d8a07c"/>
    <circle cx="106" cy="87" r="5.5" fill="#d8a07c"/>
    <circle cx="97" cy="84" r="13" fill="#1c222c"/>

    <!-- desk -->
    <path d="M116 138 L204 146 L204 152 L116 144 Z" fill="#0e2246"/>
    <rect x="122" y="144" width="5" height="26" fill="#0e2246"/>
    <rect x="190" y="150" width="5" height="20" fill="#0e2246"/>

    <!-- laptop -->
    <ellipse cx="150" cy="114" rx="27" ry="20" fill="#4fdcf2" opacity="0.12"/>
    <path d="M134 96 L170 102 L167 134 L131 130 Z" fill="#08183a" stroke="#4fdcf2" stroke-width="1.6" stroke-linejoin="round"/>
    <polyline points="138,123 146,112 152,118 161,105" fill="none" stroke="#4fdcf2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M128 134 L174 139 L170 145 L124 140 Z" fill="#0c1e40"/>
  </g>

  <!-- bell curve stroke -->
  <path d="M18 196 C60 196 70 18 115 18 C160 18 170 196 212 196"
        fill="none" stroke="url(#slCurve)" stroke-width="13" stroke-linecap="round"/>

  <!-- STATISTICO banner -->
  <rect x="242" y="36" width="500" height="62" fill="url(#slBanner)"/>
  <text x="492" y="81" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="44" font-weight="800" letter-spacing="12" fill="#00060f" opacity="0.4" dx="2" dy="2">STATISTICO</text>
  <text x="492" y="81" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="44" font-weight="800" letter-spacing="12" fill="#ffffff">STATISTICO</text>

  <!-- INTERACTIVE row (no knob) -->
  <line x1="258" y1="155" x2="332" y2="155" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.92"/>
  <text x="492" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="27" font-weight="800" letter-spacing="9" fill="#ffffff" opacity="0.96">INTERACTIVE</text>
  <line x1="652" y1="155" x2="726" y2="155" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.92"/>
</svg>
