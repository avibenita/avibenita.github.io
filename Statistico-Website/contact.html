<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Statistico™ Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --surface-0: var(--site-surface-0, #071220);
      --surface-1: var(--site-surface-1, #141f31);
      --surface-2: var(--site-surface-2, #1b2739);
      --border: var(--site-border, rgba(255,255,255,.11));
      --accent-1: rgb(255,165,120);
      --accent-2: rgb(120,200,255);
      --text-1: var(--site-text-primary, #f4f8ff);
      --text-2: var(--site-text-secondary, rgba(228,236,248,.88));
      --text-muted: var(--site-text-muted, rgba(201,212,228,.66));
      --shadow-xl: var(--site-shadow-xl, 0 18px 40px rgba(0,0,0,.34));
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-1);
      background:
        radial-gradient(circle at 18% -4%, rgba(242,162,119,.09), transparent 22%),
        radial-gradient(circle at 82% 38%, rgba(120,200,255,.07), transparent 24%),
        linear-gradient(180deg, var(--surface-0), var(--surface-0));
      overflow-x: hidden;
    }

    a { color: var(--accent-1); text-decoration: none; }
    a:hover { filter: brightness(1.08); }
    .container { max-width: 920px; margin: 0 auto; padding: 0 24px; }

    .contact-hero {
      position: relative;
      overflow: hidden;
      padding: 78px 0 62px;
      text-align: center;
      background:
        radial-gradient(ellipse at 16% 0%, rgba(255,165,120,.24), transparent 36%),
        radial-gradient(ellipse at 84% 95%, rgba(120,200,255,.2), transparent 38%),
        linear-gradient(180deg, #040c1a 0%, #071422 60%, #0b1c2e 100%);
    }

    .contact-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(255,165,120,.2) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,165,120,.2) 1px, transparent 1px),
        linear-gradient(to right, rgba(120,200,255,.28) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(120,200,255,.28) 1px, transparent 1px);
      background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px;
      opacity: .6;
    }

    .contact-hero-inner {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 700;
      color: rgba(120,200,255,.95);
      margin-bottom: 14px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid rgba(120,200,255,.35);
      background: rgba(9,19,33,.52);
    }

    .contact-hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 4.8vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -.02em;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .contact-hero p {
      margin: 0 auto;
      max-width: 700px;
      font-size: clamp(.98rem, 1.35vw, 1.08rem);
      line-height: 1.7;
      color: rgba(230,240,255,.88);
    }

    main { padding: 44px 0 74px; }

    .contact-card {
      background: linear-gradient(160deg, var(--surface-1), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow-xl);
    }

    .contact-card h2 {
      margin: 0 0 10px;
      color: rgba(255,232,212,.98);
      font-size: clamp(1.3rem, 2.2vw, 1.65rem);
      letter-spacing: .01em;
    }

    .contact-card p {
      margin: 0 0 16px;
      color: var(--text-2);
      line-height: 1.72;
      font-size: .96rem;
    }

    .email-box {
      margin-top: 8px;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,165,120,.22);
      background: linear-gradient(135deg, rgba(255,165,120,.08), rgba(120,200,255,.06));
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      word-break: break-all;
    }

    .email-box i { color: var(--accent-1); }

    @media (max-width: 700px) {
      .contact-card { padding: 22px 16px; }
      .email-box {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <header class="contact-hero">
    <div class="contact-hero-inner container">
      <div class="kicker"><i class="fa-solid fa-envelope"></i> Contact</div>
      <h1>Get in touch</h1>
      <p>
        For inquiries about Statistico™, partnerships, or product information,
        contact us directly by email.
      </p>
    </div>
  </header>

  <main>
    <div class="container">
      <article class="contact-card">
        <h2>Contact Email</h2>
        <p>
          We typically respond via email and can follow up with additional details based on your request.
        </p>
        <a class="email-box" href="mailto:avi@metrics-institute.net">
          <i class="fa-solid fa-at"></i>
          avi@metrics-institute.net
        </a>
      </article>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="assets/js/nav-template.js?v=2026-05-06-logo-breathe"></script>
</body>
</html>
