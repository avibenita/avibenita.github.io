<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correlation Matrix Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0c1624; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

<iframe
  id="cm-frame"
  src="https://statistico.live/statistico-analytics/dialogs/views/correlations/correlation-matrix.html"
  allowfullscreen
  title="Statistico Correlation Matrix – Live Demo">
</iframe>

<script>
(function () {
  /* ── Seeded PRNG (LCG) for reproducible demo data ── */
  var _s = 1337;
  function rng() { _s = (_s * 1664525 + 1013904223) >>> 0; return _s / 4294967296; }
  function randn() {
    var u = rng() || 1e-9, v = rng() || 1e-9;
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

  /* ── Demo dataset ──────────────────────────────────────────
     7 fitness / physiological variables, n = 80.
     Driven by 3 latent factors so correlations are realistic:
       size    → Height ↑  Weight ↑  BMI slight ↑
       fitness → Weight ↓  RestHR ↓  VO₂max ↑
       aging   → Age ↑     RestHR ↑  VO₂max ↓  Systolic ↑
  ─────────────────────────────────────────────────────────── */
  var headers = ['Height', 'Weight', 'Age', 'RestHR', 'VO2max', 'BMI', 'Systolic'];
  var rows = [];

  for (var i = 0; i < 80; i++) {
    var size    = randn();
    var fitness = randn();
    var aging   = randn();

    var height   = clamp(Math.round((170 + 10 * size  + 2  * randn()) * 10) / 10, 148, 205);
    var weight   = clamp(Math.round((72  + 11 * size  - 4  * fitness + 3 * aging + 3 * randn()) * 10) / 10, 45, 130);
    var age      = clamp(Math.round( 38  + 10 * aging + 5  * randn()), 18, 72);
    var bmi      = clamp(Math.round((weight / Math.pow(height / 100, 2) + 0.4 * randn()) * 10) / 10, 16, 42);
    var resthr   = clamp(Math.round( 68  - 8  * fitness + 4 * aging + 5 * randn()), 44, 98);
    var vo2max   = clamp(Math.round((46  - 7  * aging  + 9 * fitness - size * 1.5 + 4 * randn()) * 10) / 10, 18, 74);
    var systolic = clamp(Math.round( 118 + 7  * aging  + 3 * bmi * 0.4 - 4 * fitness + 5 * randn()), 88, 178);

    rows.push({
      Height: height, Weight: weight, Age: age,
      RestHR: resthr, VO2max: vo2max, BMI: bmi, Systolic: systolic
    });
  }

  /* ── Inject data into iframe once it has loaded ── */
  var frame = document.getElementById('cm-frame');

  function sendData() {
    try {
      frame.contentWindow.postMessage(
        { type: 'CORRELATION_DATA', payload: { headers: headers, data: rows } },
        '*'
      );
    } catch (e) {}
  }

  frame.addEventListener('load', function () {
    /* First attempt shortly after load; retry in case the view's
       postMessage listener registers slightly later. */
    setTimeout(sendData, 350);
    setTimeout(sendData, 1400);
  });

  /* Fallback for slow connections / cached loads */
  setTimeout(sendData, 3500);
})();
</script>

</body>
</html>
