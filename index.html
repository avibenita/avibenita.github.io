<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistico™ Interactive Suite</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2026-05-06-readable-s" />
  <meta name="description" content="Statistico™ Interactive Suite - Statistical computing reimagined." />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #071220;
      color: #f4f8ff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .loading {
      min-height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .loading p {
      margin: 0;
      opacity: 0.86;
      font-size: 0.98rem;
    }
    .loading a {
      color: rgb(255,165,120);
      text-decoration: none;
      border-bottom: 1px dashed rgba(255,165,120,0.55);
    }
  </style>
</head>
<body>
  <div class="loading">
    <p>
      Loading Statistico...<br/>
      If this takes too long, open
      <a href="/Statistico-Website/index.html">the direct homepage</a>.
    </p>
  </div>

  <script>
    (async function loadRootHomepage() {
      try {
        const res = await fetch("/Statistico-Website/index.html", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load homepage source");
        let html = await res.text();

        // Force relative paths to resolve from /Statistico-Website while keeping URL at root.
        html = html.replace(/<head([^>]*)>/i, '<head$1><base href="/Statistico-Website/">');

        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        console.error("Root homepage loader error:", err);
      }
    })();
  </script>
</body>
</html>
