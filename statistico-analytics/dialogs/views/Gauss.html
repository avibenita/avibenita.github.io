<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Statistico Bell Curve Icon Lab</title>
<style>
  :root {
    --ink: #0f172a;
    --accent: #22c55e;
    --fill: rgba(34, 197, 94, 0.14);
    --bg: #f8fafc;
    --card: #ffffff;
    --muted: #64748b;
    --border: #e2e8f0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 32px;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
    align-items: start;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    padding: 24px;
  }

  h1 {
    font-size: 24px;
    margin: 0 0 8px;
  }

  p {
    color: var(--muted);
    margin: 0 0 24px;
  }

  .preview {
    display: grid;
    place-items: center;
    min-height: 420px;
  }

  svg {
    width: 100%;
    max-width: 520px;
    height: auto;
    overflow: visible;
  }

  .controls {
    display: grid;
    gap: 16px;
  }

  label {
    font-size: 13px;
    font-weight: 700;
    color: #334155;
    display: grid;
    gap: 6px;
  }

  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font: inherit;
  }

  input[type="color"] {
    height: 44px;
    padding: 4px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.45;
    margin-top: 16px;
  }

  textarea {
    width: 100%;
    height: 240px;
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 14px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 12px;
    resize: vertical;
  }

  button {
    border: 0;
    border-radius: 14px;
    padding: 12px 16px;
    background: var(--ink);
    color: white;
    font-weight: 800;
    cursor: pointer;
  }

  @media (max-width: 900px) {
    .wrap { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>Statistico Bell Curve Icon Lab</h1>
      <p>Base SVG icon for building normal-curve variations: μ, σ, shaded tails, process capability, and hypothesis regions.</p>

      <div class="preview">
        <svg id="icon" viewBox="0 0 256 176" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bell curve icon">
          <defs>
            <clipPath id="tailClipRight">
              <rect id="rightClipRect" x="162" y="0" width="72" height="140" />
            </clipPath>
            <clipPath id="tailClipLeft">
              <rect id="leftClipRect" x="22" y="0" width="72" height="140" />
            </clipPath>
            <linearGradient id="softFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.28" />
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.04" />
            </linearGradient>
          </defs>

          <!-- Optional filled curve -->
          <path id="curveFill" d="M28 128 C68 128 84 40 128 40 C172 40 188 128 228 128 L28 128 Z" fill="url(#softFill)" opacity="0" />

          <!-- Optional tail fills -->
          <path id="rightTail" d="M28 128 C68 128 84 40 128 40 C172 40 188 128 228 128 L228 128 L28 128 Z" fill="url(#softFill)" clip-path="url(#tailClipRight)" opacity="0" />
          <path id="leftTail" d="M28 128 C68 128 84 40 128 40 C172 40 188 128 228 128 L228 128 L28 128 Z" fill="url(#softFill)" clip-path="url(#tailClipLeft)" opacity="0" />

          <!-- Axis -->
          <path id="axis" d="M24 128 H232" stroke="var(--ink)" stroke-width="8" stroke-linecap="round" />

          <!-- Bell curve -->
          <path id="curve" d="M28 128 C68 128 84 40 128 40 C172 40 188 128 228 128" fill="none" stroke="var(--ink)" stroke-width="10" stroke-linecap="round" />

          <!-- Mean line -->
          <path id="meanLine" d="M128 42 V128" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" />
          <text id="muLabel" x="128" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="var(--ink)">μ</text>

          <!-- Optional sigma ticks -->
          <g id="sigmaTicks" opacity="0">
            <path d="M84 120 V136" stroke="var(--ink)" stroke-width="5" stroke-linecap="round" />
            <path d="M172 120 V136" stroke="var(--ink)" stroke-width="5" stroke-linecap="round" />
            <text x="84" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="var(--muted)">−σ</text>
            <text x="172" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="var(--muted)">+σ</text>
          </g>

          <!-- Optional process capability lines -->
          <g id="specLines" opacity="0">
            <path d="M64 48 V128" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 8" />
            <path d="M192 48 V128" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 8" />
            <text x="64" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="var(--accent)">LSL</text>
            <text x="192" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="var(--accent)">USL</text>
          </g>
        </svg>
      </div>
    </section>

    <aside class="panel controls">
      <div class="row">
        <label>Ink color
          <input id="ink" type="color" value="#0f172a" />
        </label>
        <label>Accent color
          <input id="accent" type="color" value="#22c55e" />
        </label>
      </div>

      <div class="row">
        <label>Curve width
          <input id="curveWidth" type="number" value="10" min="2" max="20" />
        </label>
        <label>Axis width
          <input id="axisWidth" type="number" value="8" min="1" max="18" />
        </label>
      </div>

      <label>Variation
        <select id="variation">
          <option value="base">Base μ icon</option>
          <option value="fill">Soft filled curve</option>
          <option value="right">Right-tail probability</option>
          <option value="left">Left-tail probability</option>
          <option value="two">Two-tail probability</option>
          <option value="sigma">μ ± σ</option>
          <option value="capability">Process capability</option>
        </select>
      </label>

      <label>μ label
        <input id="labelText" value="μ" />
      </label>

      <button id="copyBtn">Copy SVG code</button>
      <textarea id="svgCode" spellcheck="false"></textarea>

      <div class="note">
        Tip: for a small ribbon icon, use the base or right-tail version. For module cards, process capability and sigma versions can include labels.
      </div>
    </aside>
  </div>

<script>
  const root = document.documentElement;
  const icon = document.getElementById('icon');
  const curve = document.getElementById('curve');
  const axis = document.getElementById('axis');
  const meanLine = document.getElementById('meanLine');
  const muLabel = document.getElementById('muLabel');
  const curveFill = document.getElementById('curveFill');
  const rightTail = document.getElementById('rightTail');
  const leftTail = document.getElementById('leftTail');
  const sigmaTicks = document.getElementById('sigmaTicks');
  const specLines = document.getElementById('specLines');
  const svgCode = document.getElementById('svgCode');

  const controls = {
    ink: document.getElementById('ink'),
    accent: document.getElementById('accent'),
    curveWidth: document.getElementById('curveWidth'),
    axisWidth: document.getElementById('axisWidth'),
    variation: document.getElementById('variation'),
    labelText: document.getElementById('labelText')
  };

  function setOpacity(el, value) {
    el.setAttribute('opacity', value);
  }

  function update() {
    root.style.setProperty('--ink', controls.ink.value);
    root.style.setProperty('--accent', controls.accent.value);
    curve.setAttribute('stroke-width', controls.curveWidth.value);
    axis.setAttribute('stroke-width', controls.axisWidth.value);
    meanLine.setAttribute('stroke', controls.accent.value);
    muLabel.textContent = controls.labelText.value;

    setOpacity(curveFill, 0);
    setOpacity(rightTail, 0);
    setOpacity(leftTail, 0);
    setOpacity(sigmaTicks, 0);
    setOpacity(specLines, 0);

    const v = controls.variation.value;
    if (v === 'fill') setOpacity(curveFill, 1);
    if (v === 'right') setOpacity(rightTail, 1);
    if (v === 'left') setOpacity(leftTail, 1);
    if (v === 'two') {
      setOpacity(rightTail, 1);
      setOpacity(leftTail, 1);
    }
    if (v === 'sigma') setOpacity(sigmaTicks, 1);
    if (v === 'capability') setOpacity(specLines, 1);

    svgCode.value = cleanSvg(icon.outerHTML);
  }

  function cleanSvg(svg) {
    return svg
      .replace(/\s*role="img"/g, '')
      .replace(/\s*aria-label="[^"]*"/g, '')
      .replace(/<svg id="icon"/, '<svg')
      .replace(/var\(--ink\)/g, controls.ink.value)
      .replace(/var\(--accent\)/g, controls.accent.value)
      .replace(/var\(--muted\)/g, '#64748b');
  }

  Object.values(controls).forEach(control => control.addEventListener('input', update));

  document.getElementById('copyBtn').addEventListener('click', async () => {
    await navigator.clipboard.writeText(svgCode.value);
    document.getElementById('copyBtn').textContent = 'Copied';
    setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy SVG code', 1200);
  });

  update();
</script>
</body>
</html>
