<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ANOVA Builder</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../shared-config.css?v=20260316"/>
  <script src="../shared-config.js?v=20260316"></script>
  <script src="../ds-guide.js?v=20260330e"></script>
  <style>
    /* ── Dependent Variable — elevated hierarchy ───────────── */
    .dv-wrap {
      background: var(--cfg-input-bg);
      border: 1.5px solid var(--cfg-run-from);
      border-left: 4px solid var(--cfg-run-from);
      border-radius: 9px;
      padding: 10px 12px 12px;
      margin-bottom: 4px;
      box-shadow: 0 2px 8px rgba(249,115,22,.10);
    }
    .dv-label-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
    }
    .dv-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(249,115,22,.15);
      color: var(--cfg-run-from);
      font-size: 11px;
      flex-shrink: 0;
    }
    .dv-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--cfg-run-from);
      letter-spacing: .01em;
      flex: 1;
    }
    .dv-role-tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--cfg-run-from);
      background: rgba(249,115,22,.12);
      border: 1px solid rgba(249,115,22,.28);
      border-radius: 20px;
      padding: 1px 8px;
      opacity: .9;
    }
    .dv-select {
      border-color: rgba(249,115,22,.35) !important;
    }
    .dv-select:focus {
      border-color: var(--cfg-run-from) !important;
      box-shadow: 0 0 0 3px rgba(249,115,22,.15) !important;
    }

    /* ── Grouping factors divider ───────────────────────────── */
    .factors-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 0 12px;
    }
    .factors-divider-line {
      flex: 1;
      height: 1px;
      background: var(--cfg-border);
    }
    .factors-divider-text {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--cfg-text2);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .factors-divider-text i { font-size: 9px; }
  </style>
</head>
<body>
<div class="cfg-shell">

  <!-- Header -->
  <header class="cfg-header">
    <div class="cfg-header-icon"><i class="fa-solid fa-table-cells"></i></div>
    <span class="cfg-header-title">ANOVA Builder</span>
    <span class="cfg-meta-badge" id="metaBadge">—</span>
    <button class="cfg-theme-toggle" id="cfgThemeToggle" title="Switch theme">
      <span class="cfg-toggle-icon">&#x1F319;</span>
      <div class="cfg-toggle-track"><div class="cfg-toggle-thumb"></div></div>
      <span class="cfg-toggle-label">Dark</span>
    </button>
  </header>

  <!-- Spinner -->
  <div id="loadingSpinner" class="cfg-spinner">
    <i class="fa-solid fa-spinner fa-spin"></i> Loading data…
  </div>

  <!-- Main content -->
  <div id="mainContent" style="display:none;flex:1;flex-direction:column;min-height:0;">
    <div class="cfg-body">

      <!-- Range info -->
      <div class="cfg-panel">
        <div class="cfg-panel-body">
          <div class="cfg-range-strip">
            <div class="cfg-range-item">Range: <strong id="rangeAddr">—</strong></div>
            <div class="cfg-range-item">Rows: <strong id="rowCount">0</strong></div>
            <div class="cfg-range-item">Columns: <strong id="colCount">0</strong></div>
          </div>
        </div>
      </div>

      <!-- Analysis Type -->
      <div class="cfg-panel">
        <div class="cfg-panel-head"><i class="fa-solid fa-diagram-project"></i> Analysis Type</div>
        <div class="cfg-panel-body">
          <div class="cfg-radio-group" id="typeGroup">
            <div class="cfg-radio-option">
              <input type="radio" name="anovaType" id="typeOneWay" value="one-way" checked/>
              <label for="typeOneWay" class="cfg-radio-label">
                <span class="radio-icon"><i class="fa-solid fa-layer-group"></i></span>
                <span class="radio-text">One-Way</span>
              </label>
            </div>
            <div class="cfg-radio-option">
              <input type="radio" name="anovaType" id="typeTwoWay" value="two-way"/>
              <label for="typeTwoWay" class="cfg-radio-label">
                <span class="radio-icon"><i class="fa-solid fa-table-cells-large"></i></span>
                <span class="radio-text">Two-Way</span>
              </label>
            </div>
            <div class="cfg-radio-option" style="display:none;">
              <input type="radio" name="anovaType" id="typeRM" value="repeated"/>
              <label for="typeRM" class="cfg-radio-label">
                <span class="radio-icon"><i class="fa-solid fa-repeat"></i></span>
                <span class="radio-text">Repeated</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Data Structure Guide -->
      <div id="dsGuideContainer"></div>

      <!-- Variable Selection – One-Way / Two-Way -->
      <div class="cfg-panel" id="panelVars">
        <div class="cfg-panel-head"><i class="fa-solid fa-list-check"></i> Variables</div>
        <div class="cfg-panel-body">

          <!-- Dependent Variable — primary/outcome role -->
          <div class="dv-wrap">
            <div class="dv-label-row">
              <span class="dv-badge"><i class="fa-solid fa-arrow-down-to-bracket"></i></span>
              <label class="dv-label" for="selectDV">Dependent Variable</label>
              <span class="dv-role-tag">outcome</span>
            </div>
            <select id="selectDV" class="cfg-select dv-select"></select>
          </div>

          <div class="factors-divider">
            <span class="factors-divider-line"></span>
            <span class="factors-divider-text"><i class="fa-solid fa-sitemap"></i> Grouping Factors</span>
            <span class="factors-divider-line"></span>
          </div>

          <label class="cfg-label" for="selectFactor1">Group A (grouping column)</label>
          <select id="selectFactor1" class="cfg-select"></select>

          <div id="factor2Wrap" style="display:none;">
            <label class="cfg-label" style="margin-top:10px;" for="selectFactor2">Group B (grouping column)</label>
            <select id="selectFactor2" class="cfg-select"></select>
          </div>

          <!-- hidden checkboxes – always on, kept for collectSpec() compat -->
          <input type="checkbox" id="chkDescriptives" checked style="display:none;"/>
          <input type="checkbox" id="chkAssumptions"  checked style="display:none;"/>
          <input type="checkbox" id="chkNonParam"     checked style="display:none;"/>

        </div>
      </div>

      <!-- Variable Selection – Repeated Measures -->
      <div class="cfg-panel" id="panelRM" style="display:none;">
        <div class="cfg-panel-head"><i class="fa-solid fa-repeat"></i> Conditions (columns)</div>
        <div class="cfg-panel-body">
          <p class="cfg-hint">Select 2 or more columns — each column = one condition measured on the same subjects.</p>
          <div id="conditionCheckList" style="margin-top:8px;max-height:200px;overflow-y:auto;"></div>

        </div><!-- /.cfg-panel-body (panelRM) -->
      </div><!-- /.cfg-panel (panelRM) -->

    </div><!-- /.cfg-body -->

    <!-- Footer -->
    <div class="cfg-footer">
      <button class="cfg-btn cancel" id="btnCancel" onclick="sendClose()">
        <i class="fa-solid fa-times"></i> Cancel
      </button>
      <button class="cfg-btn load-prev" id="btnLoadPrev" onclick="showSavedList()" style="gap:6px;" disabled title="Load a previously saved configuration">
        <i class="fa-solid fa-clock-rotate-left"></i> Load previous…
      </button>
      <button class="cfg-btn save-config" id="btnSaveConfig" onclick="saveModelSpec()" style="gap:6px;" disabled title="Save current configuration">
        <i class="fa-solid fa-floppy-disk"></i> Save configuration
      </button>
      <button class="cfg-btn run" id="runBtn" onclick="runAnalysis()" disabled>
        <i class="fa-solid fa-play"></i> Run ANOVA
      </button>
    </div>
  </div><!-- /#mainContent -->

</div><!-- /.cfg-shell -->

<script>
  /* ── State ────────────────────────────────────────────── */
  let _headers = [];
  let _rows    = [];
  let _saved   = null;

  const STORAGE_KEY = 'anova-config';

  /* ── Message bridge ───────────────────────────────────── */
  function sendClose() {
    Office.context.ui.messageParent(JSON.stringify({ action: 'close' }));
  }

  Office.onReady(() => {
    Office.context.ui.addHandlerAsync(
      Office.EventType.DialogParentMessageReceived,
      (arg) => {
        try {
          const msg = JSON.parse(arg.message || '{}');
          if (msg.type === 'ANOVA_DATA') {
            const p = msg.payload || {};
            _headers = p.headers || [];
            _rows    = p.rows    || [];
            _saved   = p.savedModelSpec || null;
            initUI();
          }
        } catch(e) {}
      }
    );
    Office.context.ui.messageParent(JSON.stringify({ action: 'ready' }));
  });

  /* ── Build UI once data arrives ───────────────────────── */
  function initUI() {
    document.getElementById('loadingSpinner').style.display = 'none';
    const mc = document.getElementById('mainContent');
    mc.style.display = 'flex';

    document.getElementById('rowCount').textContent = _rows.length;
    document.getElementById('colCount').textContent = _headers.length;
    document.getElementById('rangeAddr').textContent = '(workbook)';
    document.getElementById('metaBadge').textContent = `${_rows.length} rows`;

    populateColumnSelects();
    buildConditionCheckList();

    /* Radio change */
    document.querySelectorAll('input[name="anovaType"]').forEach(r => {
      r.addEventListener('change', onTypeChange);
    });
    onTypeChange();

    if (_saved) applySpec(_saved);

    /* Enable footer buttons */
    document.getElementById('runBtn').disabled = false;
    document.getElementById('btnSaveConfig').disabled = false;
    const hasSaved = typeof CfgSave !== 'undefined' && CfgSave.getSavedList(STORAGE_KEY).length > 0;
    document.getElementById('btnLoadPrev').disabled = !hasSaved;
  }

  function populateColumnSelects() {
    ['selectDV', 'selectFactor1', 'selectFactor2'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = _headers.map((h) => `<option value="${h}">${h}</option>`).join('');
    });
    if (_headers.length >= 2) {
      document.getElementById('selectFactor1').selectedIndex = 1;
    }
    if (_headers.length >= 3) {
      document.getElementById('selectFactor2').selectedIndex = 2;
    }
  }

  function buildConditionCheckList() {
    const div = document.getElementById('conditionCheckList');
    div.innerHTML = _headers.map((h, i) => `
      <label style="display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;cursor:pointer;">
        <input type="checkbox" class="cfg-checkbox cond-check" value="${h}" ${i > 0 && i < 4 ? 'checked' : ''}/> ${h}
      </label>`).join('');
  }

  function onTypeChange() {
    const type = document.querySelector('input[name="anovaType"]:checked')?.value || 'one-way';
    document.getElementById('panelVars').style.display   = (type === 'repeated') ? 'none'  : '';
    document.getElementById('panelRM').style.display     = (type === 'repeated') ? ''      : 'none';
    document.getElementById('factor2Wrap').style.display = (type === 'two-way')  ? ''      : 'none';
    if (typeof DsGuide !== 'undefined') DsGuide.renderAnova(type, 'dsGuideContainer');
  }

  function applySpec(spec) {
    if (!spec) return;
    if (spec.type) {
      const r = document.getElementById(
        spec.type === 'one-way' ? 'typeOneWay' : spec.type === 'two-way' ? 'typeTwoWay' : 'typeRM');
      if (r) { r.checked = true; onTypeChange(); }
    }
    if (spec.dv)      setSelect('selectDV',      spec.dv);
    if (spec.factor1) setSelect('selectFactor1', spec.factor1);
    if (spec.factor2) setSelect('selectFactor2', spec.factor2);
    if (spec.conditions) {
      document.querySelectorAll('.cond-check').forEach(cb => {
        cb.checked = spec.conditions.includes(cb.value);
      });
    }
  }

  function setSelect(id, val) {
    const sel = document.getElementById(id);
    if (!sel) return;
    for (const o of sel.options) if (o.value === val) { o.selected = true; return; }
  }

  /* ── Save / Load (shared-config.js CfgSave) ──────────── */
  function saveModelSpec() {
    const spec = collectSpec();
    const defaultName = (spec.dv || 'DV') + ' ~ ' + (spec.factor1 || 'Factor');
    CfgSave.showPrompt('Save configuration', 'Configuration name', defaultName, function(name) {
      CfgSave.saveCfgEntry(STORAGE_KEY, name, spec, function() {
        const hasSaved = CfgSave.getSavedList(STORAGE_KEY).length > 0;
        document.getElementById('btnLoadPrev').disabled = !hasSaved;
      });
    });
  }

  function showSavedList() {
    CfgSave.showSavedList(STORAGE_KEY, function(item) {
      const s = item.spec || {};
      return (s.dv ? 'DV: ' + s.dv : '') + (s.factor1 ? '  ×  ' + s.factor1 : '');
    }, function(item) {
      applySpec(item.spec || {});
    });
  }

  function collectSpec() {
    const type = document.querySelector('input[name="anovaType"]:checked')?.value || 'one-way';
    return {
      type,
      dv:      document.getElementById('selectDV')?.value,
      factor1: document.getElementById('selectFactor1')?.value,
      factor2: document.getElementById('selectFactor2')?.value,
      conditions: [...document.querySelectorAll('.cond-check:checked')].map(cb => cb.value),
      posthocMethod: 'tukey',
      alpha: 0.05,
      includeDescriptives: true,
      includeAssumptions:  true,
      includeNonParam:     true,
    };
  }

  function runAnalysis() {
    const spec = collectSpec();
    Office.context.ui.messageParent(JSON.stringify({ action: 'anovaModel', data: spec }));
  }

  document.addEventListener('DOMContentLoaded', function() {
    DsGuide.renderAnova('one-way', 'dsGuideContainer');
  });
</script>
</body>
</html>
