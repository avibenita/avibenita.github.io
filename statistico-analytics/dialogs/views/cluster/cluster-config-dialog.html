<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cluster module configuration</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 12px;
      color: #1e293b;
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .top {
      padding: 12px 14px;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }
    .body { flex: 1; overflow: auto; padding: 12px 14px; min-height: 0; }
    .help { color: #64748b; margin: 0 0 10px 0; line-height: 1.45; font-size: 11.5px; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 10.5px;
      line-height: 1.45;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      max-height: min(420px, calc(100vh - 200px));
      overflow: auto;
      font-family: Consolas, 'Segoe UI Mono', monospace;
    }
    .foot {
      padding: 10px 14px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
      background: #fff;
      flex-shrink: 0;
    }
    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .primary { background: #0d9488; color: #fff; }
    .primary:hover { filter: brightness(1.05); }
    .ghost { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; }
    .ghost:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="top" id="dlgTitle">Module configuration</div>
  <div class="body">
    <p class="help" id="dlgHelp">
      Effective settings: built-in defaults merged with <strong>cluster.module.json</strong>, plus the current run options (<strong>runtimeSpec</strong>) and range address. Edit the JSON in your deployment to change defaults; adjust controls in the task pane, then continue.
    </p>
    <pre id="cfgPre">Loading…</pre>
  </div>
  <div class="foot">
    <button type="button" class="ghost" id="btnClose">Close</button>
    <button type="button" class="primary" id="btnContinue" style="display:none;">Continue to dashboard</button>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search || "");
      var showContinue = params.get("continue") === "1";
      var btnContinue = document.getElementById("btnContinue");
      if (showContinue && btnContinue) btnContinue.style.display = "";

      function sendToParent(obj) {
        try {
          Office.context.ui.messageParent(JSON.stringify(obj));
        } catch (e) {
          console.error(e);
        }
      }

      Office.onReady(function() {
        Office.context.ui.addHandlerAsync(Office.EventType.DialogParentMessageReceived, function(arg) {
          try {
            var m = JSON.parse(arg.message || "{}");
            if (m.action === "clusterConfigPayload" && m.payload != null) {
              var pre = document.getElementById("cfgPre");
              if (pre) pre.textContent = JSON.stringify(m.payload, null, 2);
            }
          } catch (err) {
            console.error(err);
          }
        });

        sendToParent({ action: "requestClusterConfig" });

        document.getElementById("btnClose").onclick = function() {
          sendToParent({ action: "clusterConfigClose" });
        };
        if (btnContinue) {
          btnContinue.onclick = function() {
            sendToParent({ action: "clusterConfigContinue" });
          };
        }
      });
    })();
  </script>
</body>
</html>
