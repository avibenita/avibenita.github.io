<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clustering setup</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    :root { --clr: #0d9488; --clr-dark: #0f766e; --clr-light: #f0fdfa; --clr-border: #99f6e4; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f3f4f6;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .top {
      padding: 11px 14px;
      background: linear-gradient(135deg, var(--clr), var(--clr-dark));
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top i { opacity: 0.95; }
    .body { flex: 1; overflow: auto; padding: 12px 14px; min-height: 0; }
    .summary {
      font-size: 11.5px;
      color: #6b7280;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .blurb {
      font-size: 11.5px;
      color: #6b7280;
      margin-bottom: 12px;
      line-height: 1.45;
    }
    .setup-section {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .setup-section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px;
      background: var(--clr-light);
      border-bottom: 1px solid var(--clr-border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: var(--clr-dark);
    }
    .setup-section-body { padding: 10px 12px 12px; }
    .method-choice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 4px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      color: #374151;
    }
    .method-choice input { margin-top: 3px; accent-color: var(--clr); }
    .method-hint {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.45;
      margin: 6px 0 0;
      padding: 8px 10px;
      background: #f9fafb;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    .var-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .var-actions button {
      background: none;
      border: none;
      color: var(--clr);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 2px 4px;
      font-family: inherit;
    }
    .var-actions button:hover { text-decoration: underline; }
    .var-list-scroll {
      max-height: 220px;
      overflow-y: auto;
      padding: 4px 6px 10px;
    }
    .var-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }
    .var-row:hover { background: #f9fafb; }
    .var-row input { margin-top: 2px; flex-shrink: 0; accent-color: var(--clr); width: 15px; height: 15px; }
    .var-row span { line-height: 1.35; word-break: break-word; }
    .vars-empty, .vars-error {
      font-size: 11.5px;
      padding: 10px 10px 12px;
      color: #6b7280;
      line-height: 1.45;
    }
    .vars-error { display: none; color: #b45309; background: #fffbeb; border-top: 1px solid #fde68a; }
    .opt-grid { display: grid; gap: 10px; }
    .opt-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .opt-row label.field { font-size: 12px; font-weight: 600; color: #374151; }
    .opt-row input[type="number"] {
      width: 72px; padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px;
    }
    .opt-row select {
      flex: 1; min-width: 140px; padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 12px; background: #fff;
    }
    .opt-row input[type="checkbox"] { accent-color: var(--clr); width: 16px; height: 16px; }
    .foot {
      padding: 10px 14px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      background: #fff;
      flex-shrink: 0;
    }
    button.foot-btn {
      padding: 9px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button.foot-btn.primary {
      background: linear-gradient(135deg, var(--clr), var(--clr-dark));
      color: #fff;
      box-shadow: 0 2px 8px rgba(13,148,136,.28);
    }
    button.foot-btn.primary:hover:not(:disabled) { filter: brightness(1.05); }
    button.foot-btn.primary:disabled { opacity: 0.45; cursor: not-allowed; filter: none; box-shadow: none; }
    button.foot-btn.ghost {
      background: #f9fafb;
      color: #4b5563;
      border: 1px solid #e5e7eb;
    }
    button.foot-btn.ghost:hover { background: #f3f4f6; }
  </style>
</head>
<body>
  <div class="top" id="dlgTopTitle"><i class="fa-solid fa-sliders"></i><span id="dlgTitleText">Clustering setup</span></div>
  <div class="body">
    <div class="summary" id="dlgSummary"></div>
    <p class="blurb" id="clusterOptionsBlurb"></p>

    <div class="setup-section" id="variablesPanel">
      <div class="setup-section-head">
        <span id="labelVariablesSection">Variables</span>
        <div class="var-actions">
          <button type="button" id="btnSelectAllVars" style="display:none;">Select all</button>
          <button type="button" id="btnClearVars" style="display:none;">Clear</button>
        </div>
      </div>
      <div class="var-list-scroll" id="varListScroll"></div>
      <div class="vars-empty" id="varsEmpty" style="display:none;"></div>
      <div class="vars-error" id="varsError"></div>
    </div>

    <div class="setup-section" id="methodSection">
      <div class="setup-section-head"><span id="methodSectionTitle">Method</span></div>
      <div class="setup-section-body">
        <label class="method-choice">
          <input type="radio" name="clusterMethod" value="kmeans" id="radKmeans" checked/>
          <span id="lblMethodKmeans">K-means</span>
        </label>
        <label class="method-choice">
          <input type="radio" name="clusterMethod" value="hierarchical" id="radHierarchical"/>
          <span id="lblMethodHierarchical">Hierarchical</span>
        </label>
        <p class="method-hint" id="methodGuidance"></p>
      </div>
    </div>

    <div class="setup-section" id="parametersSection">
      <div class="setup-section-head"><span id="parametersSectionTitle">Parameters</span></div>
      <div class="setup-section-body">
        <div class="opt-grid">
          <div class="opt-row" id="rowK">
            <label class="field" id="labelClusterK" for="clusterK">Number of clusters (<em>k</em>)</label>
            <input type="number" id="clusterK" min="2" max="50" value="3"/>
          </div>
          <div class="opt-row" id="rowLinkage" style="display:none;">
            <label class="field" id="labelClusterLinkage" for="clusterLinkage">Linkage method</label>
            <select id="clusterLinkage" aria-labelledby="labelClusterLinkage"></select>
          </div>
          <div class="opt-row" id="rowDistance">
            <label class="field" id="labelClusterDistance" for="clusterDistance">Distance measure</label>
            <select id="clusterDistance" aria-labelledby="labelClusterDistance"></select>
          </div>
          <div class="opt-row" id="rowStd">
            <input type="checkbox" id="clusterStandardize" checked aria-labelledby="labelClusterStandardize"/>
            <label id="labelClusterStandardize" for="clusterStandardize" style="font-weight:500;font-size:12px;">Standardise variables (recommended)</label>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="foot">
    <button type="button" class="foot-btn ghost" id="btnSetupClose">Close</button>
    <button type="button" class="foot-btn primary" id="btnOpenDashboard">
      <i class="fa-solid fa-up-right-from-square"></i>
      <span>Open results</span>
    </button>
  </div>
  <script>
    (function() {
      var lastModuleConfig = null;
      var lastUi = {};

      function sendToParent(obj) {
        try {
          Office.context.ui.messageParent(JSON.stringify(obj));
        } catch (e) {
          console.error(e);
        }
      }

      function parseParentMessage(arg) {
        if (!arg || arg.message == null) return null;
        var m = arg.message;
        if (typeof m === "object") return m;
        try {
          return JSON.parse(String(m));
        } catch (e) {
          return null;
        }
      }

      function applyTheme(t) {
        if (!t) return;
        var r = document.documentElement;
        if (t.clr) r.style.setProperty("--clr", t.clr);
        if (t.clrDark) r.style.setProperty("--clr-dark", t.clrDark);
        if (t.clrLight) r.style.setProperty("--clr-light", t.clrLight);
        if (t.clrBorder) r.style.setProperty("--clr-border", t.clrBorder);
      }

      function setVarsError(msg) {
        var el = document.getElementById("varsError");
        if (!el) return;
        if (msg) {
          el.textContent = msg;
          el.style.display = "block";
        } else {
          el.textContent = "";
          el.style.display = "none";
        }
      }

      function getUi() {
        return (lastModuleConfig && lastModuleConfig.ui) || {};
      }

      function updateMethodUi() {
        var ui = getUi();
        var hier = document.getElementById("radHierarchical");
        var isHi = hier && hier.checked;
        var rowL = document.getElementById("rowLinkage");
        var lblK = document.getElementById("labelClusterK");
        var g = document.getElementById("methodGuidance");
        if (rowL) rowL.style.display = isHi ? "" : "none";
        if (lblK) {
          if (isHi && ui.labelKTreeCut) lblK.innerHTML = ui.labelKTreeCut;
          else if (!isHi && ui.labelKCentroids) lblK.innerHTML = ui.labelKCentroids;
          else if (ui.labelK) lblK.innerHTML = ui.labelK;
        }
        if (g) {
          g.innerHTML = isHi ? (ui.methodHelpHierarchical || "") : (ui.methodHelpKmeans || "");
        }
      }

      function wireMethodRadios() {
        document.querySelectorAll('input[name="clusterMethod"]').forEach(function(r) {
          if (r._wiredMethod) return;
          r._wiredMethod = true;
          r.addEventListener("change", function() {
            setVarsError("");
            updateMethodUi();
          });
        });
      }

      function renderVariableCandidates(payload) {
        var ui = (payload.moduleConfig && payload.moduleConfig.ui) || {};
        lastUi = ui;
        var candidates = payload.variableCandidates || [];
        var scroll = document.getElementById("varListScroll");
        var empty = document.getElementById("varsEmpty");
        var panel = document.getElementById("variablesPanel");
        var selAll = document.getElementById("btnSelectAllVars");
        var clr = document.getElementById("btnClearVars");
        var runBtn = document.getElementById("btnOpenDashboard");

        if (ui.variablesSectionTitle) {
          var h = document.getElementById("labelVariablesSection");
          if (h) h.textContent = ui.variablesSectionTitle;
        }
        if (ui.selectAllVariables && selAll) selAll.textContent = ui.selectAllVariables;
        if (ui.clearVariablesSelection && clr) clr.textContent = ui.clearVariablesSelection;
        if (selAll) selAll.style.display = candidates.length ? "inline" : "none";
        if (clr) clr.style.display = candidates.length ? "inline" : "none";

        if (!scroll) return;
        scroll.innerHTML = "";

        if (candidates.length === 0) {
          if (empty) {
            empty.textContent = ui.variablesEmptyHint || "No numeric columns detected.";
            empty.style.display = "block";
          }
          if (panel) panel.style.opacity = "0.92";
          if (runBtn) runBtn.disabled = true;
          setVarsError("");
          return;
        }

        if (empty) empty.style.display = "none";
        if (panel) panel.style.opacity = "1";

        var saved = payload.savedSpec || {};
        var savedSet = null;
        if (saved && Array.isArray(saved.selectedVariableIndices) && saved.selectedVariableIndices.length > 0) {
          savedSet = {};
          saved.selectedVariableIndices.forEach(function(x) {
            savedSet[Number(x)] = true;
          });
        }

        candidates.forEach(function(c) {
          var row = document.createElement("label");
          row.className = "var-row";
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.className = "var-cb";
          cb.setAttribute("data-col-index", String(c.index));
          var on = savedSet === null ? true : !!savedSet[c.index];
          cb.checked = on;
          var sp = document.createElement("span");
          sp.textContent = c.label;
          row.appendChild(cb);
          row.appendChild(sp);
          scroll.appendChild(row);
        });

        if (runBtn) runBtn.disabled = false;
        setVarsError("");
      }

      function wireVariableActions() {
        var selAll = document.getElementById("btnSelectAllVars");
        var clr = document.getElementById("btnClearVars");
        if (selAll && !selAll._wired) {
          selAll._wired = true;
          selAll.onclick = function() {
            setVarsError("");
            document.querySelectorAll(".var-cb").forEach(function(cb) { cb.checked = true; });
          };
        }
        if (clr && !clr._wired) {
          clr._wired = true;
          clr.onclick = function() {
            setVarsError("");
            document.querySelectorAll(".var-cb").forEach(function(cb) { cb.checked = false; });
          };
        }
      }

      function fillDistanceSelect(cfg, saved) {
        var sel = document.getElementById("clusterDistance");
        if (!sel) return;
        var opts = (cfg && cfg.distanceOptions) || [
          { value: "euclidean", label: "Euclidean (L2)" },
          { value: "manhattan", label: "Manhattan (L1)" }
        ];
        sel.innerHTML = "";
        opts.forEach(function(opt) {
          var o = document.createElement("option");
          o.value = opt.value;
          o.textContent = opt.label || opt.value;
          sel.appendChild(o);
        });
        var an = (cfg && cfg.analysis) || {};
        var v = (saved && saved.distance) || an.distance || "euclidean";
        if (v === "manhattan") sel.value = "manhattan";
        else sel.value = "euclidean";
      }

      function applyPayload(payload) {
        if (!payload || !payload.moduleConfig) return;
        var cfg = payload.moduleConfig;
        lastModuleConfig = cfg;
        var ui = cfg.ui || {};
        var lim = cfg.limits || {};
        var def = cfg.defaults || {};
        applyTheme(cfg.theme);

        var titleEl = document.getElementById("dlgTitleText");
        if (titleEl && ui.clusterSetupTitle) titleEl.textContent = ui.clusterSetupTitle;

        var closeBtn = document.getElementById("btnSetupClose");
        if (closeBtn && ui.setupCloseButton) closeBtn.textContent = ui.setupCloseButton;

        var dashBtn = document.getElementById("btnOpenDashboard");
        if (dashBtn && ui.runButtonHtml) dashBtn.innerHTML = ui.runButtonHtml;

        var blurb = document.getElementById("clusterOptionsBlurb");
        if (blurb && ui.optionsBlurb) blurb.innerHTML = ui.optionsBlurb;

        if (ui.methodSectionTitle) {
          var ms = document.getElementById("methodSectionTitle");
          if (ms) ms.textContent = ui.methodSectionTitle;
        }
        if (ui.parametersSectionTitle) {
          var ps = document.getElementById("parametersSectionTitle");
          if (ps) ps.textContent = ui.parametersSectionTitle;
        }
        if (ui.methodKmeansLabel) {
          var lk = document.getElementById("lblMethodKmeans");
          if (lk) lk.textContent = ui.methodKmeansLabel;
        }
        if (ui.methodHierarchicalLabel) {
          var lh = document.getElementById("lblMethodHierarchical");
          if (lh) lh.textContent = ui.methodHierarchicalLabel;
        }

        if (ui.labelLinkageMethod) {
          var ll = document.getElementById("labelClusterLinkage");
          if (ll) ll.textContent = ui.labelLinkageMethod;
        }
        if (ui.labelDistanceMeasure) {
          var ld = document.getElementById("labelClusterDistance");
          if (ld) ld.textContent = ui.labelDistanceMeasure;
        }
        if (ui.labelStandardize) {
          var ls = document.getElementById("labelClusterStandardize");
          if (ls) ls.textContent = ui.labelStandardize;
        }

        var kEl = document.getElementById("clusterK");
        if (kEl) {
          if (lim.kMin != null) kEl.min = String(lim.kMin);
          if (lim.kMax != null) kEl.max = String(lim.kMax);
        }

        var linkSel = document.getElementById("clusterLinkage");
        if (linkSel && Array.isArray(cfg.linkageOptions) && cfg.linkageOptions.length) {
          linkSel.innerHTML = "";
          cfg.linkageOptions.forEach(function(opt) {
            var o = document.createElement("option");
            o.value = opt.value;
            o.textContent = opt.label || opt.value;
            linkSel.appendChild(o);
          });
        }

        var saved = payload.savedSpec || {};
        var k0 = parseInt(saved.k, 10);
        if (!isFinite(k0)) k0 = def.numClusters != null ? Number(def.numClusters) : 3;
        var kMin = lim.kMin != null ? Number(lim.kMin) : 2;
        var kMax = lim.kMax != null ? Number(lim.kMax) : 50;
        k0 = Math.max(kMin, Math.min(kMax, k0));
        if (kEl) kEl.value = String(k0);

        var stdEl = document.getElementById("clusterStandardize");
        if (stdEl) {
          if (saved.standardize === false) stdEl.checked = false;
          else if (saved.standardize === true) stdEl.checked = true;
          else stdEl.checked = def.standardize !== false;
        }

        var linkVal = saved.linkage || def.linkage || (cfg.linkageOptions[0] && cfg.linkageOptions[0].value);
        if (linkSel && linkVal) linkSel.value = linkVal;

        fillDistanceSelect(cfg, saved);

        var radK = document.getElementById("radKmeans");
        var radH = document.getElementById("radHierarchical");
        var meth = saved.clusterMethod || def.clusterMethod || "kmeans";
        if (String(meth).toLowerCase() === "hierarchical") {
          if (radH) radH.checked = true;
        } else {
          if (radK) radK.checked = true;
        }

        var sum = document.getElementById("dlgSummary");
        if (sum) {
          var addr = payload.rangeAddress || "—";
          var rows = payload.dataRows != null ? payload.dataRows : "—";
          var cols = payload.dataCols != null ? payload.dataCols : "—";
          sum.textContent = "Range: " + addr + "  ·  Rows: " + rows + "  ·  Columns: " + cols;
        }

        renderVariableCandidates(payload);
        wireVariableActions();
        wireMethodRadios();
        updateMethodUi();
      }

      function readSpecFromForm(cfg) {
        setVarsError("");
        var lim = (cfg && cfg.limits) || {};
        var def = (cfg && cfg.defaults) || {};
        var kMin = lim.kMin != null ? Number(lim.kMin) : 2;
        var kMax = lim.kMax != null ? Number(lim.kMax) : 50;
        var kEl = document.getElementById("clusterK");
        var k = parseInt(kEl && kEl.value, 10);
        if (!isFinite(k)) k = def.numClusters != null ? Number(def.numClusters) : 3;
        k = Math.max(kMin, Math.min(kMax, k));
        var stdEl = document.getElementById("clusterStandardize");
        var standardize = stdEl ? stdEl.checked : def.standardize !== false;
        var linkEl = document.getElementById("clusterLinkage");
        var linkage = (linkEl && linkEl.value) || def.linkage || "average";
        var distEl = document.getElementById("clusterDistance");
        var distance = (distEl && distEl.value) || "euclidean";
        if (distance !== "manhattan") distance = "euclidean";

        var radH = document.getElementById("radHierarchical");
        var clusterMethod = radH && radH.checked ? "hierarchical" : "kmeans";

        var selectedVariableIndices = [];
        document.querySelectorAll(".var-cb:checked").forEach(function(cb) {
          var i = parseInt(cb.getAttribute("data-col-index"), 10);
          if (isFinite(i)) selectedVariableIndices.push(i);
        });

        if (document.querySelectorAll(".var-cb").length > 0 && selectedVariableIndices.length === 0) {
          var msg = (lastUi && lastUi.noVariablesSelectedMessage) || "Select at least one variable to include.";
          setVarsError(msg);
          return null;
        }

        var spec = {
          k: k,
          standardize: standardize,
          linkage: linkage,
          clusterMethod: clusterMethod,
          distance: distance
        };
        if (selectedVariableIndices.length > 0) spec.selectedVariableIndices = selectedVariableIndices;
        return spec;
      }

      Office.onReady(function() {
        Office.context.ui.addHandlerAsync(Office.EventType.DialogParentMessageReceived, function(arg) {
          var m = parseParentMessage(arg);
          if (m && m.action === "clusterSetupInit" && m.payload) {
            applyPayload(m.payload);
          }
        });

        sendToParent({ action: "requestClusterSetup" });

        document.getElementById("btnSetupClose").onclick = function() {
          sendToParent({ action: "clusterSetupClose" });
        };

        document.getElementById("btnOpenDashboard").onclick = function() {
          var spec = readSpecFromForm(lastModuleConfig);
          if (!spec) return;
          sendToParent({ action: "clusterSetupRun", spec: spec });
        };

        wireVariableActions();
        wireMethodRadios();
      });
    })();
  </script>
</body>
</html>
