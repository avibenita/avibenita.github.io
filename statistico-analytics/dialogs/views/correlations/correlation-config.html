<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Correlation Analysis — Configuration</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../shared-config.css?v=20260309b"/>
  <script src="../shared-config.js?v=20260309b"></script>
</head>
<body>
  <div class="cfg-shell">

    <!-- Header -->
    <header class="cfg-header">
      <div class="cfg-header-icon"><i class="fa-solid fa-chart-scatter"></i></div>
      <span class="cfg-header-title">Correlation Analysis</span>
      <span class="cfg-meta-badge" id="rangeInfo">—</span>
      <button class="cfg-theme-toggle" id="cfgThemeToggle" title="Switch to light mode">
        <span class="cfg-toggle-icon">&#x1F319;</span>
        <div class="cfg-toggle-track"><div class="cfg-toggle-thumb"></div></div>
        <span class="cfg-toggle-label">Dark</span>
      </button>
    </header>

    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="cfg-body">

        <!-- Variables section -->
        <div class="cfg-panel">
          <div class="cfg-panel-head"><i class="fa-solid fa-table-columns"></i> Select Variables</div>
          <div class="cfg-panel-body">

            <div class="cfg-tbl-toolbar">
              <label>
                <input type="checkbox" id="selectAll" class="cfg-tbl" style="width:16px;height:16px;" checked onchange="toggleAll(this.checked)">
                <span>Select All</span>
              </label>
              <button class="cfg-btn-small" onclick="selectNumericOnly()">
                <i class="fa-solid fa-hashtag"></i> Numeric Only
              </button>
            </div>

            <div class="cfg-tbl-wrap">
              <div class="cfg-tbl-scroll">
                <table class="cfg-tbl">
                  <thead>
                    <tr>
                      <th class="center" style="width:44px;">Include</th>
                      <th>Variable</th>
                      <th class="center">n Numeric</th>
                      <th class="center">Avg</th>
                      <th class="center">Std</th>
                      <th class="center">n String</th>
                      <th class="center">n Missing</th>
                    </tr>
                  </thead>
                  <tbody id="variablesTableBody">
                    <tr>
                      <td colspan="7" style="text-align:center;color:var(--cfg-text3);padding:20px;">
                        Loading variables…
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div class="cfg-summary" id="selectionSummary">
              Selected: <strong>0</strong> variables
            </div>

          </div>
        </div>

      </div><!-- /cfg-body -->

      <!-- Footer -->
      <div class="cfg-footer">
        <button class="cfg-btn run" id="btnRun" onclick="runAnalysis()" disabled>
          <i class="fa-solid fa-play"></i> Run Correlation Analysis
        </button>
      </div>

    </div>
  </div><!-- /cfg-shell -->

  <script>
    var correlationData = null;
    var variableStats = {};

    Office.onReady(function() {
      var storedData = sessionStorage.getItem('correlationRawData');
      if (storedData) {
        try { correlationData = JSON.parse(storedData); processData(); } catch(e) {}
      }
      Office.context.ui.addHandlerAsync(
        Office.EventType.DialogParentMessageReceived,
        function(arg) {
          try {
            var message = JSON.parse(arg.message);
            if (message.type === 'CORRELATION_DATA' && message.payload) {
              correlationData = message.payload;
              processData();
            }
          } catch(e) {}
        }
      );
      Office.context.ui.messageParent(JSON.stringify({ action: 'ready' }));
    });

    function processData() {
      if (!correlationData || !correlationData.values) return;
      var values  = correlationData.values;
      var address = correlationData.address || 'Selection';
      document.getElementById('rangeInfo').textContent = address;

      var headers  = values[0];
      var dataRows = values.slice(1);

      variableStats = {};
      headers.forEach(function(header, colIdx) {
        var numeric=0, string=0, missing=0, numericValues=[];
        dataRows.forEach(function(row) {
          var value = row[colIdx];
          if (value===null||value===undefined||value==='') { missing++; return; }
          var num = (typeof value==='number' && !isNaN(value)) ? value : parseFloat(value);
          if (!isNaN(num)) { numeric++; numericValues.push(num); } else { string++; }
        });
        var avg=0,std=0;
        if (numericValues.length>0) {
          avg = numericValues.reduce(function(a,b){return a+b;},0)/numericValues.length;
          if (numericValues.length>1) {
            std = Math.sqrt(numericValues.reduce(function(a,v){return a+Math.pow(v-avg,2);},0)/numericValues.length);
          }
        }
        var isValid = numeric>=5 && std>0;
        variableStats[header] = { name:header, numeric:numeric, string:string, missing:missing, avg:avg, std:std, isValid:isValid, selected:isValid };
      });
      renderVariablesTable();
      updateSelectionSummary();
    }

    function renderVariablesTable() {
      var tbody = document.getElementById('variablesTableBody');
      tbody.innerHTML = '';
      for (var varName in variableStats) {
        if (!variableStats.hasOwnProperty(varName)) continue;
        var stats = variableStats[varName];
        var tr = document.createElement('tr');
        if (!stats.isValid) tr.style.opacity = '0.4';
        tr.innerHTML =
          '<td class="center"><input type="checkbox" class="checkbox var-checkbox" data-var="'+varName+'" '+
          (stats.selected?'checked':'')+' '+(stats.isValid?'':'disabled')+' onchange="updateSelectionSummary()" style="width:16px;height:16px;accent-color:var(--cfg-check-acc);cursor:pointer;"></td>'+
          '<td><strong>'+varName+'</strong></td>'+
          '<td class="center cfg-badge-num">'+stats.numeric+'</td>'+
          '<td class="center">'+(stats.avg?stats.avg.toFixed(2):'—')+'</td>'+
          '<td class="center">'+(stats.std?stats.std.toFixed(2):'0.00')+'</td>'+
          '<td class="center cfg-badge-str">'+stats.string+'</td>'+
          '<td class="center cfg-badge-mis">'+stats.missing+'</td>';
        tbody.appendChild(tr);
      }
    }

    function toggleAll(checked) {
      document.querySelectorAll('.var-checkbox').forEach(function(cb) {
        cb.checked = checked;
        variableStats[cb.dataset.var].selected = checked;
      });
      updateSelectionSummary();
    }

    function selectNumericOnly() {
      document.querySelectorAll('.var-checkbox').forEach(function(cb) {
        if (!cb.disabled) {
          var isValid = variableStats[cb.dataset.var].isValid;
          cb.checked = isValid;
          variableStats[cb.dataset.var].selected = isValid;
        }
      });
      updateSelectAllCheckbox();
      updateSelectionSummary();
    }

    function updateSelectAllCheckbox() {
      var all = Array.from(document.querySelectorAll('.var-checkbox')).every(function(cb){return cb.checked;});
      document.getElementById('selectAll').checked = all;
    }

    function updateSelectionSummary() {
      var selected = Array.from(document.querySelectorAll('.var-checkbox:checked')).length;
      document.getElementById('selectionSummary').innerHTML =
        'Selected: <strong>'+selected+'</strong> variables';
      document.getElementById('btnRun').disabled = selected < 2;
      updateSelectAllCheckbox();
    }

    function runAnalysis() {
      var selectedVars = [];
      document.querySelectorAll('.var-checkbox:checked').forEach(function(cb) {
        selectedVars.push(cb.dataset.var);
      });
      if (selectedVars.length < 2) { alert('Please select at least 2 variables.'); return; }
      Office.context.ui.messageParent(JSON.stringify({
        action: 'runAnalysis',
        data: { variables: selectedVars, method: 'pearson', viewType: 'matrix', data: correlationData }
      }));
    }
  </script>
</body>
</html>
