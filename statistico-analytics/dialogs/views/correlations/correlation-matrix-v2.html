<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correlation Matrix v2</title>
  <script>
    (function () {
      function fallbackToLegacy() {
        try {
          var legacyUrl = new URL(window.location.href);
          legacyUrl.pathname = legacyUrl.pathname.replace('/correlation-matrix-v2.html', '/correlation-matrix.html');
          if (!legacyUrl.searchParams.has('cb')) legacyUrl.searchParams.set('cb', Date.now().toString());
          window.location.replace(legacyUrl.toString());
        } catch (e) {
          window.location.replace('correlation-matrix.html');
        }
      }

      try {
        var u = new URL(window.location.href);
        ['_host_Info', '_hostInfo', 'telemetry', 'isDialog'].forEach(function (k) {
          if (u.searchParams.has(k)) u.searchParams.delete(k);
        });
        if (!u.searchParams.has('cb')) u.searchParams.set('cb', Date.now().toString());
        window.history.replaceState({}, document.title, u.pathname + (u.search ? u.search : '') + (u.hash || ''));
      } catch (e) {}

      fetch('correlation-matrix.html?cb=' + Date.now(), { cache: 'no-store' })
        .then(function (response) {
          if (!response.ok) throw new Error('Failed to load legacy matrix view');
          return response.text();
        })
        .then(function (html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function () {
          fallbackToLegacy();
        });
    })();
  </script>
</head>
<body></body>
</html>
