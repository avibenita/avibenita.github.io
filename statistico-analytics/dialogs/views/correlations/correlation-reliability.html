  <style>
    :root {
      --surface-0: #0c1624;
      --surface-1: #1a1f2e;
      --surface-2: #242938;
      --border: #2d3748;
      --accent-1: rgb(255,165,120);
      --accent-2: rgb(120,200,255);
      --text-primary: #fff;
      --text-secondary: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.5);
      --pass-color: #2ecc71;
      --fail-color: #e74c3c;
      --panel-radius: 10px;
      --panel-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
    }
    /* ── Light Theme ── */
    :root[data-theme="light"] {
      --surface-0: #eef0f4;
      --surface-1: #ffffff;
      --surface-2: #f3f4f6;
      --border: #cbd5e1;
      --accent-1: #2563eb;
      --accent-2: #1d4ed8;
      --text-primary: #111827;
      --text-secondary: #1f2937;
      --text-muted: #374151;
    }

    /* Light theme: override hardcoded dark-only values */
    :root[data-theme="light"] body { background: var(--surface-0); }
    :root[data-theme="light"] .panel,
    :root[data-theme="light"] .card,
    :root[data-theme="light"] .stat-panel { background: var(--surface-1); border-color: var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    :root[data-theme="light"] .panel-heading,
    :root[data-theme="light"] .card-header { background: var(--surface-2); color: var(--accent-1); }
    :root[data-theme="light"] table { background: var(--surface-1); }
    :root[data-theme="light"] thead th { background: linear-gradient(135deg, var(--surface-2), #dde3ef) !important; color: var(--text-primary) !important; border-color: var(--border) !important; }
    :root[data-theme="light"] tbody tr:nth-child(even) { background: rgba(0,0,0,0.03); }
    :root[data-theme="light"] tbody tr:hover { background: rgba(37,99,235,0.06); }
    :root[data-theme="light"] td, :root[data-theme="light"] th { border-color: var(--border); color: var(--text-primary); }
    :root[data-theme="light"] .results-container { background: var(--surface-0); }
    :root[data-theme="light"] .alpha-deleted-col { background: rgba(37,99,235,0.08); }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, var(--surface-0) 0%, #1a2332 100%);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 0;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .results-container {
      flex: 1;
      padding: 12px 16px;
      overflow: auto;
    }

    /* Inline PCA chart */
    #inline-scree-chart {
      width: 100%;
      height: 300px;
      min-height: 280px;
    }

    .pca-interpretation {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      border-left: 3px solid var(--accent-2);
    }

    .pca-info-row {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 700;
    }

    .panel-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 0 0 16px 0;
    }

    .panel {
      background-color: var(--surface-1);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      border: 2px solid var(--border);
      flex: 1 1 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-heading {
      background-color: rgba(0,0,0,0.3);
      color: var(--accent-1);
      font-weight: 600;
      padding: 12px 15px;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .panel-body {
      padding: 15px;
    }

    .normality-dashboard {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
    }

    .summary-stats {
      flex: 1;
      min-width: 250px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: clamp(18px, 2vw, 24px);
      font-weight: bold;
      color: var(--accent-1);
    }

    .stat-label {
      font-size: clamp(10px, 1vw, 12px);
      color: rgba(255, 255, 255, 0.7);
    }

    .info-balloon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      margin-left: 5px;
      border-radius: 50%;
      border: 1px solid rgba(120,200,255,0.55);
      background: rgba(120,200,255,0.12);
      color: var(--accent-2);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      cursor: help;
      vertical-align: middle;
    }

    .info-balloon::after {
      content: attr(data-info);
      position: absolute;
      left: 50%;
      top: calc(100% + 10px);
      transform: translateX(-50%);
      width: min(280px, 70vw);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(120,200,255,0.35);
      background: rgba(12,22,36,0.98);
      color: var(--text-primary);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
      text-align: left;
      white-space: normal;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 30;
    }

    .info-balloon:hover::after,
    .info-balloon:focus::after {
      opacity: 1;
      visibility: visible;
    }

    .gauge-container {
      flex: 1;
      min-width: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px;
      min-height: 142px;
      position: relative;
    }

    .gauge-title {
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }

    .gauge {
      width: 100%;
    }

    .gauge-legend {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: -2px;
      font-size: 11px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .gauge-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .gauge-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
    }

    .gauge-legend-swatch.low { background: #e74c3c; }
    .gauge-legend-swatch.mid { background: #f1c40f; }
    .gauge-legend-swatch.high { background: #2ecc71; }

    #item-stats {
      border-collapse: collapse;
      width: min(100%, 1180px);
      margin: 0 auto;
      position: relative;
      font-size: 13px;
    }

    #item-stats thead {
      position: sticky;
      top: 0;
      z-index: 1;
      background-color: rgba(255, 255, 255, 0.1);
    }

    #item-stats th, #item-stats td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px 10px;
      text-align: center;
    }

    #item-stats th {
      user-select: none;
    }

    #item-stats th button {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #item-stats th button::after {
      content: "sort";
      color: rgba(255,255,255,0.42);
      font-size: 10px;
    }

    #item-stats .th-help-row {
      display: flex;
      justify-content: center;
      margin-top: 5px;
      line-height: 1;
    }

    #item-stats th.sorted-asc button::after { content: "asc"; color: var(--accent-1); }
    #item-stats th.sorted-desc button::after { content: "desc"; color: var(--accent-1); }

    #item-stats.hide-descriptives .descriptive-col {
      display: none;
    }

    .alpha-deleted-col {
      background: rgba(255,165,120,0.10);
      color: var(--accent-1);
      font-weight: 800;
      box-shadow: inset 2px 0 0 rgba(255,165,120,0.45), inset -2px 0 0 rgba(255,165,120,0.45);
    }

    #item-stats th.alpha-deleted-col {
      background: linear-gradient(135deg, rgba(255,165,120,0.35), rgba(255,165,120,0.14));
      color: #fff;
    }

    .alpha-deleted-col.alpha-low {
      color: #ffb4a0;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }

    #item-stats tbody tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.05);
    }

    #item-stats tbody tr:hover {
      background-color: rgba(255, 165, 120, 0.1);
    }

    .table-scroll-wrapper {
      max-height: 300px;
      overflow-y: auto;
      position: relative;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .table-option {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    .table-option input {
      width: 15px;
      height: 15px;
      accent-color: var(--accent-1);
    }

    select {
      background-color: var(--surface-2) !important;
      color: var(--text-primary) !important;
      font-size: 14px;
      border-radius: 4px;
      padding: 5px 8px;
      min-width: 160px;
      border: 1px solid var(--border);
    }

    option {
      background-color: var(--surface-2);
      color: var(--text-primary);
      font-size: 14px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 20px;
    }

    .loading i {
      font-size: 48px;
      color: var(--accent-1);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 650px) {
      .summary-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .panel-row {
        margin: 10px 0;
      }
    }
  </style>

  <div class="container" id="mainContainer" style="display:none;">
    <div id="header-container"></div>

    <div class="results-container">
      <!-- Main Reliability Panel -->
      <div class="panel-row">
        <div class="panel">
          <div class="panel-heading">
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
              <span>Reliability Analysis</span>
              <label for="alpha-mode" style="font-size: 14px; font-weight: normal; display: flex; align-items: center; gap: 8px;">
                Mode:
                <span class="info-balloon" tabindex="0" data-info="Regular uses the raw item variances and covariances. Standardized first puts items on a common scale, which is useful when items use different units or ranges.">i</span>
                <select id="alpha-mode" style="font-size: 14px; padding: 4px 8px; min-width: 140px;">
                  <option value="raw">Regular</option>
                  <option value="standardized">Standardized</option>
                </select>
              </label>
            </div>
          </div>

          <div class="panel-body">
            <div class="normality-dashboard">
              <div class="top-row">
                <div class="summary-stats">
                  <div class="stat-item">
                    <div class="stat-value" id="alpha-value">-</div>
                    <div class="stat-label">Cronbach alpha</div>
                  </div>
                  <div class="stat-item">
                    <div class="stat-value" id="omega-value">-</div>
                    <div class="stat-label">
                      McDonald omega
                      <span class="info-balloon" tabindex="0" data-info="McDonald omega estimates internal consistency from the common factor structure. It is often useful when items have different loadings and can complement Cronbach alpha.">i</span>
                    </div>
                  </div>
                  <div class="stat-item">
                    <div class="stat-value" id="item-count">-</div>
                    <div class="stat-label">Items</div>
                  </div>
                  <div class="stat-item">
                    <div class="stat-value" id="subject-count">-</div>

                  </div>

                <div class="gauge-container">

                    <span class="gauge-legend-item"><span class="gauge-legend-swatch mid"></span> Review .70 deg.80</span>
                    <span class="gauge-legend-item"><span class="gauge-legend-swatch high"></span> Strong &ge; .80</span>

                      <th data-sort-key="item"><button type="button" onclick="sortReliabilityTable('item')">Item</button></th>
                      <th data-sort-key="mean" class="descriptive-col"><button type="button" onclick="sortReliabilityTable('mean')">Mean</button></th>
                      <th data-sort-key="sd" class="descriptive-col"><button type="button" onclick="sortReliabilityTable('sd')">SD</button></th>

  <script>
    let lastData = [], lastVarNames = [];
    let originalRawData = [];
    let pcaData = null;
    let reliabilityTableRows = [];
    let reliabilitySort = { key: null, direction: 'asc' };
    let reliabilityResultsForAI = null;

    // Office.js initialization
    Office.onReady(() => {
      console.log('Office.js ready for Reliability Analysis');

      // Load from sessionStorage (same-window tab navigation)
      const storedCorr = sessionStorage.getItem('correlationData');
      if (storedCorr) {
        try {
          const data = JSON.parse(storedCorr);
          originalRawData = data.data;
          const dataArrays = data.data.map(row => data.headers.map(h => row[h]));
          runReliabilityAnalysis(dataArrays, data.headers);
        } catch(e) { console.warn('Error reading correlationData from sessionStorage:', e); }
      }
      
      // Send ready message
      Office.context.ui.messageParent(JSON.stringify({ action: 'ready' }));
      
      // Listen for data from parent
      Office.context.ui.addHandlerAsync(
        Office.EventType.DialogParentMessageReceived,
        (arg) => {
          try {
            const message = JSON.parse(arg.message);
            console.log('Received message:', message.type);
            
            if (message.theme) { applyTheme(message.theme); return; }
            if (message.type === 'CORRELATION_DATA' && message.payload) {
              const data = message.payload;
              try { sessionStorage.setItem('correlationData', JSON.stringify(data)); } catch(e) {}
              console.log('Reliability data received:', data);
              
              // Store original data
              originalRawData = data.data;
              
              // Convert to array format and run analysis
              const dataArrays = data.data.map(row => 
                data.headers.map(header => row[header])
              );
              
              runReliabilityAnalysis(dataArrays, data.headers);
            }
          } catch (error) {
            console.error('Error parsing message:', error);
          }
        }
      );
      
      // Try localStorage as fallback
      setTimeout(() => {
        if (!storedCorr) checkLocalStorage();
      }, 500);
    });

    function checkLocalStorage() {
      const correlationData = localStorage.getItem('correlationResults');
      if (correlationData) {
        try {
          const data = JSON.parse(correlationData);
          console.log('Found correlation data in localStorage');
          
          originalRawData = data.data;
          
          const dataArrays = data.data.map(row => 
            data.headers.map(header => row[header])
          );
          
          runReliabilityAnalysis(dataArrays, data.headers);
        } catch (error) {
          console.error('Error loading from localStorage:', error);
        }
      }
    }

    function runReliabilityAnalysis(data, varnames) {
      console.log('Running reliability analysis...');
      console.log(`Data: ${data.length} rows x ${varnames.length} columns`);
      const isFiniteNumber = (value) => typeof value === 'number' && isFinite(value);
      
      // Remove rows with non-finite values (NaN/Infinity)
      const cleanedData = data.filter(row => row.every(isFiniteNumber));
      if (cleanedData.length !== data.length) {
        console.warn(`Removed ${data.length - cleanedData.length} rows with non-finite values`);
      }

      lastData = cleanedData;
      lastVarNames = varnames;

      if (!Array.isArray(cleanedData) || cleanedData.length === 0 || !Array.isArray(cleanedData[0])) {
        console.error('Invalid data structure');
        return;
      }

      const transpose = m => m[0].map((_, i) => m.map(row => row[i]));
      const mean = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
      const sd = arr => {
        const avg = mean(arr);
        return Math.sqrt(arr.reduce((sum, v) => sum + Math.pow(v - avg, 2), 0) / (arr.length - 1));
      };
      const pearson = (x, y) => {
        const avgX = mean(x), avgY = mean(y);
        const num = x.reduce((sum, xi, i) => sum + (xi - avgX) * (y[i] - avgY), 0);
        const den = Math.sqrt(x.reduce((sum, xi) => sum + Math.pow(xi - avgX, 2), 0) * y.reduce((sum, yi) => sum + Math.pow(yi - avgY, 2), 0));
        return den === 0 ? NaN : num / den;
      };

      const numItems = varnames.length;
      const numSubjects = cleanedData.length;
      
      // Identify zero-variance items
      const allItems = transpose(cleanedData);
      const zeroVarianceIndices = [];
      allItems.forEach((item, idx) => {
        const itemSD = sd(item);
        if (itemSD === 0 || isNaN(itemSD) || !isFinite(itemSD)) {
          zeroVarianceIndices.push(idx);
          console.warn(`Variable "${varnames[idx]}" has zero variance`);
        }
      });
      
      // Filter out zero-variance items
      const validIndices = allItems.map((_, idx) => idx).filter(idx => !zeroVarianceIndices.includes(idx));
      const filteredData = cleanedData.map(row => validIndices.map(idx => row[idx]));
      
      const alphaMode = document.getElementById("alpha-mode")?.value || "raw";
      const isStandardized = alphaMode === "standardized";
      
      const items = transpose(cleanedData);
      const itemMeans = [], itemSDs = [], itemTotalCorrs = [], alphaIfDeleted = [], nIfDeleted = [];
      
      if (isStandardized) {
        const standardizedItems = items.map(item => {
          const itemMean = mean(item);
          const itemSD = sd(item);
          if (!itemSD || !isFinite(itemSD)) {
            console.warn('Standardization skipped due to zero variance');
            return item.map(() => 0);
          }
          return item.map(val => (val - itemMean) / itemSD);
        });
        
        const standardizedData = cleanedData.map((_, rowIdx) => 
          standardizedItems.map(item => item[rowIdx])
        );
        
        const standardizedTotalScores = standardizedData.map(row => row.reduce((a, b) => a + b, 0));
        
        for (let i = 0; i < numItems; i++) {
          const standardizedItem = standardizedItems[i];
          const totalWithoutItem = standardizedTotalScores.map((total, j) => total - standardizedItem[j]);
          
          itemMeans.push(0);
          itemSDs.push(1);
          itemTotalCorrs.push(pearson(standardizedItem, totalWithoutItem));
          
          const reduced = standardizedItems.slice(0, i).concat(standardizedItems.slice(i + 1));
          const reducedMatrix = standardizedData.map((_, j) => reduced.map(col => col[j]));
          alphaIfDeleted.push(cronbachAlphaStandardized(reducedMatrix));
          nIfDeleted.push(reducedMatrix.length);
        }
      } else {
        const totalScores = cleanedData.map(row => row.reduce((a, b) => a + b, 0));
        
        for (let i = 0; i < numItems; i++) {
          const item = items[i];
          const totalWithoutItem = totalScores.map((total, j) => total - item[j]);
          itemMeans.push(mean(item));
          itemSDs.push(sd(item));
          itemTotalCorrs.push(pearson(item, totalWithoutItem));
          
          const reduced = items.slice(0, i).concat(items.slice(i + 1));
          const reducedMatrix = cleanedData.map((_, j) => reduced.map(col => col[j]));
          if (reducedMatrix.length >= 2 && reducedMatrix[0].length >= 2) {
            alphaIfDeleted.push(cronbachAlpha(reducedMatrix));
            nIfDeleted.push(reducedMatrix.length);
          } else {
            alphaIfDeleted.push(NaN);
            nIfDeleted.push(reducedMatrix.length);
          }
        }
      }

      // Calculate alpha
      const alpha = validIndices.length > 1
        ? (isStandardized 
            ? cronbachAlphaStandardized(filteredData)
            : cronbachAlpha(filteredData))
        : NaN;

      const omega = calculateOmegaFromPCA(cleanedData);
      reliabilityResultsForAI = {
        mode: isStandardized ? 'standardized' : 'regular',
        alpha,
        omega,
        validItems: validIndices.length,
        totalItems: numItems,
        subjects: numSubjects,
        zeroVarianceItems: zeroVarianceIndices.map(idx => varnames[idx])
      };
      
      document.getElementById("alpha-value").textContent = validIndices.length > 1 ? alpha.toFixed(3) : "N/A";
      document.getElementById("omega-value").textContent = omega.toFixed(3);
      document.getElementById("item-count").textContent = validIndices.length;
      document.getElementById("subject-count").textContent = numSubjects;

      reliabilityTableRows = [];
      for (let i = 0; i < numItems; i++) {
        const nValue = nIfDeleted[i];
        reliabilityTableRows.push({
          item: varnames[i],
          mean: itemMeans[i],
          sd: itemSDs[i],
          itemTotalCorr: itemTotalCorrs[i],
          alphaIfDeleted: alphaIfDeleted[i],
          nIfDeleted: nValue,
          nImproves: nValue > numSubjects
        });
      }
      renderReliabilityTable();

      storePCAData(cleanedData);
      renderGauge(alpha);
      // Render PCA scree chart inline after a frame so the container has dimensions
      requestAnimationFrame(() => renderInlineScreeChart());
      
      // Hide loading, show results
      document.getElementById('loadingMessage').style.display = 'none';
      document.getElementById('mainContainer').style.display = 'flex';
      
      // Initialize header
      const sampleSize = numSubjects;
      StatisticoHeader.init('reliability', 'Reliability Coefficients', sampleSize, 'correlations');
        StatisticoHeader.initSidebarPage(); StatisticoHeader.updateTitle('Reliability Coefficients');;
    }

    function renderReliabilityTable() {
      const tableBody = document.getElementById("stats-body");

      if (reliabilitySort.key) {
        rows.sort((a, b) => {
          const key = reliabilitySort.key;
          const aValue = a[key];
          const bValue = b[key];
          const direction = reliabilitySort.direction === 'asc' ? 1 : -1;

          if (typeof aValue === 'string' || typeof bValue === 'string') {
            return String(aValue).localeCompare(String(bValue)) * direction;
          }

          const aFinite = Number.isFinite(aValue);
          const bFinite = Number.isFinite(bValue);
          if (!aFinite && !bFinite) return 0;
          if (!aFinite) return 1;
          if (!bFinite) return -1;
          return (aValue - bValue) * direction;
        });
      }

      tableBody.innerHTML = rows.map(row => {
        const alphaClass = Number.isFinite(row.alphaIfDeleted) && row.alphaIfDeleted <= 0 ? ' alpha-low' : '';
        const nStyle = row.nImproves ? 'color: #2ecc71; font-weight: bold;' : '';
        return `<tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
          <td>${escapeHTML(row.item)}</td>
          <td class="descriptive-col">${formatStat(row.mean, 2)}</td>

          <td>${formatStat(row.itemTotalCorr, 2)}</td>
          <td class="alpha-deleted-col${alphaClass}" title="${getAlphaDeletedTitle(row.alphaIfDeleted)}">${formatStat(row.alphaIfDeleted, 3)}</td>

    function formatStat(value, digits) {
      return Number.isFinite(value) ? value.toFixed(digits) : 'N/A';
    }

    function getAlphaDeletedTitle(value) {
      if (!Number.isFinite(value)) return 'Alpha could not be calculated after deleting this item.';
      if (value <= 0) return 'Alpha if deleted is zero or negative; check item coding and dimensionality.';
      return 'Cronbach alpha recalculated after deleting this item.';
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, match => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[match]));
    }

    function cronbachAlpha(matrix) {
      if (!Array.isArray(matrix) || matrix.length < 2 || !Array.isArray(matrix[0]) || matrix[0].length < 2) {
        return NaN;
      }
      const k = matrix[0].length;
      const transpose = m => m[0].map((_, i) => m.map(row => row[i]));
      const variance = arr => {
        if (!Array.isArray(arr) || arr.length < 2) return NaN;
        const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
        return arr.reduce((sum, x) => sum + Math.pow(x - avg, 2), 0) / (arr.length - 1);
      };
      const items = transpose(matrix);
      const itemVars = items.map(variance);
      const totalScores = matrix.map(row => row.reduce((a, b) => a + b));
      const totalVar = variance(totalScores);
      if (!Number.isFinite(totalVar) || totalVar <= 0 || itemVars.some(v => !Number.isFinite(v))) {
        return NaN;
      }
      const alpha = (k / (k - 1)) * (1 - itemVars.reduce((a, b) => a + b) / totalVar);
      return Number.isFinite(alpha) ? alpha : NaN;
    }

    function cronbachAlphaStandardized(matrix) {
      if (!Array.isArray(matrix) || matrix.length < 2 || !Array.isArray(matrix[0]) || matrix[0].length < 2) {
        return NaN;
      }
      const k = matrix[0].length;
      const transpose = m => m[0].map((_, i) => m.map(row => row[i]));
      const correlation = (x, y) => {
        const mx = x.reduce((a, b) => a + b) / x.length;
        const my = y.reduce((a, b) => a + b) / y.length;
        const cov = x.map((xi, i) => (xi - mx) * (y[i] - my)).reduce((a, b) => a + b, 0);
        const sx = Math.sqrt(x.map(xi => (xi - mx) ** 2).reduce((a, b) => a + b, 0));
        const sy = Math.sqrt(y.map(yi => (yi - my) ** 2).reduce((a, b) => a + b, 0));
        const r = cov / (sx * sy);
        return Number.isFinite(r) ? r : NaN;
      };
      const items = transpose(matrix);
      let rSum = 0, count = 0;
      for (let i = 0; i < k; i++) {
        for (let j = i + 1; j < k; j++) {
          const r = correlation(items[i], items[j]);
          if (Number.isFinite(r)) {
            rSum += r;
            count++;
          }
        }
      }
      if (count === 0) return NaN;
      const rBar = rSum / count;
      const alpha = (k * rBar) / (1 + (k - 1) * rBar);
      return Number.isFinite(alpha) ? alpha : NaN;
    }

    function getEigenvaluesFromCov(cov) {
      try {
        const eig = numeric.eig(cov);
        return eig.lambda.x;
      } catch (error) {
        console.warn('numeric.eig failed, falling back to SVD:', error);
        const svd = numeric.svd(cov);
        if (!svd || !svd.S) {
          throw error;
        }
        return svd.S;
      }
    }

    function calculateOmegaFromPCA(data) {
      try {
        const X = numeric.clone(data);
        const n = X.length, k = X[0].length;
        for (let j = 0; j < k; j++) {
          const mean = X.reduce((a, row) => a + row[j], 0) / n;
          for (let i = 0; i < n; i++) X[i][j] -= mean;
        }
        const Xt = numeric.transpose(X);
        const cov = numeric.dot(Xt, X);
        let vec = null;
        try {
          const eig = numeric.eig(cov);
          vec = eig.E.x.map(row => row[0]);
        } catch (error) {
          console.warn('numeric.eig failed for omega, falling back to SVD:', error);
          const svd = numeric.svd(cov);
          if (svd && svd.V) {
            vec = svd.V.map(row => row[0]);
          }
        }
        if (!vec) {
          return NaN;
        }
        const norm = Math.sqrt(vec.reduce((s, x) => s + x * x, 0));
        const loadings = vec.map(x => x / norm);
        const sumLoad = loadings.reduce((a, b) => a + b, 0);
        const omega = Math.pow(sumLoad, 2) / (Math.pow(sumLoad, 2) + loadings.map(l => 1 - l * l).reduce((a, b) => a + b, 0));
        return omega;
      } catch (error) {
        console.error('Error calculating omega:', error);
        return NaN;
      }
    }

    function storePCAData(data) {
      console.log('Calculating PCA...');
      
      try {
        // Check if numeric.js is loaded
        if (typeof numeric === 'undefined') {
          console.error('numeric.js not loaded!');
          throw new Error('numeric.js library not available');
        }

        const alphaMode = document.getElementById("alpha-mode")?.value || "raw";
        console.log('Mode:', alphaMode);
        
        let X = numeric.clone(data);
        const n = X.length, k = X[0].length;
        console.log(`Data: ${n} rows x ${k} columns`);

        if (alphaMode === "standardized") {
          // Standardize
          console.log('Standardizing data...');
          for (let j = 0; j < k; j++) {
            const col = X.map(row => row[j]);
            const mean = col.reduce((a, b) => a + b, 0) / n;
            const sd = Math.sqrt(col.reduce((s, x) => s + Math.pow(x - mean, 2), 0) / (n - 1));
            if (sd > 0) {
              for (let i = 0; i < n; i++) {
                X[i][j] = (X[i][j] - mean) / sd;
              }
            }
          }
        } else {
          // Center
          console.log('Centering data...');
          for (let j = 0; j < k; j++) {
            const mean = X.reduce((a, row) => a + row[j], 0) / n;
            for (let i = 0; i < n; i++) X[i][j] -= mean;
          }
        }

        // Calculate covariance matrix
        console.log('Calculating covariance matrix...');
        const Xt = numeric.transpose(X);
        const cov = numeric.dot(Xt, X);
        
        // Scale by n-1
        for (let i = 0; i < cov.length; i++) {
          for (let j = 0; j < cov[i].length; j++) {
            cov[i][j] = cov[i][j] / (n - 1);
          }
        }
        
        // Calculate eigenvalues
        console.log('Calculating eigenvalues...');
        let eigenvalues = getEigenvaluesFromCov(cov);
        
        eigenvalues = eigenvalues.map(val => Math.max(0, Math.abs(val)));
        if (!eigenvalues.length || eigenvalues.some(val => !isFinite(val))) {
          throw new Error('Invalid eigenvalues from PCA');
        }
        eigenvalues.sort((a, b) => b - a);
        
        const totalVariance = eigenvalues.reduce((a, b) => a + b, 0);
        const explained = eigenvalues.map(e => totalVariance > 0 ? (e / totalVariance * 100) : 0);
        
        pcaData = {
          eigenvalues,
          explained,
          firstComponentVariance: explained[0] || 0
        };
        window.pcaData = pcaData;

        console.log("PCA data calculated successfully:");
        console.log("  Eigenvalues:", eigenvalues);
        console.log("  Variance explained:", explained);
        console.log("  First component:", explained[0].toFixed(1) + "%");

        const summaryElement = document.getElementById("pca-summary");
        if (summaryElement) {
          const varianceText = `First component explains ${explained[0].toFixed(1)}% of variance`;
          const interpretationText = explained[0] > 40 ? 
            '<span style="color: #2ecc71;">Likely unidimensional</span>' : 
            '<span style="color: #f39c12;">Possible multidimensionality</span>';
          summaryElement.innerHTML = `${varianceText} - ${interpretationText}`;
        }
        
      } catch (error) {
        console.error("Error calculating PCA:", error);
        showPcaError(`PCA calculation failed: ${error.message}`);
        
        // Don't set pcaData if calculation failed
        pcaData = null;
      }
    }

      else document.documentElement.removeAttribute('data-theme');
      document.dispatchEvent(new CustomEvent('statistico-theme-changed', { detail: { theme } }));

    // Redraw Highcharts charts on theme change
    document.addEventListener('statistico-theme-changed', function() {
      if (typeof Highcharts !== 'undefined' && Highcharts.charts) {

          var isLight = document.documentElement.getAttribute('data-theme') === 'light';
