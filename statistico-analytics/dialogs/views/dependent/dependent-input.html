<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Repeated Measures Builder</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../shared-config.css?v=20260309b"/>
  <script src="../shared-config.js?v=20260309b"></script>
</head>
<body>
  <div class="cfg-shell">

    <!-- Header -->
    <header class="cfg-header">
      <div class="cfg-header-icon"><i class="fa-solid fa-repeat"></i></div>
      <span class="cfg-header-title">Repeated Measures</span>
      <span class="cfg-meta-badge" id="metaBadge">—</span>
      <button class="cfg-theme-toggle" id="cfgThemeToggle" title="Switch to light mode">
        <span class="cfg-toggle-icon">&#x1F319;</span>
        <div class="cfg-toggle-track"><div class="cfg-toggle-thumb"></div></div>
        <span class="cfg-toggle-label">Dark</span>
      </button>
    </header>

    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

      <div class="cfg-body">

        <!-- Range info -->
        <div class="cfg-panel">
          <div class="cfg-panel-body">
            <div class="cfg-range-strip">
              <div class="cfg-range-item">Range: <strong id="rangeAddr">—</strong></div>
              <div class="cfg-range-item">Rows: <strong id="rowCount">0</strong></div>
              <div class="cfg-range-item">Columns: <strong id="colCount">0</strong></div>
            </div>
          </div>
        </div>

        <!-- Options -->
        <div class="cfg-panel">
          <div class="cfg-panel-head"><i class="fa-solid fa-sliders"></i> Analysis Options</div>
          <div class="cfg-panel-body">

            <div class="cfg-label" style="margin-bottom:8px;">Timepoints</div>
            <div class="cfg-radio-group" style="margin-bottom:12px;">
              <div class="cfg-radio-option">
                <input type="radio" name="dataMode" id="twoTimepoints" value="two-vars" />
                <label for="twoTimepoints" class="cfg-radio-label">
                  <span class="radio-icon"><i class="fa-solid fa-arrows-left-right"></i></span>
                  <span class="radio-text">2 Timepoints</span>
                </label>
              </div>
              <div class="cfg-radio-option">
                <input type="radio" name="dataMode" id="kPlusTimepoints" value="k-plus" checked />
                <label for="kPlusTimepoints" class="cfg-radio-label">
                  <span class="radio-icon"><i class="fa-solid fa-timeline"></i></span>
                  <span class="radio-text">3+ Timepoints</span>
                </label>
              </div>
            </div>

            <label class="cfg-label" for="frameworkMode">Primary Framework</label>
            <select id="frameworkMode" class="cfg-select">
              <option value="parametric">Parametric (means)</option>
              <option value="nonparametric">Nonparametric (ranks)</option>
            </select>

          </div>
        </div>

        <!-- Variable picker -->
        <div class="cfg-panel">
          <div class="cfg-panel-head"><i class="fa-solid fa-clock-rotate-left"></i> Timepoint Variables</div>
          <div class="cfg-panel-body">
            <div class="cfg-hint" style="margin-bottom:8px;">Click columns representing timepoints (e.g., Time1, Time2, Time3).</div>
            <div class="cfg-tbl-wrap">
              <div class="cfg-tbl-scroll">
                <table class="cfg-tbl">
                  <thead>
                    <tr>
                      <th>Variable</th>
                      <th class="center">N Num</th>
                      <th class="center">N Str</th>
                      <th class="center">N Miss</th>
                      <th class="center"></th>
                    </tr>
                  </thead>
                  <tbody id="interestChecks"></tbody>
                </table>
              </div>
            </div>

            <div class="cfg-bucket">
              <div class="cfg-bucket-title">Timepoints Bucket</div>
              <div id="compareBucket" class="cfg-bucket-items"></div>
            </div>
            <div class="cfg-hint" id="bucketHint" style="margin-top:6px;">For 2 timepoints: exactly 2. For 3+: at least 3.</div>
          </div>
        </div>

      </div><!-- /cfg-body -->

      <!-- Footer -->
      <div class="cfg-footer">
        <button class="cfg-btn cancel" id="btnCancel"><i class="fa-solid fa-times"></i> Cancel</button>
        <button class="cfg-btn" id="btnRefresh" style="flex-shrink:0;">
          <i class="fa-solid fa-rotate"></i>
        </button>
        <button class="cfg-btn run" id="btnRun" disabled>
          <i class="fa-solid fa-play"></i> Open Dashboard
        </button>
      </div>

    </div>
  </div><!-- /cfg-shell -->

  <script>
    var STATE = { headers:[], rows:[], address:"", saved:null, selectedColumns:[], draggingCol:null };
    function qs(id){ return document.getElementById(id); }
    function send(action,data){
      if(Office&&Office.context&&Office.context.ui&&typeof Office.context.ui.messageParent==="function")
        Office.context.ui.messageParent(JSON.stringify({action:action,data:data||null}));
    }

    function countKinds(headers,rows){
      return headers.map(function(name,idx){
        var numeric=0,string=0,missing=0;
        rows.forEach(function(r){
          var v=r[idx];
          if(v===null||v===undefined||v===""){missing++;return;}
          isFinite(Number(String(v).replace(",",".")))? numeric++ : string++;
        });
        return {name:name,numeric:numeric,string:string,missing:missing};
      });
    }

    function renderInterestChecks(headers){
      var tbody = qs("interestChecks");
      if(!tbody) return;
      var stats = countKinds(headers,STATE.rows||[]);
      var html = "";
      stats.forEach(function(s){
        var isSel = STATE.selectedColumns.indexOf(s.name)>=0;
        html += '<tr class="'+(isSel?'disabled':'')+'" draggable="'+(isSel?'false':'true')+'" data-col="'+s.name+'">' +
          '<td>'+s.name+'</td>' +
          '<td class="center cfg-badge-num">'+s.numeric+'</td>' +
          '<td class="center cfg-badge-str">'+s.string+'</td>' +
          '<td class="center cfg-badge-mis">'+s.missing+'</td>' +
          '<td class="center cfg-drag-h"><i class="fa-solid fa-grip"></i></td></tr>';
      });
      tbody.innerHTML = html;
      tbody.querySelectorAll("tr").forEach(function(tr){
        var col = tr.getAttribute("data-col");
        var disabled = tr.classList.contains("disabled");
        tr.addEventListener("click",function(){ if(!disabled) addToBucket(col); });
      });
    }

    function addToBucket(colName){
      if(!colName||STATE.selectedColumns.indexOf(colName)>=0) return;
      var mode = (document.querySelector('input[name="dataMode"]:checked')||{}).value||'k-plus';
      if(mode==="two-vars"&&STATE.selectedColumns.length>=2) STATE.selectedColumns.shift();
      STATE.selectedColumns.push(colName);
      renderBucket(); renderInterestChecks(STATE.headers); validateBucket();
    }

    function removeFromBucket(colName){
      STATE.selectedColumns = STATE.selectedColumns.filter(function(c){return c!==colName;});
      renderBucket(); renderInterestChecks(STATE.headers); validateBucket();
    }

    function renderBucket(){
      var container = qs("compareBucket");
      if(!container) return;
      if(STATE.selectedColumns.length===0){
        container.innerHTML='<span style="color:var(--cfg-text3);font-size:11px;">No timepoints selected</span>';
        return;
      }
      container.innerHTML = STATE.selectedColumns.map(function(col){
        return '<span class="cfg-pill">'+col+' <button onclick="removeFromBucket(\''+col+'\')"><i class="fa-solid fa-xmark"></i></button></span>';
      }).join('');
    }

    function validateBucket(){
      var mode = (document.querySelector('input[name="dataMode"]:checked')||{}).value||'k-plus';
      var count = STATE.selectedColumns.length;
      var btn = qs("btnRun");
      if(btn) btn.disabled = (mode==="two-vars") ? count!==2 : count<3;
    }

    function applyPayload(p){
      if(!p||!p.headers) return;
      STATE.headers=p.headers||[]; STATE.rows=p.rows||[]; STATE.address=p.address||""; STATE.saved=p.savedModelSpec||null;
      qs("rangeAddr").textContent = STATE.address||"—";
      qs("rowCount").textContent  = STATE.rows.length;
      qs("colCount").textContent  = STATE.headers.length;
      qs("metaBadge").textContent = STATE.address || (STATE.rows.length+" rows");
      if(STATE.saved){
        if(STATE.saved.compareMode){
          var r=qs(STATE.saved.compareMode==="k-plus"?"kPlusTimepoints":"twoTimepoints");
          if(r) r.checked=true;
        }
        if(STATE.saved.primaryFramework){ var f=qs("frameworkMode"); if(f) f.value=STATE.saved.primaryFramework; }
        if(Array.isArray(STATE.saved.selectedColumns)) STATE.selectedColumns=STATE.saved.selectedColumns.slice();
      }
      renderInterestChecks(STATE.headers); renderBucket(); validateBucket();
    }

    Office.onReady(function(){
      Office.context.ui.addHandlerAsync(Office.EventType.DialogParentMessageReceived,function(arg){
        var msg=JSON.parse(arg.message||"{}");
        if(msg.type==="DEPENDENT_DATA"&&msg.payload) applyPayload(msg.payload);
      });
      send("requestData",null); send("ready",null);
      qs("btnRefresh").addEventListener("click",function(){send("requestData");});
      qs("btnCancel").addEventListener("click",function(){send("close");});
      qs("btnRun").addEventListener("click",function(){
        var mode=(document.querySelector('input[name="dataMode"]:checked')||{}).value||'k-plus';
        var framework=qs("frameworkMode").value;
        send("dependentModel",{
          compareMode:mode, primaryFramework:framework,
          selectedColumns:STATE.selectedColumns.slice(),
          groupA:STATE.selectedColumns[0]||"", groupB:STATE.selectedColumns[1]||"",
          confidence:0.95, hypothesis:"two-sided"
        });
      });
      document.querySelectorAll('input[name="dataMode"]').forEach(function(r){
        r.addEventListener("change",function(){ validateBucket(); renderInterestChecks(STATE.headers); });
      });
    });
  </script>
</body>
</html>
