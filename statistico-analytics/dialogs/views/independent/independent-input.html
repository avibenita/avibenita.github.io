<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Independent Means Builder</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../shared-config.css?v=20260309a"/>
  <script src="../shared-config.js?v=20260309a"></script>
</head>
<body>
  <div class="cfg-shell">

    <!-- Header -->
    <header class="cfg-header">
      <div class="cfg-header-icon"><i class="fa-solid fa-not-equal"></i></div>
      <span class="cfg-header-title">Independent Means</span>
      <span class="cfg-meta-badge" id="metaBadge">—</span>
      <button class="cfg-theme-toggle" id="cfgThemeToggle" title="Toggle theme">
        <i class="fa-solid fa-sun"></i>
      </button>
    </header>

    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

      <!-- Scrollable body -->
      <div class="cfg-body">

        <!-- Range info -->
        <div class="cfg-panel">
          <div class="cfg-panel-body">
            <div class="cfg-range-strip">
              <div class="cfg-range-item">Range: <strong id="rangeAddr">—</strong></div>
              <div class="cfg-range-item">Rows: <strong id="rowCount">0</strong></div>
              <div class="cfg-range-item">Columns: <strong id="colCount">0</strong></div>
            </div>
          </div>
        </div>

        <!-- Analysis options -->
        <div class="cfg-panel">
          <div class="cfg-panel-head"><i class="fa-solid fa-sliders"></i> Analysis Options</div>
          <div class="cfg-panel-body">

            <div class="cfg-label" style="margin-bottom:8px;">Compare</div>
            <div class="cfg-radio-group" style="margin-bottom:12px;">
              <div class="cfg-radio-option">
                <input type="radio" name="dataMode" id="twoVars" value="two-vars" />
                <label for="twoVars" class="cfg-radio-label">
                  <span class="radio-icon"><i class="fa-solid fa-code-compare"></i></span>
                  <span class="radio-text">2 Variables</span>
                </label>
              </div>
              <div class="cfg-radio-option">
                <input type="radio" name="dataMode" id="kPlus" value="k-plus" checked />
                <label for="kPlus" class="cfg-radio-label">
                  <span class="radio-icon"><i class="fa-solid fa-layer-group"></i></span>
                  <span class="radio-text">3+ Groups</span>
                </label>
              </div>
            </div>

            <label class="cfg-label" for="frameworkMode">Primary Framework</label>
            <select id="frameworkMode" class="cfg-select">
              <option value="parametric">Parametric (means)</option>
              <option value="nonparametric">Nonparametric (ranks)</option>
            </select>

          </div>
        </div>

        <!-- Variable picker -->
        <div class="cfg-panel">
          <div class="cfg-panel-head"><i class="fa-solid fa-table-columns"></i> Variables</div>
          <div class="cfg-panel-body">
            <div class="cfg-hint" style="margin-bottom:8px;">Click a row to add it to the comparison bucket below.</div>
            <div class="cfg-tbl-wrap">
              <div class="cfg-tbl-scroll">
                <table class="cfg-tbl">
                  <thead>
                    <tr>
                      <th>Variable</th>
                      <th class="center">N Num</th>
                      <th class="center">N Str</th>
                      <th class="center">N Miss</th>
                      <th class="center"></th>
                    </tr>
                  </thead>
                  <tbody id="interestChecks"></tbody>
                </table>
              </div>
            </div>

            <div class="cfg-bucket">
              <div class="cfg-bucket-title">Comparison Bucket</div>
              <div id="compareBucket" class="cfg-bucket-items"></div>
            </div>
            <div class="cfg-hint" id="bucketHint" style="margin-top:6px;">For 2 variables: exactly 2. For 3+ groups: at least 3.</div>
          </div>
        </div>

      </div><!-- /cfg-body -->

      <!-- Footer -->
      <div class="cfg-footer">
        <button class="cfg-btn cancel" id="btnCancel"><i class="fa-solid fa-times"></i> Cancel</button>
        <button class="cfg-btn run" id="btnRun" disabled>
          <i class="fa-solid fa-play"></i> Open Dashboard
        </button>
      </div>

    </div>
  </div><!-- /cfg-shell -->

  <script>
    var STATE = { headers:[], rows:[], address:"", saved:null, selectedColumns:[], draggingCol:null };
    function qs(id){ return document.getElementById(id); }
    function send(action,data){
      if(Office&&Office.context&&Office.context.ui&&typeof Office.context.ui.messageParent==="function")
        Office.context.ui.messageParent(JSON.stringify({action:action,data:data||null}));
    }

    function countKinds(headers,rows){
      return headers.map(function(name,idx){
        var numeric=0,string=0,missing=0;
        rows.forEach(function(r){
          var v=r[idx];
          if(v===null||v===undefined||v===""){missing++;return;}
          isFinite(Number(String(v).replace(",",".")))? numeric++ : string++;
        });
        return {name:name,numeric:numeric,string:string,missing:missing};
      });
    }

    function renderInterestChecks(headers){
      var tbody = qs("interestChecks");
      if(!tbody) return;
      var stats = countKinds(headers, STATE.rows||[]);
      var html = "";
      stats.forEach(function(s){
        var isSel = STATE.selectedColumns.indexOf(s.name)>=0;
        var rowCls = isSel ? 'disabled' : '';
        html += '<tr class="'+rowCls+'" draggable="'+(isSel?'false':'true')+'" data-col="'+s.name+'">' +
          '<td>'+s.name+'</td>' +
          '<td class="center cfg-badge-num">'+s.numeric+'</td>' +
          '<td class="center cfg-badge-str">'+s.string+'</td>' +
          '<td class="center cfg-badge-mis">'+s.missing+'</td>' +
          '<td class="center cfg-drag-h"><i class="fa-solid fa-grip"></i></td></tr>';
      });
      tbody.innerHTML = html;
      tbody.querySelectorAll("tr").forEach(function(tr){
        var col = tr.getAttribute("data-col");
        var disabled = tr.classList.contains("disabled");
        tr.addEventListener("dragstart",function(e){
          if(disabled){e.preventDefault();return;}
          tr.classList.add("dragging"); STATE.draggingCol=col;
          if(e.dataTransfer){e.dataTransfer.effectAllowed="copy";e.dataTransfer.setData("text/plain",col||"");}
        });
        tr.addEventListener("dragend",function(){tr.classList.remove("dragging");STATE.draggingCol=null;});
        tr.addEventListener("click",function(){if(!disabled) addToBucket(col);});
        tr.addEventListener("dblclick",function(){if(!disabled) addToBucket(col);});
      });
    }

    function renderBucket(){
      var bucket = qs("compareBucket");
      if(!bucket) return;
      bucket.innerHTML = "";
      STATE.selectedColumns.forEach(function(col){
        var pill = document.createElement("span");
        pill.className = "cfg-pill";
        pill.innerHTML = '<span>'+col+'</span><button data-col="'+col+'"><i class="fa-solid fa-xmark"></i></button>';
        bucket.appendChild(pill);
      });
      bucket.querySelectorAll("button").forEach(function(btn){
        btn.addEventListener("click",function(){removeFromBucket(btn.getAttribute("data-col"));});
      });
      validateBucket();
    }

    function addToBucket(col){
      if(!col) return;
      var mode = (document.querySelector('input[name="dataMode"]:checked')||{}).value||'k-plus';
      if(STATE.selectedColumns.indexOf(col)>=0) return;
      if(mode==="two-vars"&&STATE.selectedColumns.length>=2) return;
      STATE.selectedColumns.push(col);
      renderBucket();
      renderInterestChecks(STATE.headers);
    }

    function removeFromBucket(col){
      STATE.selectedColumns = STATE.selectedColumns.filter(function(x){return x!==col;});
      renderBucket();
      renderInterestChecks(STATE.headers);
    }

    function validateBucket(){
      var mode = (document.querySelector('input[name="dataMode"]:checked')||{}).value||'k-plus';
      var ok = mode==="two-vars" ? STATE.selectedColumns.length===2 : STATE.selectedColumns.length>=3;
      var hint = qs("bucketHint");
      if(hint) hint.textContent = mode==="two-vars"
        ? "Select exactly 2 variables." : "Select at least 3 numeric columns.";
      var runBtn = qs("btnRun");
      if(runBtn) runBtn.disabled = !ok;
    }

    function applyPayload(p){
      STATE.headers=p.headers||[]; STATE.rows=p.rows||[]; STATE.address=p.address||""; STATE.saved=p.savedModelSpec||{};
      qs("rangeAddr").textContent = STATE.address||"Selection";
      qs("rowCount").textContent  = String(STATE.rows.length);
      qs("colCount").textContent  = String(STATE.headers.length);
      qs("metaBadge").textContent = STATE.address || (STATE.rows.length+" rows");
      STATE.selectedColumns = [];
      renderInterestChecks(STATE.headers);
      renderBucket();
      if(STATE.saved){
        if(STATE.saved.compareMode==="two-vars") qs("twoVars").checked=true;
        else qs("kPlus").checked=true;
        if(STATE.saved.primaryFramework) qs("frameworkMode").value=STATE.saved.primaryFramework;
      }
      validateBucket();
    }

    function run(){
      var mode = (document.querySelector('input[name="dataMode"]:checked')||{}).value||'k-plus';
      var selected = STATE.selectedColumns.slice();
      if(selected.length<2) return;
      var spec = {
        analysisMode:"independent", compareMode:mode,
        mode:mode==="k-plus"?"k-plus":"two-column",
        primaryFramework:qs("frameworkMode").value,
        selectedColumns:selected, hypothesis:"two-sided", confidence:0.95,
        groupALabel:"A", groupBLabel:"B"
      };
      if(mode==="two-vars"){ spec.groupA=selected[0]; spec.groupB=selected[1]||selected[0]; }
      else { spec.kplusScheme="selected-columns-as-groups"; spec.posthocMethod=spec.primaryFramework==="nonparametric"?"dunn":"games-howell"; spec.posthocCorrection="holm"; }
      send("independentModel",spec);
    }

    document.addEventListener("DOMContentLoaded",function(){
      // Bucket drag-and-drop
      var bucketWrap = document.querySelector(".cfg-bucket");
      function allowDrop(e){e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect="copy";}
      function handleDrop(e){
        e.preventDefault();
        var col=e.dataTransfer?e.dataTransfer.getData("text/plain")||"":"";
        if(!col) col=STATE.draggingCol||"";
        if(!col){var d=document.querySelector("#interestChecks tr.dragging");if(d)col=d.getAttribute("data-col")||"";}
        if(col) addToBucket(col);
      }
      if(bucketWrap){bucketWrap.addEventListener("dragover",allowDrop);bucketWrap.addEventListener("drop",handleDrop);}

      document.querySelectorAll('input[name="dataMode"]').forEach(function(r){r.addEventListener('change',validateBucket);});
      qs("btnCancel").addEventListener("click",function(){send("close",null);});
      qs("btnRun").addEventListener("click",run);

      Office.onReady(function(){
        Office.context.ui.addHandlerAsync(Office.EventType.DialogParentMessageReceived,function(arg){
          var msg=JSON.parse(arg.message||"{}");
          if(msg.type==="INDEPENDENT_DATA"&&msg.payload) applyPayload(msg.payload);
        });
        send("requestData",null);
        send("ready",null);
      });
    });
  </script>
</body>
</html>
