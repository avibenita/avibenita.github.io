<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Statistico Icon Gallery</title>

<!-- Load your icon library -->
<script src="statistico_icon_library.js"></script>

<style>
body {
  font-family: Inter, Segoe UI, Arial;
  background: #f8fafc;
  margin: 0;
  padding: 30px;
}

.header {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #1e293b;
}

.controls {
  margin-bottom: 20px;
}

button {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}

button.secondary {
  background: #64748b;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  border: 1px solid #e2e8f0;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
}

.icon-box {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  color: #4f46e5;
}

.icon-box svg {
  width: 28px;
  height: 28px;
}

.name {
  font-size: 12px;
  color: #334155;
  font-weight: 600;
}

</style>
</head>

<body>

<div class="header">Statistico™ Icon System</div>

<div class="controls">
  <button onclick="setColor('#4f46e5')">Primary</button>
  <button class="secondary" onclick="setColor('#22c55e')">Active</button>
  <button class="secondary" onclick="setColor('#94a3b8')">Muted</button>
</div>

<div class="grid" id="iconGrid"></div>

<script>

// Init styles (from your library)
StatisticoIcons.installStyles();

// Render gallery
const container = document.getElementById("iconGrid");
const icons = StatisticoIcons.list();

container.innerHTML = icons.map(name => `
  <div class="card">
    <div class="icon-box">
      ${StatisticoIcons.get(name)}
    </div>
    <div class="name">${name}</div>
  </div>
`).join('');

// Dynamic color control
function setColor(color) {
  document.querySelectorAll(".icon-box").forEach(el => {
    el.style.color = color;
  });
}

</script>

</body>
</html>
