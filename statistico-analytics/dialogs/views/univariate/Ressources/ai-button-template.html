<!-- VARIANT 1: Bottom-Right Position (for decision panels) -->
<button id="aiInterpretBtn" 
        class="ai-interpret-btn position-bottom-right" 
        title="AI Interpretation (Beta)">
  <i class="fas fa-lightbulb"></i>
  <span>AI</span>
</button>

<!-- VARIANT 2: Top-Right Position (for header sections) -->
<button id="aiInterpretBtn" 
        class="ai-interpret-btn position-top-right" 
        title="AI Interpretation (Beta)">
  <i class="fas fa-lightbulb"></i>
  <span>AI</span>
</button>

<!-- VARIANT 3: Inline Position (next to other buttons) -->
<button id="aiInterpretBtn" 
        class="ai-interpret-btn position-inline" 
        title="AI Interpretation (Beta)">
  <i class="fas fa-lightbulb"></i>
  <span>AI</span>
</button>

<!-- VARIANT 4: Custom Position (use inline styles) -->
<button id="aiInterpretBtn" 
        class="ai-interpret-btn" 
        style="position: absolute; bottom: 12px; right: 12px;" 
        title="AI Interpretation (Beta)">
  <i class="fas fa-lightbulb"></i>
  <span>AI</span>
</button>

<!--
  IMPORTANT NOTES:
  1. Ensure FontAwesome is loaded for the sparkles icon
  2. The button ID should be unique per page or use data-attributes
  3. Parent container should have position: relative for absolute positioning
