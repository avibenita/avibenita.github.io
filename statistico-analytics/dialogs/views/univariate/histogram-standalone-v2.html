  <!-- Strip Office host-info query param as early as possible so URL bar stays clean -->
  <script>
    (function () {
      try {
        var u = new URL(window.location.href);
        var dirty = false;
        ['_host_Info', '_hostInfo', 'telemetry', 'isDialog'].forEach(function (k) {
          if (u.searchParams.has(k)) { u.searchParams.delete(k); dirty = true; }
        });
        if (dirty) window.history.replaceState({}, document.title, u.pathname + (u.search ? u.search : '') + (u.hash || ''));
      } catch (e) {}
    })();
  </script>

  <style>
    /* EXACT COPY OF ORIGINAL HISTOGRAM STYLES */
    :root {
      --surface-0: #0c1624;
      --surface-1: #1a1f2e;
      --surface-2: #242938;
      --border: #6b7280; /* Much brighter border - easily visible */
      --accent-1: rgb(255,165,120);
      --accent-2: rgb(120,200,255);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.85);
      --panel-radius: 10px;
      --panel-shadow: 0px 4px 20px rgba(0, 0, 0, 0.4);
      --header-color: var(--accent-1);
    }
    /* ── Light Theme ── */
    :root[data-theme="light"] {
      --surface-0: #eef0f4;
      --surface-1: #ffffff;
      --surface-2: #f3f4f6;
      --border: #cbd5e1;
      --accent-1: #2563eb;
      --accent-2: #1d4ed8;
      --text-primary: #111827;
      --text-secondary: #1f2937;
      --text-muted: #374151;
    }

    /* Light theme: override hardcoded dark-only values */
    :root[data-theme="light"] body { background: var(--surface-0); }
    :root[data-theme="light"] .panel,
    :root[data-theme="light"] .card,
    :root[data-theme="light"] .stat-panel { background: var(--surface-1); border-color: var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    :root[data-theme="light"] .panel-heading,
    :root[data-theme="light"] .card-header { background: var(--surface-2); color: var(--accent-1); }
    :root[data-theme="light"] table { background: var(--surface-1); }
    :root[data-theme="light"] thead th { background: linear-gradient(135deg, var(--surface-2), #dde3ef) !important; color: var(--text-primary) !important; border-color: var(--border) !important; }
    :root[data-theme="light"] tbody tr:nth-child(even) { background: rgba(0,0,0,0.03); }
    :root[data-theme="light"] tbody tr:hover { background: rgba(37,99,235,0.06); }
    :root[data-theme="light"] td, :root[data-theme="light"] th { border-color: var(--border); color: var(--text-primary); }
    :root[data-theme="light"] .results-container { background: var(--surface-0); }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--surface-0);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      color: var(--text-primary);
      overflow: hidden;
      /* Use % height chain so layout works inside site iframes (100vh can match outer window). */
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Body inherits the global premium scrollbar from shared-header.css */

    /* Results container - Compact */
    .results-container {
      display: none;
      margin: 0;          /* no margin - use padding so width:100% doesn't overflow */
      padding: 4px 8px;
      flex: 1;
      min-height: 0;
      box-sizing: border-box;
    }

    .results-container.show {
      display: flex !important;
      flex-direction: column;
      gap: 6px;
    }

    /* Panel styling - Compact */
    .panel {
      background-color: var(--surface-1);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow), 0 0 0 1px rgba(255, 255, 255, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      margin-bottom: 0;
    }

    .panel-heading {
      background: transparent;
      color: var(--header-color);
      font-weight: 600;
      padding: 5px 10px;
      font-size: 0.9rem;
      letter-spacing: .3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body {
      padding: 5px 10px;
    }

    /* Table styling - EXACT match */
    table {
      width: 100%;
      text-align: center;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-collapse: collapse;
    }

    table th {
      padding: 4px 8px;
      font-weight: 600;
      font-size: 11px;
      background: var(--surface-0);
      color: var(--accent-1);
    }

    table th.highlight {
      background: rgba(255, 165, 120, 0.3);
      color: var(--text-primary);
    }

    table td {
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Stat panels (4 separate boxes) */
    .stats-cards-panel { padding: 0 0 8px; flex-shrink: 0; width: 90%; margin: 0 auto;
      border: none !important; box-shadow: none !important; background: transparent !important; }
    .stat-insight-row {
      font-size: 12px; font-weight: 500;
      color: var(--accent-1, #ffa578);
      margin-bottom: 8px; padding: 4px 0;
      border-left: 3px solid var(--accent-1, #ffa578);
      padding-left: 10px;
      border-radius: 0 6px 6px 0; display: none;
    }
    .stat-insight-row.visible { display: block; }
    .stat-cards-grid { display: flex; gap: 8px; flex-wrap: nowrap; }
    .stat-card-group {
      flex: 1; min-width: 0;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px; padding: 10px 10px 8px;
    }
    .stat-group-label {
      font-size: 9px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-muted, #9faac0);
      margin-bottom: 8px; padding-bottom: 5px;
      border-bottom: 1px solid rgba(255,255,255,.75);
    }
    .stat-card-items { display: flex; flex-direction: column; gap: 4px; }
    .stat-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 6px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,.12);
    }
    .stat-card.sc-mean   { background: rgba(255,155,102,.1); }
    .stat-card.sc-median { background: rgba(83,214,161,.08); }
    .sc-label { font-size: 10px; color: var(--text-muted, #9faac0); }
    .sc-value { font-size: 12px; font-weight: 600; color: var(--text-primary, #f4f7fb); font-variant-numeric: tabular-nums; }
    .stat-card.sc-mean   .sc-value { color: #ffa578; }
    .stat-card.sc-median .sc-value { color: #53d6a1; }

    /* Controls - EXACT match */
    /* ONE ROW - ALL 4 CONTROLS */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      flex-wrap: nowrap !important;      /* force same row */
      align-items: center;    /* vertically aligned */
      overflow-x: auto;      /* Allow horizontal scroll if needed */
      overflow-y: hidden;
    }

    /* Smaller / shorter boxes */
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;      /* reduced */
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      min-height: 32px;       /* reduced from 42px */
      flex-shrink: 0;        /* prevent shrinking */
      white-space: nowrap;   /* prevent text wrapping */
    }

    /* Make labels less "tall" */
    .control-group label {
      color: var(--text-secondary);
      font-size: 12px;        /* slightly smaller */
      font-weight: 500;
      white-space: nowrap;
      min-width: auto;        /* important: stop forcing width */
    }
    
    /* Data range label */
    .range-control > label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      white-space: nowrap;
      min-width: auto;
    }

    /* Inputs shorter */
    .control-group select,
    .control-group input[type="number"] {
      padding: 4px 10px;      /* reduced */
      font-size: 12px;
      height: 28px;           /* slimmer */
      background: var(--surface-1);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 140px;
    }

    .control-group input[type="range"] {
      width: 100px;
    }

    .control-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* Overlay toggles: Normal / Mean / Median in one control box */
    .control-group.overlay-toggles {
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-group.overlay-toggles .overlay-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .control-group.overlay-toggles .overlay-toggle input {
      accent-color: var(--accent-1);
    }

    /* Source-range row filter (Pareto-style) */
    .panel-heading-actions {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .panel-heading-actions i {
      font-size: 12px;
      opacity: 0.65;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .panel-heading-actions i:hover { opacity: 0.95; }
    /* Legacy panel filter styles — filter lives in shared header only */

    /* Data filter guide — visible notice under chart header */
    .uni-data-guide {
      margin: 0 8px 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(129,140,248,.45);
      background: linear-gradient(135deg, rgba(129,140,248,.14) 0%, rgba(74,222,128,.08) 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset;
      font-size: 11px;
      line-height: 1.55;
      color: rgba(228,232,240,.92);
    }
    .uni-data-guide.hidden { display: none; }
    .uni-data-guide-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #a5b4fc;
    }
    .uni-data-guide-head i { font-size: 14px; color: #86efac; }
    .uni-data-guide-dismiss {
      margin-left: auto;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.45);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }
    .uni-data-guide-dismiss:hover { color: #fff; }
    .uni-data-guide-body { display: grid; gap: 8px; }
    .uni-data-guide-body p { margin: 0; }
    .uni-data-guide-body strong { color: #e4e8f0; font-weight: 600; }
    .uni-data-guide-steps {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
    }
    .uni-data-guide-steps li { padding-left: 2px; }
    .uni-data-guide-outcomes {
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(0,0,0,.22);
      border-left: 3px solid #86efac;
      font-size: 10.5px;
    }
    .uni-data-guide-outcomes span { color: #86efac; font-weight: 600; }
    :root[data-theme="light"] .uni-data-guide {
      background: linear-gradient(135deg, rgba(37,99,235,.08) 0%, rgba(22,163,74,.06) 100%);
      border-color: rgba(37,99,235,.35);
      color: #1f2937;
    }
    :root[data-theme="light"] .uni-data-guide-head { color: #1d4ed8; }
    :root[data-theme="light"] .uni-data-guide-body strong { color: #111827; }

    .uni-filt-help-panel {
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(129,140,248,.35);
      background: rgba(129,140,248,.08);
      font-size: 12px;
      line-height: 1.6;
      color: rgba(228,232,240,.92);
    }
    .uni-filt-help-panel h4 {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a5b4fc;
    }
    .uni-filt-help-panel ol {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 6px;
    }
    #uniFilterOverlay { pointer-events: none; }
    #uniFilterOverlay.sb-ai-overlay--visible { pointer-events: auto; }
    .uni-filt-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .uni-filt-summary { font-size: 11px; color: rgba(203,213,225,.85); flex: 1; min-width: 140px; }
    .uni-filt-clear-btn {
      font-size: 10px; font-weight: 700; padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer;
    }
    .uni-filt-clear-btn:hover { border-color: var(--accent-1); color: var(--accent-1); }
    .uni-filt-th { cursor: pointer; user-select: none; white-space: nowrap; }
    .uni-filt-th.filtered { color: #4ade80 !important; }
    .uni-filt-th .uni-filt-icon { font-size: 9px; margin-left: 4px; opacity: .75; }
    .uni-excel-filter-dropdown {
      position: fixed; z-index: 100050;
      background: var(--surface-1); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.45);
      min-width: 200px; max-width: 280px; max-height: 320px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .uni-excel-filter-dropdown .uni-filt-search {
      width: 100%; padding: 7px 9px; border: none; border-bottom: 1px solid var(--border);
      background: var(--surface-0); color: var(--text-primary); font-size: 12px; box-sizing: border-box;
    }
    .uni-excel-filter-dropdown .uni-filt-values { overflow-y: auto; max-height: 200px; padding: 6px 8px; }
    .uni-excel-filter-dropdown label {
      display: flex; align-items: center; gap: 8px; padding: 4px 2px;
      font-size: 12px; cursor: pointer; color: var(--text-primary);
    }
    .uni-excel-filter-dropdown .uni-filt-actions {
      display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--border);
    }
    .uni-excel-filter-dropdown .uni-filt-ok {
      flex: 1; padding: 6px; border: none; border-radius: 4px;
      background: var(--accent-1); color: #0f172a; font-weight: 700; font-size: 11px; cursor: pointer;
    }
    .uni-excel-filter-dropdown .uni-filt-cancel {
      flex: 1; padding: 6px; border: 1px solid var(--border); border-radius: 4px;
      background: transparent; color: var(--text-secondary); font-size: 11px; cursor: pointer;
    }

    /* Chart container - Compact */
    #histogram-chart {
      min-height: 0;
      height: 100%;
      width: 100%;
      margin: 4px auto 0;
      padding: 0;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      flex: 1;
      overflow: hidden;
    }
    
    .chart-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .chart-panel .panel-body {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 4px;
      overflow: hidden;
    }

    /* Range slider styling - EXACT match */
    /* Make the 4th control flexible (it will take remaining width) */
    .range-control {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;                /* IMPORTANT: this makes it fit in same row */
      min-width: 320px;       /* prevents collapsing too much */
      padding: 6px 10px;      /* reduced */
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      min-height: 32px;       /* reduced from 42px */
      margin-top: 0;          /* remove the extra vertical spacing */
      max-width: none;        /* remove 650px restriction */
      flex-shrink: 0;        /* prevent shrinking */
      white-space: nowrap;   /* prevent text wrapping */
    }

    .range-sliders {
      position: relative;
      flex: 1;
      height: 16px;         /* was 20px */
    }

    .range-sliders input[type="range"] {
      position: absolute;
      width: 100%;
      pointer-events: none;
      -webkit-appearance: none;
      background: transparent;
    }

    .range-sliders input[type="range"]::-webkit-slider-thumb {
      pointer-events: all;
      -webkit-appearance: none;
      width: 14px;          /* slightly smaller thumb */
      height: 14px;
      border-radius: 50%;
      background: var(--accent-2);
      cursor: pointer;
    }

    .range-track {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      height: 3px;          /* thinner line */
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }

    .range-active {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 3px;          /* thinner line */
      background: var(--accent-1);
      border-radius: 2px;
    }

    .value-display {
      min-width: 40px;      /* slightly smaller */
      font-size: 12px;
      color: var(--accent-2);
      font-weight: 600;
      text-align: center;
      display: inline-block;
    }

    .reset-button {
      background: var(--accent-2);
      color: white;
      border: none;
      padding: 3px 9px;     /* reduced */
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      height: 26px;         /* makes it align nicely */
    }

    .reset-button:hover {
      opacity: 0.9;
    }

    /* Icon buttons */
    .panel-heading i {
      cursor: pointer;
      margin-left: 10px;
      transition: color 0.3s;
    }

    .panel-heading i:hover {
      color: var(--accent-2);
    }

    /* Footer - sits at the very bottom, never grows */
    .statistico-footer {
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      text-align: center;
      padding: 4px 0;
      opacity: 0.7;
      flex: 0 0 auto;
    }

    .dialog-loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(12, 22, 36, 0.72);
      z-index: 9999;
      transition: opacity .2s ease;
    }
    .dialog-loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .dialog-loading-card {
      min-width: 220px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(120, 200, 255, 0.35);
      background: rgba(20, 31, 47, 0.96);
      color: #e5e7eb;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 26px rgba(0,0,0,.45);
    }
    .dialog-loading-spin {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(148, 163, 184, 0.35);
      border-top-color: #78c8ff;
      animation: dlgSpin .8s linear infinite;
    }
    @keyframes dlgSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <script>
    function getHistogramChartHeight() {
      const chartEl = document.getElementById('histogram-chart');
      if (!chartEl) return 360;
      const panelBody = chartEl.closest('.panel-body');
      if (!panelBody) return Math.max(260, chartEl.clientHeight || 360);
      const controls = panelBody.querySelector('.controls');
      const controlsH = controls ? controls.offsetHeight : 0;
      const bodyH = panelBody.clientHeight || chartEl.parentElement.clientHeight || 0;
      return Math.max(220, bodyH - controlsH - 16);
    }

    function fitLayout() {
      const container = document.getElementById('results-container');
      if (!container || !container.classList.contains('show')) return;

      container.style.height = '';
      container.style.width = '';
      const chartPanel = document.getElementById('histogram-panel');
      if (chartPanel) chartPanel.style.height = '';
      const chartEl = document.getElementById('histogram-chart');
      const chartH = getHistogramChartHeight();
      if (chartEl) chartEl.style.height = chartH + 'px';

      requestAnimationFrame(function () {
        if (histogramChart && histogramChart.setSize) {
          histogramChart.setSize(null, chartH, false);
        } else if (histogramChart && histogramChart.reflow) {
          histogramChart.reflow();
        } else if (typeof Highcharts !== 'undefined') {
          Highcharts.charts.forEach(function (c) { if (c && c.reflow) c.reflow(); });
        }
      });
    }

    function attachLayoutObserver() {
      if (window._histLayoutObserver) return;
      const target = document.querySelector('.right-col') || document.querySelector('.laptop-frame');
      if (!target || typeof ResizeObserver === 'undefined') return;
      window._histLayoutObserver = new ResizeObserver(function () {
        requestAnimationFrame(fitLayout);
      });
      window._histLayoutObserver.observe(target);
    }

    window.addEventListener('resize', fitLayout);
    attachLayoutObserver();


    // Global variables
    let histogramChart = null;
    let originalData = [];
    let currentData = [];

    function applyTransform(data, transform) {
      const t = transform || 'none';
      switch (t) {
        case 'ln': return data.map(function (v) { return Math.log(v); });
        case 'log10': return data.map(function (v) { return Math.log10(v); });
        case 'sqrt': return data.map(function (v) { return Math.sqrt(v); });
        case 'square': return data.map(function (v) { return v * v; });
        case 'reciprocal': return data.map(function (v) { return 1 / v; });
        case 'z': {
          const m = data.reduce(function (a, b) { return a + b; }, 0) / data.length;
          const sd = Math.sqrt(data.reduce(function (acc, v) { return acc + Math.pow(v - m, 2); }, 0) / data.length);
          return data.map(function (v) { return (v - m) / sd; });
        }
        case 'minmax': {
          const mn = Math.min.apply(null, data);
          const mx = Math.max.apply(null, data);
          return data.map(function (v) { return (v - mn) / (mx - mn); });
        }
        default: return data.slice();
      }
    }

    function extractValuesFromRows(rows) {
      if (!_uniMeta || _uniMeta.columnIndex == null) return [];
      const idx = _uniMeta.columnIndex;
      let data = (rows || []).map(function (r) { return r[idx]; })
        .filter(function (v) { return v !== '' && v !== null && v !== undefined && !isNaN(parseFloat(v)); })
        .map(function (v) { return parseFloat(v); });
      if (!data.length) return [];
      const trim = _uniMeta.trim || { min: 0, max: 100 };
      if (trim.min > 0 || trim.max < 100) {
        const sorted = data.slice().sort(function (a, b) { return a - b; });
        const minVal = sorted[Math.floor((sorted.length - 1) * trim.min / 100)];
        const maxVal = sorted[Math.floor((sorted.length - 1) * trim.max / 100)];
        data = data.filter(function (v) { return v >= minVal && v <= maxVal; });
      }
      return applyTransform(data, _uniMeta.transform);
    }

    function hasStoredRowFilter(data) {
      const all = data && data.sourceRowsAll;
      const rows = data && data.sourceRows;
      return !!(data && data.rowFilterActive) ||
        !!(all && rows && rows.length > 0 && rows.length < all.length);
    }

    function resolveAnalysisValues(data) {
      const headers = data.sourceHeaders;
      const allRows = data.sourceRowsAll || data.sourceRows;
      const hasSource = headers && allRows && allRows.length;
      if (typeof UniRowFilter !== 'undefined' && hasSource) {
        UniRowFilter.init({
          headers: headers,
          rows: allRows,
          columnIndex: data.columnIndex != null ? Number(data.columnIndex) : 0,
          onApply: rebuildFromSourceRows
        });
        const filtered = data.sourceRows || [];
        if (hasStoredRowFilter(data) && filtered.length) {
          UniRowFilter.setFilteredRows(filtered);
        }
        const fromRows = extractValuesFromRows(UniRowFilter.getFilteredRows());
        if (fromRows.length) return fromRows;
      }
      if (hasStoredRowFilter(data) && ((data.values && data.values.length) || (data.data && data.data.length))) {
        return (data.values || data.data).slice();
      }
      return (data.values || data.data || []).slice();
    }

    function rebuildFromSourceRows(filteredRows) {

    // Calculate descriptive statistics
    function calculateDescriptiveStats(data) {
      const n = data.length;
      const sorted = [...data].sort((a, b) => a - b);
      const mean = data.reduce((a, b) => a + b, 0) / n;
      const variance = data.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / (n - 1);
      const stdDev = Math.sqrt(variance);
      
      const q1 = sorted[Math.floor(n * 0.25)];
      const median = sorted[Math.floor(n * 0.5)];
      const q3 = sorted[Math.floor(n * 0.75)];
      
      // Kurtosis: Fisher's G2 excess (matches SPSS)
      const kurtosis = n >= 4 && stdDev > 0
        ? ((n * (n + 1)) / ((n - 1) * (n - 2) * (n - 3))) * data.reduce((acc, val) => acc + Math.pow((val - mean) / stdDev, 4), 0) - (3 * Math.pow(n - 1, 2)) / ((n - 2) * (n - 3))
        : 0;
      
      // Skewness: Fisher's G1 (matches SPSS)
      const skewness = n >= 3 && stdDev > 0
        ? (n / ((n - 1) * (n - 2))) * data.reduce((acc, val) => acc + Math.pow((val - mean) / stdDev, 3), 0)
        : 0;
      
      return {
        n: n,
        mean: mean,
        stdDev: stdDev,
        variance: variance,
        kurtosis: kurtosis,
        skewness: skewness,
        range: sorted[n - 1] - sorted[0],
        min: sorted[0],
        q1: q1,
        median: median,
        q3: q3,
        max: sorted[n - 1]
      };
    }

    // Populate statistics table
    function populateStatistics(stats) {

      document.getElementById('stat-n').textContent = stats.n;
      document.getElementById('stat-mean').textContent = fmt(stats.mean);
      document.getElementById('stat-stddev').textContent = fmt(stats.stdDev);
      document.getElementById('stat-variance').textContent = fmt(stats.variance);
      document.getElementById('stat-kurtosis').textContent = fmt(stats.kurtosis);
      document.getElementById('stat-skewness').textContent = fmt(stats.skewness);
      document.getElementById('stat-range').textContent = fmt(stats.range);
      document.getElementById('stat-min').textContent = fmt(stats.min);
      document.getElementById('stat-q25').textContent = fmt(stats.q1);
      document.getElementById('stat-median').textContent = fmt(stats.median);
      document.getElementById('stat-q75').textContent = fmt(stats.q3);
      document.getElementById('stat-max').textContent = fmt(stats.max);

      // JS-computed insight sentence
      const insightEl = document.getElementById('stat-insight');
      if (insightEl && stats.stdDev > 0) {
        const mmGapSD = (stats.mean - stats.median) / stats.stdDev;
        const cv = Math.abs(stats.mean) > 0 ? Math.abs(stats.stdDev / stats.mean) : null;
        const skew = stats.skewness;
        const symmetryWord = (Math.abs(mmGapSD) < 0.15 && Math.abs(skew) < 0.3)
          ? 'approximately symmetric'
          : (skew > 0.5 || mmGapSD > 0.3) ? 'right-skewed'
          : (skew < -0.5 || mmGapSD < -0.3) ? 'left-skewed'
          : 'mildly skewed';
        const spreadWord = cv !== null
          ? (cv > 0.5 ? 'high spread' : cv > 0.25 ? 'moderate spread' : 'tight concentration')
          : '';
        const cvStr = cv !== null ? ` (CV\u202F=\u202F${cv.toFixed(2)})` : '';
        insightEl.textContent = `Distribution is ${symmetryWord}${spreadWord ? ' with ' + spreadWord + cvStr : ''}.`;
        insightEl.classList.add('visible');
      }
    }

    // Create histogram - EXACT COPY of original logic
    // Flag to control animation during slider moves
    let isSliderMoving = false;
    let sliderTimeout = null;

    function createHistogram() {
      const numBinsInput = document.getElementById('numBins');
      const showNormal = document.getElementById('showNormalCurve').checked;
      const showMeanLine = document.getElementById('showMeanLine').checked;
      const showMedianLine = document.getElementById('showMedianLine').checked;
      
      let numBins = parseInt(numBinsInput.value);
      const method = document.getElementById('binningMethod').value;
      
      // Calculate bins based on method
      if (method !== 'manual') {
        numBins = calculateOptimalBins(method, currentData);
        numBinsInput.value = numBins;
        document.getElementById('numBinsValue').textContent = numBins;
      }
      
      const min = Math.min(...currentData);
      const max = Math.max(...currentData);
      const binWidth = (max - min) / numBins;
      
      // Calculate histogram bins with bin centers for alignment
      const histogramData = [];
      const categories = [];
      
      for (let i = 0; i < numBins; i++) {
        const binStart = min + i * binWidth;
        const binEnd = binStart + binWidth;
        
        categories.push(`${binStart.toFixed(0)}-${binEnd.toFixed(0)}`);
        
        const count = currentData.filter(v => v >= binStart && (i === numBins - 1 ? v <= binEnd : v < binEnd)).length;
        
        // Use index for x-coordinate to align with categories
        histogramData.push({
          x: i,
          y: count
        });
      }
      
      const series = [{
        name: 'Frequency',
        type: 'column',
        data: histogramData,
        color: 'rgba(99,102,241,0.95)',
        borderColor: 'rgba(165,180,252,0.85)',
        borderWidth: 1,
        stickyTracking: false,
        states: {
          hover: { color: 'rgba(129,140,248,1)', brightness: 0 },
          inactive: { opacity: 1 }
        }
      }];
      
      // Add normal curve if checked
      if (showNormal) {
        const mean = currentData.reduce((a, b) => a + b, 0) / currentData.length;
        const stdDev = Math.sqrt(currentData.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / currentData.length);
        
        const normalData = [];
        const numPoints = 100;
        for (let i = 0; i <= numPoints; i++) {
          const x = min + (i / numPoints) * (max - min);
          const y = (1 / (stdDev * Math.sqrt(2 * Math.PI))) * 
                    Math.exp(-0.5 * Math.pow((x - mean) / stdDev, 2));
          
          // Map x-value to category index position
          const categoryIndex = ((x - min) / (max - min)) * (numBins - 1);
          
          // Scale to match histogram frequency (not density)
          normalData.push([categoryIndex, y * currentData.length * binWidth]);
        }
        
        series.push({
          name: 'Normal Distribution',
          type: 'spline',
          data: normalData,
          color: 'rgba(251,146,60,0.75)',
          lineWidth: 2,
          dashStyle: 'Solid',
          stickyTracking: false,
          findNearestPointBy: 'xy',
          marker: {
            enabled: false,
            states: {
              hover: { enabled: true, radius: 4, lineWidth: 1, fillColor: 'rgba(251,146,60,0.95)' }
            }
          },
          states: {
            inactive: { opacity: 1 },
            hover: { lineWidthPlus: 0 }
          },
          yAxis: 0
        });
      }
      
      // Determine if animation should be enabled
      const enableAnimation = !isSliderMoving;
      
      // Pre-compute chart overlay positions (mean, median, IQR)
      const _overlayStats = calculateDescriptiveStats(currentData);
      const _overlayRange = max - min || 1;
      const _toCat = function(v) { return ((v - min) / _overlayRange) * (numBins - 1); };
      const _chartPlotLines = [];

    // Calculate optimal bins
    function calculateOptimalBins(method, data) {
      const n = data.length;
      
      switch(method) {
        case 'sturges':
          return Math.ceil(Math.log2(n) + 1);
        case 'scott':
          const sorted = [...data].sort((a, b) => a - b);
          const stdDev = Math.sqrt(data.reduce((sum, v) => sum + Math.pow(v - data.reduce((a,b)=>a+b,0)/n, 2), 0) / n);
          const binWidth = 3.49 * stdDev / Math.pow(n, 1/3);
          return Math.ceil((sorted[n-1] - sorted[0]) / binWidth);
        case 'fd':
          const sortedFD = [...data].sort((a, b) => a - b);
          const q1 = sortedFD[Math.floor(n * 0.25)];
          const q3 = sortedFD[Math.floor(n * 0.75)];
          const iqr = q3 - q1;
          const binWidthFD = 2 * iqr / Math.pow(n, 1/3);
          return Math.ceil((sortedFD[n-1] - sortedFD[0]) / binWidthFD);
        default:
          return 10;
      }
    }

    // Range sliders - with animation control
    function updateRangeSliders() {
      const leftSlider = document.getElementById('leftTruncation');
      const rightSlider = document.getElementById('rightTruncation');
      
      let leftVal = parseInt(leftSlider.value);
      let rightVal = parseInt(rightSlider.value);
      
      // Prevent crossing
      if (leftVal >= rightVal) {
        leftSlider.value = rightVal - 1;
        leftVal = rightVal - 1;
      }
      
      // Update active indicator
      const activeIndicator = document.getElementById('activeRangeIndicator');
      activeIndicator.style.left = leftVal + '%';
      activeIndicator.style.right = (100 - rightVal) + '%';
      
      // Calculate actual values
      const range = originalMax - originalMin;
      const leftValue = originalMin + (leftVal / 100) * range;
      const rightValue = originalMin + (rightVal / 100) * range;
      
      document.getElementById('leftRangeValue').textContent = leftValue.toFixed(currentDecimals);
      document.getElementById('rightRangeValue').textContent = rightValue.toFixed(currentDecimals);
      
      // Filter data
      currentData = originalData.filter(v => v >= leftValue && v <= rightValue);
      document.getElementById('remainingN').textContent = currentData.length;
      
      // Set slider moving flag to disable animation
      isSliderMoving = true;
      
      // Clear existing timeout
      if (sliderTimeout) {
        clearTimeout(sliderTimeout);
      }
      
      // Re-enable animation after slider stops moving for 300ms
      sliderTimeout = setTimeout(() => {
        isSliderMoving = false;
        console.log('? Slider stopped, animations re-enabled');
      }, 300);
      
      // Update stats and chart (without animation)
      const stats = calculateDescriptiveStats(currentData);
      populateStatistics(stats);
      createHistogram();
    }

    // Reset range sliders
    function resetRangeSliders() {
      document.getElementById('leftTruncation').value = 0;
      document.getElementById('rightTruncation').value = 100;
      currentData = [...originalData];
      updateRangeSliders();
    }

    // Close view
    function closeView() {
      sendMessageToParent({ action: 'close' });

    // Light / Dark theme support
    function applyTheme(theme) {
      if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else document.documentElement.removeAttribute('data-theme');
      document.dispatchEvent(new CustomEvent('statistico-theme-changed', { detail: { theme } }));
    }
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'THEME_CHANGE') applyTheme(event.data.theme);
    });
    // Redraw Highcharts charts on theme change
    document.addEventListener('statistico-theme-changed', function() {
      if (typeof Highcharts !== 'undefined' && Highcharts.charts) {
        Highcharts.charts.forEach(function(c) { if (c) {
          var isLight = document.documentElement.getAttribute('data-theme') === 'light';
          var bg = isLight ? '#ffffff' : '#1a1f2e';
          var tc = isLight ? '#111827' : '#ffffff';
          var at = isLight ? '#374151' : '#aaaaaa';
          var gl = isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.1)';
          var tt = isLight ? '#ffffff' : '#1a1f2e';
          c.update({ chart: { backgroundColor: 'transparent' },
            tooltip: { backgroundColor: tt, style: { color: tc } },
            xAxis: { labels: { style: { color: at } }, gridLineColor: gl, lineColor: gl, tickColor: gl },
            yAxis: { labels: { style: { color: at } }, gridLineColor: gl },
            legend: { itemStyle: { color: tc }, itemHoverStyle: { color: tc } },
            title: { style: { color: tc } }, subtitle: { style: { color: at } }
          }, true);
        }});
      }
    });

    /* Register header action buttons (View Data / Save / HTML) */
    function registerHeaderActions(data) {
      if (typeof StatisticoHeader === 'undefined') return;

      const varName  = data.column || data.variableName || 'Variable';
      const values   = data.values || data.data || [];
      const range    = data.dataSource || null;
      const meta     = typeof UniRowFilter !== 'undefined' ? UniRowFilter.getSourceMeta() : null;
      const hasSource = meta && meta.headers && meta.headers.length;

      const isTrimmed    = data.trim && (data.trim.min > 0 || data.trim.max < 100);
      const isTransformed = data.transform && data.transform !== 'none';
      const rowFiltered  = meta && meta.hasActiveFilters;
      const noteParts = [];
      if (isTrimmed)     noteParts.push(`Trimmed ${data.trim.min}–${data.trim.max}%`);
      if (isTransformed) noteParts.push(`Transform: ${data.transform}`);
      if (rowFiltered)   noteParts.push('Row filters active on source range');
      const notice = noteParts.length ? `Values shown after: ${noteParts.join(', ')}` : null;

      const valueRows = values.map(function (v) { return [v === null || v === undefined ? null : v]; });

      StatisticoHeader.registerActions({
        getData: function () {
          if (hasSource) {
            return {
              headers: meta.headers,
              allRows: meta.allRows,
              usedRows: meta.filteredRows,
              fullRange: range,
              usedRange: rowFiltered ? ((range || '') + ' (filtered rows)') : range,
              columnRoles: null,
              notice
            };
          }
          return {
            headers: [varName],
            allRows: valueRows,
            usedRows: valueRows,
            fullRange: range,
            usedRange: range,
            columnRoles: null,
            notice
          };
        },

        moduleName: `Copy ${varName} values to clipboard`,

        exportJson: () => {
          try {
            const ts   = new Date().toISOString().slice(0,19).replace(/[-T:]/g,'');
            const name = varName.replace(/[^a-zA-Z0-9_]/g,'_').slice(0,30);
            const readStat = id => { const el = document.getElementById(id); return el ? el.textContent.trim() : null; };
            const payload = {
              variableName : varName,
              sampleSize   : values.length,
              descriptives : {
                n        : readStat('stat-n'),
                mean     : readStat('stat-mean'),
                stdDev   : readStat('stat-stddev'),
                variance : readStat('stat-variance'),
                kurtosis : readStat('stat-kurtosis'),
                skewness : readStat('stat-skewness'),
                range    : readStat('stat-range'),
                min      : readStat('stat-min'),
                q25      : readStat('stat-q25'),
                median   : readStat('stat-median'),
                q75      : readStat('stat-q75'),
                max      : readStat('stat-max')
              },
              values : values
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url  = URL.createObjectURL(blob);
            const a    = Object.assign(document.createElement('a'), { href: url, download: `Histogram_${name}_${ts}.json` });
            document.body.appendChild(a); a.click();
            setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
          } catch(e) { alert('Export failed: ' + e.message); }
        },

        exportHtml: () => {
          try {
            const ts   = new Date().toISOString().slice(0,19).replace(/[-T:]/g,'');
            const name = varName.replace(/[^a-zA-Z0-9_]/g,'_').slice(0,30);
            const blob = new Blob(['<!DOCTYPE html>\n' + document.documentElement.outerHTML], { type: 'text/html' });
            const url  = URL.createObjectURL(blob);
            const a    = Object.assign(document.createElement('a'), { href: url, download: `Histogram_${name}_${ts}.html` });
            document.body.appendChild(a); a.click();
            setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
          } catch(e) { alert('Export failed: ' + e.message); }
        }
      });
    }
    window.registerHeaderActions = registerHeaderActions;</script>
