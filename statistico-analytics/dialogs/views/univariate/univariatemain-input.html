<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Univariate Configuration</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../shared-config.css?v=20260309d"/>
  <script src="../shared-config.js?v=20260309d"></script>
</head>
<body>
  <div class="cfg-shell">

    <!-- Header -->
    <header class="cfg-header">
      <div class="cfg-header-icon"><i class="fa-solid fa-chart-simple"></i></div>
      <span class="cfg-header-title">Univariate Configuration</span>
      <span class="cfg-meta-badge" id="metaBadge">—</span>
      <button class="cfg-theme-toggle" id="cfgThemeToggle" title="Switch to light mode">
        <span class="cfg-toggle-icon">&#x1F319;</span>
        <div class="cfg-toggle-track"><div class="cfg-toggle-thumb"></div></div>
        <span class="cfg-toggle-label">Dark</span>
      </button>
    </header>

    <!-- Spinner -->
    <div id="loadingSpinner" class="cfg-spinner">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading data…
    </div>

    <!-- Main content (hidden until data arrives) -->
    <div id="mainContent" style="display:none; display:none; flex:1; flex-direction:column; overflow:hidden;">

      <!-- Scrollable body -->
      <div class="cfg-body">

        <!-- Range info -->
        <div class="cfg-panel">
          <div class="cfg-panel-body">
            <div class="cfg-range-strip">
              <div class="cfg-range-item">Range: <strong id="rangeAddr">—</strong></div>
              <div class="cfg-range-item">Rows: <strong id="rowCount">0</strong></div>
              <div class="cfg-range-item">Columns: <strong id="colCount">0</strong></div>
            </div>
          </div>
        </div>

        <!-- Variable picker -->
        <div class="cfg-panel">
          <div class="cfg-panel-head">
            <i class="fa-solid fa-table-columns"></i> Column to Analyse
          </div>
          <div class="cfg-panel-body" style="padding-bottom:8px;">
            <div class="cfg-hint" style="margin-bottom:8px;">Select exactly one variable. Disabled rows have &lt;5 numeric values.</div>
            <div class="cfg-tbl-wrap">
              <div class="cfg-tbl-scroll">
                <table class="cfg-tbl">
                  <thead>
                    <tr>
                      <th class="radio-cell">Pick</th>
                      <th>Variable</th>
                      <th class="right">N Num</th>
                      <th class="right">Mean</th>
                      <th class="right">SD</th>
                      <th class="right">Min</th>
                      <th class="right">Max</th>
                    </tr>
                  </thead>
                  <tbody id="varsTbody"></tbody>
                </table>
              </div>
            </div>
            <div id="selectNote" class="cfg-note">Choose one valid variable to continue.</div>
          </div>
        </div>

        <!-- Trim + Transform side by side -->
        <div class="cfg-2col">

          <div class="cfg-panel">
            <div class="cfg-panel-head"><i class="fa-solid fa-scissors"></i> Trim</div>
            <div class="cfg-panel-body">
              <div class="cfg-slider-row">
                <span class="cfg-slider-label">Left trim</span>
                <input type="range" id="trimMin" class="cfg-slider" min="0" max="49" value="0" step="1" oninput="onTrimChange()"/>
                <span class="cfg-slider-val" id="trimMinVal">0%</span>
              </div>
              <div class="cfg-slider-row">
                <span class="cfg-slider-label">Right trim</span>
                <input type="range" id="trimMax" class="cfg-slider" min="51" max="100" value="100" step="1" oninput="onTrimChange()"/>
                <span class="cfg-slider-val" id="trimMaxVal">100%</span>
              </div>
            </div>
          </div>

          <div class="cfg-panel">
            <div class="cfg-panel-head"><i class="fa-solid fa-wave-square"></i> Transform</div>
            <div class="cfg-panel-body">
              <div class="cfg-transform-grid">
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_none" value="none" checked />
                  <label for="t_none" class="cfg-transform-label">None</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_ln" value="ln" />
                  <label for="t_ln" class="cfg-transform-label">ln(x)</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_log10" value="log10" />
                  <label for="t_log10" class="cfg-transform-label">log??(x)</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_sqrt" value="sqrt" />
                  <label for="t_sqrt" class="cfg-transform-label">?x</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_sq" value="square" />
                  <label for="t_sq" class="cfg-transform-label">x˛</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_rec" value="reciprocal" />
                  <label for="t_rec" class="cfg-transform-label">1/x</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_z" value="z" />
                  <label for="t_z" class="cfg-transform-label">z-score</label>
                </div>
                <div class="cfg-transform-option">
                  <input type="radio" name="transform" id="t_mm" value="minmax" />
                  <label for="t_mm" class="cfg-transform-label">Min-Max</label>
                </div>
              </div>
            </div>
          </div>

        </div><!-- /cfg-2col -->

      </div><!-- /cfg-body -->

      <!-- Footer -->
      <div class="cfg-footer">
        <button class="cfg-btn cancel" onclick="cancel()"><i class="fa-solid fa-times"></i> Cancel</button>
        <button class="cfg-btn run" id="runBtn" onclick="runAnalysis()" disabled>
          <i class="fa-solid fa-play"></i> Run Full Analysis
        </button>
      </div>

    </div><!-- /mainContent -->

  </div><!-- /cfg-shell -->

  <script>
    let STATE = { headers: [], rows: [], address: '', savedSpec: null, columnStats: [] };

    // Show mainContent as flex once loaded
    function showMain() {
      const el = document.getElementById('mainContent');
      el.style.display = 'flex';
    }

    // ?? Office init ??????????????????????????????????????????????????????????
    Office.onReady(() => {
      Office.context.ui.addHandlerAsync(
        Office.EventType.DialogParentMessageReceived,
        onMessageFromParent
      );
      send({ action: 'ready' });
    });

    function onMessageFromParent(arg) {
      try {
        const msg = JSON.parse(arg.message);
        if (msg.type === 'UNIVARIATE_DATA') applyPayload(msg.payload);
      } catch (_e) {}
    }

    function applyPayload(p) {
      STATE.headers   = p.headers   || [];
      STATE.rows      = p.rows      || [];
      STATE.address   = p.address   || '';
      STATE.savedSpec = p.savedSpec || null;

      document.getElementById('rangeAddr').textContent = STATE.address || 'Selection';
      document.getElementById('rowCount').textContent  = STATE.rows.length;
      document.getElementById('colCount').textContent  = STATE.headers.length;
      document.getElementById('metaBadge').textContent =
        STATE.address ? STATE.address : `${STATE.rows.length} rows`;

      buildColumnStats();
      renderVariableTable();

      if (STATE.savedSpec) {
        const savedIdx   = STATE.savedSpec.columnIndex;
        const savedRadio = document.querySelector(`input[name="selectedColumn"][value="${savedIdx}"]`);
        if (savedRadio && !savedRadio.disabled) savedRadio.checked = true;
        document.getElementById('trimMin').value = STATE.savedSpec.trimMin ?? 0;
        document.getElementById('trimMax').value = STATE.savedSpec.trimMax ?? 100;
        const radio = document.querySelector(`input[name="transform"][value="${STATE.savedSpec.transform || 'none'}"]`);
        if (radio) radio.checked = true;
        onTrimChange();
      }
      onVariableSelect();

      document.getElementById('loadingSpinner').style.display = 'none';
      showMain();
    }

    function buildColumnStats() {
      STATE.columnStats = STATE.headers.map((h, idx) => {
        const values = STATE.rows
          .map(row => row[idx])
          .filter(v => v !== '' && v !== null && v !== undefined && !isNaN(parseFloat(v)))
          .map(v => parseFloat(v));
        const n = values.length;
        if (!n) return { idx, name: h || `Col ${idx+1}`, n:0, mean:null, sd:null, min:null, max:null, eligible:false };
        const mean = values.reduce((a,b)=>a+b,0)/n;
        const variance = n>1 ? values.reduce((acc,v)=>acc+(v-mean)**2,0)/(n-1) : 0;
        return { idx, name:h||`Col ${idx+1}`, n, mean, sd:Math.sqrt(variance),
                 min:Math.min(...values), max:Math.max(...values), eligible:n>=5 };
      });
    }

    function fmt(v) { return Number.isFinite(v) ? v.toFixed(2) : '—'; }

    function renderVariableTable() {
      document.getElementById('varsTbody').innerHTML = STATE.columnStats.map(s => `
        <tr class="${s.eligible ? '' : 'disabled'}">
          <td class="radio-cell">
            <input type="radio" name="selectedColumn" value="${s.idx}"
              ${s.eligible ? '' : 'disabled'} onchange="onVariableSelect()"/>
          </td>
          <td>${s.name}</td>
          <td class="right">${s.n}</td>
          <td class="right">${fmt(s.mean)}</td>
          <td class="right">${fmt(s.sd)}</td>
          <td class="right">${fmt(s.min)}</td>
          <td class="right">${fmt(s.max)}</td>
        </tr>`).join('');
    }

    function onVariableSelect() {
      const sel  = document.querySelector('input[name="selectedColumn"]:checked');
      const btn  = document.getElementById('runBtn');
      const note = document.getElementById('selectNote');
      if (!sel) { btn.disabled=true; note.textContent='Choose one valid variable to continue.'; return; }
      btn.disabled = false;
      const stats = STATE.columnStats.find(s => s.idx === parseInt(sel.value, 10));
      note.textContent = stats ? `Selected: ${stats.name} (${stats.n} numeric values)` : '';
    }

    function onTrimChange() {
      const minV = document.getElementById('trimMin').value;
      const maxV = document.getElementById('trimMax').value;
      document.getElementById('trimMinVal').textContent = `${minV}%`;
      document.getElementById('trimMaxVal').textContent = `${maxV}%`;
      if (parseInt(minV) >= parseInt(maxV)) {
        document.getElementById('trimMax').value = parseInt(minV)+1;
        document.getElementById('trimMaxVal').textContent = `${parseInt(minV)+1}%`;
      }
    }

    function runAnalysis() {
      const sel = document.querySelector('input[name="selectedColumn"]:checked');
      if (!sel) return;
      const idx       = parseInt(sel.value, 10);
      const transform = document.querySelector('input[name="transform"]:checked')?.value || 'none';
      const trimMin   = parseInt(document.getElementById('trimMin').value);
      const trimMax   = parseInt(document.getElementById('trimMax').value);
      const colName   = STATE.headers[idx] || `Column ${idx+1}`;

      let data = STATE.rows
        .map(r => r[idx])
        .filter(v => v!=='' && v!==null && v!==undefined && !isNaN(parseFloat(v)))
        .map(v => parseFloat(v));
      if (!data.length) return;

      if (trimMin > 0 || trimMax < 100) {
        const sorted = [...data].sort((a,b)=>a-b);
        const minVal = sorted[Math.floor((sorted.length-1)*trimMin/100)];
        const maxVal = sorted[Math.floor((sorted.length-1)*trimMax/100)];
        data = data.filter(v => v>=minVal && v<=maxVal);
      }
      data = applyTransform(data, transform);
      const results = calculateStatistics(data, STATE.address, colName, transform, trimMin, trimMax);
      send({ action:'univariateResults', spec:{columnIndex:idx,columnName:colName,trimMin,trimMax,transform}, data:results });
    }

    function applyTransform(data, t) {
      switch(t){
        case 'ln':         return data.map(v=>Math.log(v));
        case 'log10':      return data.map(v=>Math.log10(v));
        case 'sqrt':       return data.map(v=>Math.sqrt(v));
        case 'square':     return data.map(v=>v*v);
        case 'reciprocal': return data.map(v=>1/v);
        case 'z': {
          const m=data.reduce((a,b)=>a+b,0)/data.length;
          const sd=Math.sqrt(data.reduce((acc,v)=>acc+(v-m)**2,0)/data.length);
          return data.map(v=>(v-m)/sd);
        }
        case 'minmax': {
          const mn=Math.min(...data),mx=Math.max(...data);
          return data.map(v=>(v-mn)/(mx-mn));
        }
        default: return data;
      }
    }

    function calculateStatistics(data, address, columnName, transform, trimMin, trimMax) {
      const n      = data.length;
      const sorted = [...data].sort((a,b)=>a-b);
      const mean   = data.reduce((a,b)=>a+b,0)/n;
      const variance = data.reduce((acc,v)=>acc+(v-mean)**2,0)/(n-1);
      const stdDev = Math.sqrt(variance);
      const q1     = quantile(sorted,0.25);
      const median = quantile(sorted,0.5);
      const q3     = quantile(sorted,0.75);
      return {
        dataSource:address, column:columnName, transform,
        trim:{min:trimMin,max:trimMax}, n,
        values:data, rawData:data,
        descriptive:{mean,median,stdDev,variance,min:sorted[0],max:sorted[n-1],
          range:sorted[n-1]-sorted[0],q1,q3,iqr:q3-q1,
          skewness:calcSkewness(data,mean,stdDev),
          kurtosis:calcKurtosis(data,mean,stdDev)}
      };
    }

    function quantile(s,q){ const p=(s.length-1)*q,b=Math.floor(p),r=p-b; return s[b+1]!==undefined?s[b]+r*(s[b+1]-s[b]):s[b]; }
    function calcSkewness(d,m,sd){ const n=d.length; return (d.reduce((a,v)=>a+(v-m)**3,0)/n)/sd**3; }
    function calcKurtosis(d,m,sd){ const n=d.length; return (d.reduce((a,v)=>a+(v-m)**4,0)/n)/sd**4-3; }

    function cancel() { send({ action: 'close' }); }
    function send(msg) { Office.context.ui.messageParent(JSON.stringify(msg)); }
  </script>
</body>
</html>
