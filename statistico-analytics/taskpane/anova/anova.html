<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>ANOVA – Statistico-Interactive&trade;</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --clr: #10b981; --clr-dark: #059669; --clr-light: #ecfdf5; --clr-border: #6ee7b7; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #1f2937; background: #f3f4f6; }

    .module-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #fff; border-bottom: 2px solid var(--clr-border);
    }
    .module-header-title { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 14px; color: var(--clr-dark); }
    .module-header-title i { color: var(--clr); }
    .back-btn {
      display: flex; align-items: center; gap: 5px; padding: 4px 10px;
      background: none; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 12px; color: #6b7280; cursor: pointer; transition: background .15s;
    }
    .back-btn:hover { background: var(--clr-light); color: var(--clr-dark); border-color: var(--clr-border); }

    .taskpane-content { padding: 16px 14px; display: flex; flex-direction: column; gap: 16px; }

    .section-card {
      background: #fff; border: 2px solid #e5e7eb; border-radius: 10px;
      overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: border-color .2s;
    }
    .section-card:focus-within { border-color: var(--clr-border); }
    .section-label {
      display: flex; align-items: center; gap: 6px; padding: 7px 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
      color: var(--clr-dark); background: var(--clr-light); border-bottom: 1px solid var(--clr-border);
    }
    .section-label i { color: var(--clr); }
    .section-body { padding: 12px; }

    .radio-row { display: flex; gap: 3px; background: #f3f4f6; border-radius: 7px; padding: 3px; }
    .radio-row label {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 6px 3px; border-radius: 5px; font-size: 11.5px; color: #6b7280;
      cursor: pointer; user-select: none; transition: all .15s;
    }
    .radio-row input[type=radio] { display: none; }
    .radio-row label.active { background: #fff; color: var(--clr-dark); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .radio-row label.active i { color: var(--clr); }

    .named-list { margin-top: 8px; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; }
    .named-list select { width: 100%; border: none; padding: 6px 8px; font-size: 12px; background: #fff; color: #1f2937; }
    .named-list select:focus { outline: none; }

    .range-badge {
      display: none; margin-top: 8px; padding: 6px 10px;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
      font-size: 11px; color: #166534; font-family: 'Consolas', monospace; word-break: break-all;
    }
    .range-badge i { color: #16a34a; }
    .range-badge.error { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }

    .configure-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 28px; font-size: 13px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--clr) 0%, var(--clr-dark) 100%);
      border: none; border-radius: 8px; cursor: pointer; transition: all .2s;
      width: auto; align-self: center; min-width: 180px; max-width: 260px;
      box-shadow: 0 2px 8px rgba(16,185,129,.3);
    }
    .configure-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(16,185,129,.45); }
    .configure-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
    .hint { font-size: 11px; color: #9ca3af; text-align: center; }

    body.direct-config-opening .taskpane-content { visibility: hidden; }

    .module-tip {
      background: var(--clr-light); border: 1px solid var(--clr-border); border-radius: 8px;
      padding: 9px 12px; font-size: 11px; color: var(--clr-dark); line-height: 1.55;
    }
    .module-tip i { color: var(--clr); margin-right: 4px; }
  </style>
</head>
<body>

  <div class="module-header">
    <div class="module-header-title">
      <i class="fa-solid fa-table-cells"></i>
      ANOVA
    </div>
    <button class="back-btn" onclick="goBack()">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
  </div>

  <div class="taskpane-content">

    <div class="module-tip">
      <i class="fa-solid fa-circle-info"></i>
      Supports <strong>one-way</strong>, <strong>two-way</strong>, and <strong>repeated measures</strong> ANOVA with Tukey, Bonferroni, and Games-Howell post-hoc tests.
    </div>

    <div class="section-card">
      <div class="section-label">
        <i class="fa-solid fa-table-cells-large"></i> Pick Range
      </div>
      <div class="section-body">
        <div class="radio-row">
          <label id="lblNamed" onclick="setRangeMode('named')">
            <input type="radio" name="rm" value="named">
            <i class="fa-solid fa-bookmark"></i> Named
          </label>
          <label id="lblUsed" class="active" onclick="setRangeMode('used')">
            <input type="radio" name="rm" value="used" checked>
            <i class="fa-solid fa-wand-magic-sparkles"></i> Default
          </label>
          <label id="lblSelection" onclick="setRangeMode('selection')">
            <input type="radio" name="rm" value="selection">
            <i class="fa-solid fa-hand-pointer"></i> Selected
          </label>
        </div>
        <div class="named-list" id="namedRangePanel" style="display:none;">
          <select id="namedRangeSelect" size="4" onchange="loadFromNamedRange()">
            <option value="">— Select a named range —</option>
          </select>
        </div>
        <div class="range-badge" id="rangeBadge">
          <i class="fa-solid fa-check-circle"></i> <span id="rangeBadgeText"></span>
        </div>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <button class="configure-btn" id="configureBtn" disabled onclick="onConfigureClick()">
        <i class="fa-solid fa-sliders"></i>
        <span>Configure Analysis</span>
      </button>
      <p class="hint" id="hintText">Select a data range to continue</p>
    </div>

  </div>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="../global-range-store.js?v=20260325a"></script>
  <script src="../dialog-sizes.js"></script>
  <script src="../dialog-host.js?v=20260528"></script>
  <script src="anova-input-panel.js"></script>

  <script>
    let rangeData = null;
    let rangeAddress = '';
    let rangeMode = 'used';
    const urlParams = (() => { try { return new URLSearchParams(window.location.search); } catch(e) { return new URLSearchParams(''); } })();
    const openedFromHub = urlParams.get('fromHub') === '1';
    const directDialogFromHub = openedFromHub && (urlParams.get('directDialog') === '1' || urlParams.get('autoConfig') === '1');
    const openResultsFromHub = openedFromHub && urlParams.get('openResults') === '1';
    if (directDialogFromHub) {
      document.body.classList.add('direct-config-opening');
    }

    function goBack() { window.location.href = '../hub.html'; }

    function setRangeMode(mode) {
      rangeMode = mode;
      document.getElementById('lblNamed').classList.toggle('active', mode === 'named');
      document.getElementById('lblUsed').classList.toggle('active', mode === 'used');
      document.getElementById('lblSelection').classList.toggle('active', mode === 'selection');
      document.querySelector(`input[value="${mode}"]`).checked = true;
      document.getElementById('namedRangePanel').style.display = (mode === 'named') ? 'block' : 'none';
      if (mode === 'used') autoDetectRange();
      else if (mode === 'selection') useSelection();
    }

    async function loadNamedRanges() {
      try {
        await Excel.run(async (ctx) => {
          const names = ctx.workbook.names.load('items');
          await ctx.sync();
          const sel = document.getElementById('namedRangeSelect');
          sel.innerHTML = '<option value="">— Select a named range —</option>';
          names.items.forEach(n => {
            const o = document.createElement('option');
            o.value = o.textContent = n.name;
            sel.appendChild(o);
          });
        });
      } catch(e) { console.warn('Named ranges unavailable:', e); }
    }

    async function loadFromNamedRange() {
      const name = document.getElementById('namedRangeSelect').value;
      if (!name) return;
      showRangeBadge('Loading…', false);
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.names.getItem(name).getRange();
          rng.load(['values','address']);
          await ctx.sync();
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeBadge('Could not load: ' + e.message, true); }
    }

    async function autoDetectRange() {
      showRangeBadge('Loading…', false);
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.worksheets.getActiveWorksheet().getUsedRange();
          rng.load(['values','address']);
          await ctx.sync();
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeBadge('Could not read worksheet range', true); }
    }

    async function useSelection() {
      showRangeBadge('Loading…', false);
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.getSelectedRange();
          rng.load(['values','address']);
          await ctx.sync();
          if (!rng.values || rng.values.length < 2)
            return showRangeBadge('Selection too small — needs a header row + data', true);
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeBadge('Could not read selection', true); }
    }

    async function watchSelection() {
      try {
        await Excel.run(async (ctx) => {
          ctx.workbook.onSelectionChanged.add(async () => {
            if (rangeMode === 'selection') await useSelection();
          });
          await ctx.sync();
        });
      } catch(e) {}
    }

    function applyRangeData(values, address) {
      if (!values || values.length < 2)
        return showRangeBadge('Need at least 2 rows (header + 1 data row)', true);
      rangeData = values;
      rangeAddress = address || '';
      const cols = (values[0] || []).length;
      const rows = values.length - 1;
      showRangeBadge(`${address}  –  ${rows} rows × ${cols} cols`, false);
      document.getElementById('configureBtn').disabled = false;
      document.getElementById('hintText').textContent = 'Ready — click to open the model builder';
      if (window.StatisticoGlobalRange) StatisticoGlobalRange.save(values, address, rangeMode);
      if (typeof onRangeDataLoaded === 'function') onRangeDataLoaded(values, address);
    }

    function showRangeBadge(text, isError) {
      const badge = document.getElementById('rangeBadge');
      badge.className = 'range-badge' + (isError ? ' error' : '');
      badge.style.display = 'block';
      document.getElementById('rangeBadgeText').textContent = text;
      if (isError) {
        rangeData = null;
        document.getElementById('configureBtn').disabled = true;
        document.getElementById('hintText').textContent = 'Select a data range to continue';
      }
    }

    function onConfigureClick() {
      if (!rangeData) return;
      if (typeof openAnovaBuilder === 'function') openAnovaBuilder();
    }

    Office.onReady(async (info) => {
      if (info.host === Office.HostType.Excel) {
        await loadNamedRanges();
        await watchSelection();
        var gr = window.StatisticoGlobalRange && StatisticoGlobalRange.load();
        if (gr && gr.values && gr.values.length >= 2) {
          rangeMode = gr.mode || 'used';
          StatisticoGlobalRange.syncRangeModeUI(rangeMode);
          applyRangeData(gr.values, gr.address);
          if (openResultsFromHub && typeof openAnovaResultsDialog === 'function') {
            setTimeout(function() { openAnovaResultsDialog(); }, openedFromHub ? 0 : 450);
          } else {
            setTimeout(function() { if (typeof onConfigureClick === 'function') onConfigureClick(); }, openedFromHub ? 0 : 450);
          }
        } else {
          await autoDetectRange();
          if (window.StatisticoGlobalRange && typeof StatisticoGlobalRange.shouldAutoOpenConfigFromHub === 'function' && StatisticoGlobalRange.shouldAutoOpenConfigFromHub() && rangeData) {
            if (openResultsFromHub && typeof openAnovaResultsDialog === 'function') {
              setTimeout(function() { openAnovaResultsDialog(); }, openedFromHub ? 0 : 450);
            } else {
              setTimeout(function() { if (typeof onConfigureClick === 'function') onConfigureClick(); }, openedFromHub ? 0 : 450);
            }
          }
        }
      }
    });
  </script>
</body>
</html>
