<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Factor Analysis – Statistico Analytics</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #f97316; --orange-dark: #ea580c; --orange-light: #fff7ed; --orange-border: #fed7aa; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #1f2937; background: #f3f4f6; }

    .module-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #fff; border-bottom: 2px solid var(--orange-border);
    }
    .module-header-title { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 14px; color: var(--orange-dark); }
    .module-header-title i { color: var(--orange); }
    .back-btn {
      display: flex; align-items: center; gap: 5px; padding: 4px 10px;
      background: none; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 12px; color: #6b7280; cursor: pointer; transition: background .15s;
    }
    .back-btn:hover { background: var(--orange-light); color: var(--orange-dark); border-color: var(--orange-border); }

    .taskpane-content { padding: 16px 14px; display: flex; flex-direction: column; gap: 16px; }

    .section-card {
      background: #fff; border: 2px solid #e5e7eb; border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: border-color .2s;
    }
    .section-card:focus-within { border-color: var(--orange-border); }
    .section-label {
      display: flex; align-items: center; gap: 6px; padding: 7px 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
      color: var(--orange-dark); background: var(--orange-light); border-bottom: 1px solid var(--orange-border);
    }
    .section-label i { color: var(--orange); }
    .section-body { padding: 12px; }

    .info-row { display: flex; gap: 12px; align-items: center; font-size: 12px; color: #6b7280; padding: 4px 0; }
    .info-row strong { color: #1f2937; }

    .radio-row { display: flex; gap: 3px; background: #f3f4f6; border-radius: 7px; padding: 3px; }
    .radio-row label {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 6px 3px; border-radius: 5px; font-size: 11.5px; color: #6b7280;
      cursor: pointer; user-select: none; transition: all .15s;
    }
    .radio-row input[type=radio] { display: none; }
    .radio-row label.active { background: #fff; color: var(--orange-dark); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .radio-row label.active i { color: var(--orange); }

    .named-list { margin-top: 8px; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; }
    .named-list select { width: 100%; border: none; padding: 6px 8px; font-size: 12px; background: #fff; color: #1f2937; }
    .named-list select:focus { outline: none; }

    .range-badge {
      display: none; margin-top: 8px; padding: 6px 10px;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
      font-size: 11px; color: #166534; font-family: 'Consolas', monospace; word-break: break-all;
    }
    .range-badge i { color: #16a34a; }
    .range-badge.error { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }

    .configure-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 28px; font-size: 13px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border: none; border-radius: 8px; cursor: pointer; transition: all .2s;
      width: auto; align-self: center; min-width: 180px; max-width: 260px;
      box-shadow: 0 2px 8px rgba(249,115,22,.3);
    }
    .configure-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(249,115,22,.45); }
    .configure-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

    .hint { font-size: 11px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>

  <div class="module-header">
    <div class="module-header-title">
      <i class="fa-solid fa-cubes"></i>
      Factor Analysis
    </div>
    <button class="back-btn" onclick="goBack()">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
  </div>

  <div class="taskpane-content">

    <!-- ① Pick Range -->
    <div class="section-card">
      <div class="section-label"><i class="fa-solid fa-table-cells-large"></i> Pick Range</div>
      <div class="section-body">
        <div class="radio-row">
          <label id="lblNamed" onclick="setRangeMode('named')">
            <input type="radio" name="rm" value="named">
            <i class="fa-solid fa-bookmark"></i> Named
          </label>
          <label id="lblUsed" class="active" onclick="setRangeMode('used')">
            <input type="radio" name="rm" value="used" checked>
            <i class="fa-solid fa-wand-magic-sparkles"></i> Used Range
          </label>
          <label id="lblSelection" onclick="setRangeMode('selection')">
            <input type="radio" name="rm" value="selection">
            <i class="fa-solid fa-hand-pointer"></i> XL Selection
          </label>
        </div>
        <div class="named-list" id="namedRangePanel" style="display:none;">
          <select id="namedRangeSelect" size="4" onchange="loadFromNamedRange()">
            <option value="">— Select a named range —</option>
          </select>
        </div>
        <div class="range-badge" id="rangeBadge">
          <i class="fa-solid fa-check-circle"></i> <span id="rangeBadgeText"></span>
        </div>
      </div>
    </div>

    <!-- ② Variable Selection & Configuration -->
    <div class="section-card">
      <div class="section-label"><i class="fa-solid fa-table-columns"></i> Variable Selection &amp; Configuration</div>
      <div class="section-body">
        <div class="info-row">
          Range: <strong id="factorRange">—</strong>
          &nbsp;Rows: <strong id="factorRows">0</strong>
          &nbsp;Columns: <strong id="factorCols">0</strong>
        </div>
      </div>
    </div>

    <!-- ③ Open Model Builder button -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <button class="configure-btn" id="openFactorModelBuilder" disabled onclick="openFactorModelBuilder()">
        <i class="fa-solid fa-sliders"></i>
        <span>Open Model Builder</span>
      </button>
      <button id="resetFactorModelBtn" style="display:none; margin-top:4px; padding:6px 14px; font-size:12px; background:none; border:1px solid #e5e7eb; border-radius:6px; color:#6b7280; cursor:pointer;" onclick="resetFactorModel()">
        <i class="fa-solid fa-rotate-left"></i> Reset
      </button>
      <p class="hint" id="hintText">Select a data range to continue</p>
    </div>

  </div>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="../../src/shared/js/core/saved-analyses-manager.js"></script>
  <script src="factor-input-panel.js"></script>

  <script>
    let rangeData = null, rangeAddress = '', rangeMode = 'used';

    function goBack() { window.location.href = '../hub.html'; }

    function setRangeMode(mode) {
      rangeMode = mode;
      document.getElementById('lblNamed').classList.toggle('active', mode === 'named');
      document.getElementById('lblUsed').classList.toggle('active', mode === 'used');
      document.getElementById('lblSelection').classList.toggle('active', mode === 'selection');
      document.querySelector(`input[value="${mode}"]`).checked = true;
      document.getElementById('namedRangePanel').style.display = (mode === 'named') ? 'block' : 'none';
      if (mode === 'used') autoDetectRange();
      else if (mode === 'selection') useSelection();
    }

    async function loadNamedRanges() {
      try {
        await Excel.run(async (ctx) => {
          const names = ctx.workbook.names.load('items');
          await ctx.sync();
          const sel = document.getElementById('namedRangeSelect');
          sel.innerHTML = '<option value="">— Select a named range —</option>';
          names.items.forEach(n => { const o = document.createElement('option'); o.value = o.textContent = n.name; sel.appendChild(o); });
        });
      } catch(e) {}
    }

    async function loadFromNamedRange() {
      const name = document.getElementById('namedRangeSelect').value;
      if (!name) return;
      showRangeLoading();
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.names.getItem(name).getRange();
          rng.load(['values','address']); await ctx.sync();
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeError('Could not load: ' + e.message); }
    }

    async function autoDetectRange() {
      showRangeLoading();
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.worksheets.getActiveWorksheet().getUsedRange();
          rng.load(['values','address']); await ctx.sync();
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeError('Could not detect used range'); }
    }

    async function useSelection() {
      showRangeLoading();
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.getSelectedRange();
          rng.load(['values','address']); await ctx.sync();
          if (!rng.values || rng.values.length < 2) return showRangeError('Selection too small');
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeError('Could not read selection'); }
    }

    async function watchSelection() {
      try {
        await Excel.run(async (ctx) => {
          ctx.workbook.onSelectionChanged.add(async () => { if (rangeMode === 'selection') await useSelection(); });
          await ctx.sync();
        });
      } catch(e) {}
    }

    function applyRangeData(values, address) {
      if (!values || values.length < 2) return showRangeError('Need at least 2 rows');
      rangeData = values; rangeAddress = address || '';
      const cols = (values[0] || []).length, rows = values.length - 1;
      showRangeBadge(`${address}  –  ${rows} rows × ${cols} cols`, false);
      if (typeof onRangeDataLoaded === 'function') onRangeDataLoaded(values, address);
      updateHint();
    }

    function showRangeLoading() { showRangeBadge('Loading…', false); }
    function showRangeError(msg) { rangeData = null; showRangeBadge(msg, true); updateHint(); }

    function showRangeBadge(text, isError) {
      const badge = document.getElementById('rangeBadge'), txt = document.getElementById('rangeBadgeText');
      badge.className = 'range-badge' + (isError ? ' error' : '');
      badge.style.display = 'block'; txt.textContent = text;
    }

    function updateHint() {
      document.getElementById('hintText').textContent = rangeData
        ? 'Ready — click to open the model builder' : 'Select a data range to continue';
    }

    Office.onReady(async (info) => {
      if (info.host === Office.HostType.Excel) {
        await loadNamedRanges();
        await watchSelection();
        await autoDetectRange();
        updateHint();
      }
    });
  </script>
</body>
</html>
