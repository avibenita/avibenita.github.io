<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Hub</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../src/shared/css/taskpane-light.css" />

  <style>
    body { overflow-x: hidden; }

    /* ── Header ──────────────────────────────────────────────────── */
    .hub-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .hub-brand { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
    .hub-brand-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, #f97316, #ea580c);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff;
      box-shadow: 0 2px 6px rgba(249,115,22,.22);
    }
    .hub-brand-text .name  { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
    .hub-brand-text .tagline { font-size: 10px; color: var(--text-muted); }

    /* ── Search ──────────────────────────────────────────────────── */
    .hub-search-wrap { position: relative; }
    .hub-search-wrap i {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 11px; pointer-events: none;
    }
    #hubSearch {
      width: 100%; padding: 6px 9px 6px 28px;
      border: 1.5px solid var(--border); border-radius: 7px;
      background: var(--surface-1); color: var(--text-primary);
      font-size: 11.5px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    #hubSearch:focus {
      outline: none; border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(249,115,22,.08);
      background: var(--surface-0);
    }

    /* ── Quick start ─────────────────────────────────────────────── */
    .quick-start {
      padding: 8px 14px 7px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-1);
    }
    .quick-label {
      font-size: 9.5px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px;
    }
    .quick-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .quick-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px;
      background: var(--surface-0); border: 1.5px solid var(--border);
      font-size: 10.5px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; transition: all .13s; white-space: nowrap;
    }
    .quick-chip i { font-size: 9px; color: var(--accent-1); }
    .quick-chip:hover {
      border-color: var(--accent-1); color: var(--accent-1);
      background: rgba(249,115,22,.04);
    }

    /* ── Module list ─────────────────────────────────────────────── */
    .modules-list { padding: 8px 10px; display: flex; flex-direction: column; }

    .group-label {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .7px;
      padding: 10px 2px 4px;
      display: flex; align-items: center; gap: 5px;
    }
    .group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .group-block.hidden { display: none; }

    /* ── Card: single compact row ────────────────────────────────── */
    .module-card {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 9px; border-radius: 8px;
      cursor: pointer; transition: all .13s;
      border: 1.5px solid var(--border);
      background: var(--surface-0);
      margin-bottom: 4px;
    }
    .module-card:hover {
      background: var(--surface-1);
      border-color: var(--accent-1);
      box-shadow: 0 1px 6px rgba(249,115,22,.08);
    }
    .module-card:hover .module-arrow { opacity: 1; }

    .module-icon {
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 6px; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px;
    }
    .module-name {
      flex: 1; min-width: 0;
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .module-arrow {
      color: var(--text-muted); font-size: 9px; opacity: 0;
      transition: opacity .13s; flex-shrink: 0;
    }

    /* ── Info button ─────────────────────────────────────────────── */
    .mod-info-btn {
      width: 18px; height: 18px; flex-shrink: 0; border-radius: 50%;
      background: rgba(0,0,0,.05); border: 1px solid var(--border-dark);
      color: var(--text-muted); font-size: 9.5px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .13s, color .13s, border-color .13s;
      font-style: normal; line-height: 1; user-select: none;
    }
    .mod-info-btn:hover {
      background: var(--accent-1); color: #fff; border-color: var(--accent-1);
    }

    /* ── Info popup: fixed to viewport so it's never clipped ─────── */
    #infoPopup {
      display: none; position: fixed; z-index: 9999;
      background: #fff; border: 1.5px solid var(--border-dark);
      border-radius: 10px; padding: 12px 14px;
      width: 220px;
      box-shadow: 0 8px 28px rgba(0,0,0,.16);
      font-size: 11px; line-height: 1.55; color: var(--text-secondary);
      pointer-events: auto;
    }
    #infoPopup.open { display: block; }
    #infoPopup .pip-title {
      font-size: 11.5px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 7px; display: flex; align-items: center; gap: 6px;
    }
    #infoPopup ul { margin: 0; padding: 0 0 0 14px; }
    #infoPopup ul li { margin-bottom: 3px; }

    /* ── No results ──────────────────────────────────────────────── */
    .no-results {
      text-align: center; padding: 20px 14px;
      color: var(--text-muted); font-size: 11.5px; display: none;
    }
    .no-results i { font-size: 22px; margin-bottom: 7px; display: block; }

    /* ── AI Advisor ──────────────────────────────────────────────── */
    .advisor-strip {
      margin: 4px 10px 14px;
      border: 1.5px dashed var(--border);
      border-radius: 8px; padding: 9px 12px;
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; transition: all .13s;
      background: var(--surface-0);
    }
    .advisor-strip:hover { border-color: var(--accent-2); background: rgba(59,130,246,.03); }
    .advisor-icon {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 7px;
      background: linear-gradient(135deg, rgba(59,130,246,.12), rgba(139,92,246,.12));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--accent-2);
    }
    .advisor-text .advisor-title { font-size: 11.5px; font-weight: 700; color: var(--text-primary); }
    .advisor-text .advisor-desc  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .advisor-chevron { margin-left: auto; color: var(--text-muted); font-size: 9px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="hub-container">

    <!-- Header -->
    <div class="hub-header">
      <div class="hub-brand">
        <div class="hub-brand-icon"><i class="fa-solid fa-chart-line"></i></div>
        <div class="hub-brand-text">
          <div class="name">Statistico Analytics</div>
          <div class="tagline">Interactive statistical analysis for Excel</div>
        </div>
      </div>
      <div class="hub-search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="hubSearch" type="text" placeholder="Search analysis…" oninput="filterModules(this.value)" autocomplete="off" />
      </div>
    </div>

    <!-- Quick Start -->
    <div class="quick-start">
      <div class="quick-label">Quick Start</div>
      <div class="quick-chips">
        <span class="quick-chip" onclick="navigateToModule('univariate')"><i class="fa-solid fa-chart-bar"></i> Univariate</span>
        <span class="quick-chip" onclick="navigateToModule('regression')"><i class="fa-solid fa-chart-line"></i> Regression</span>
        <span class="quick-chip" onclick="navigateToModule('factor')"><i class="fa-solid fa-cubes"></i> Factor</span>
        <span class="quick-chip" onclick="navigateToModule('anova')"><i class="fa-solid fa-table-cells"></i> ANOVA</span>
      </div>
    </div>

    <!-- Module Groups -->
    <div class="modules-list" id="modulesList">
      <div class="group-block" data-group="descriptive">
        <div class="group-label"><i class="fa-solid fa-chart-bar" style="color:var(--accent-1);font-size:8px;"></i> Descriptive</div>
      </div>
      <div class="group-block" data-group="comparisons">
        <div class="group-label"><i class="fa-solid fa-scale-balanced" style="color:#10b981;font-size:8px;"></i> Group Comparisons</div>
      </div>
      <div class="group-block" data-group="multivariate">
        <div class="group-label"><i class="fa-solid fa-network-wired" style="color:#8b5cf6;font-size:8px;"></i> Multivariate</div>
      </div>
    </div>

    <!-- No results -->
    <div class="no-results" id="noResults">
      <i class="fa-solid fa-magnifying-glass"></i>
      No modules match your search
    </div>

    <!-- AI Advisor -->
    <div class="advisor-strip" onclick="showAdvisor()">
      <div class="advisor-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
      <div class="advisor-text">
        <div class="advisor-title">Not sure which test to use?</div>
        <div class="advisor-desc">AI Test Advisor — answer 3 questions</div>
      </div>
      <i class="fa-solid fa-chevron-right advisor-chevron"></i>
    </div>

  </div>

  <!-- Single shared info popup (fixed, never clipped) -->
  <div id="infoPopup">
    <div class="pip-title" id="popupTitle"></div>
    <ul id="popupList"></ul>
  </div>

  <script>
    const MODULES = [
      { id:'univariate',    group:'descriptive',  icon:'fa-chart-bar',       color:'#f97316', bg:'rgba(249,115,22,.1)',
        name:'Univariate',          info:['Mean, median, mode, SD, skewness, kurtosis','Histograms & box plots','Normality tests (Shapiro-Wilk, K-S)','Outlier detection','Frequency tables'] },
      { id:'correlations',  group:'descriptive',  icon:'fa-diagram-project', color:'#06b6d4', bg:'rgba(6,182,212,.1)',
        name:'Correlations',        info:['Pearson & Spearman matrices','Partial & semi-partial correlations','Correlation heatmap','Significance testing','Pairwise scatter plots'] },
      { id:'independent',   group:'comparisons',  icon:'fa-not-equal',       color:'#f59e0b', bg:'rgba(245,158,11,.1)',
        name:'Independent Means',   info:['Independent samples t-test','Welch correction for unequal variance',"Levene's & Brown-Forsythe tests","Effect size (Cohen's d)",'Mann-Whitney U (non-parametric)'] },
      { id:'anova',         group:'comparisons',  icon:'fa-table-cells',     color:'#10b981', bg:'rgba(16,185,129,.1)',
        name:'ANOVA',               info:['One-way & two-way ANOVA','Factorial & interaction effects','Post-hoc tests (Tukey, Bonferroni)','Effect size (η²)','Kruskal-Wallis (non-parametric)'] },
      { id:'dependent',     group:'comparisons',  icon:'fa-repeat',          color:'#10b981', bg:'rgba(16,185,129,.1)',
        name:'Repeated Measures',   info:['Paired t-test','One-way repeated measures ANOVA',"Mauchly's sphericity test",'Greenhouse-Geisser correction','Wilcoxon signed-rank (non-parametric)'] },
      { id:'mixed',         group:'comparisons',  icon:'fa-sitemap',         color:'#10b981', bg:'rgba(16,185,129,.1)',
        name:'Mixed Model',         info:['Fixed & random effects','Random intercepts & slopes','AIC / BIC model comparison','Intraclass correlation (ICC)','Residual diagnostics'] },
      { id:'regression',    group:'multivariate', icon:'fa-chart-line',      color:'#3b82f6', bg:'rgba(59,130,246,.1)',
        name:'Regression',          info:['Multiple linear regression','Standardised & unstandardised coefficients','R², adjusted R², F-test',"Residual plots & Cook's D",'VIF multicollinearity check'] },
      { id:'logistic',      group:'multivariate', icon:'fa-percent',         color:'#ef4444', bg:'rgba(239,68,68,.1)',
        name:'Logistic Regression', info:['Binary logistic regression','Odds ratios & 95% CI','Hosmer-Lemeshow goodness-of-fit','ROC curve & AUC','Classification table'] },
      { id:'factor',        group:'multivariate', icon:'fa-cubes',           color:'#8b5cf6', bg:'rgba(139,92,246,.1)',
        name:'Factor Analysis',     info:['Exploratory Factor Analysis (EFA)','PCA & PAF extraction','Varimax, Promax, Oblimin rotation','KMO & Bartlett adequacy tests','Scree plot & loadings matrix'] },
      { id:'pca',           group:'multivariate', icon:'fa-circle-nodes',    color:'#a855f7', bg:'rgba(168,85,247,.1)',
        name:'PCA',                 info:['Principal Component Analysis','Eigenvalue decomposition','Scree plot & variance explained','Component loadings & scores','Biplot visualisation'] },
      { id:'meta-analysis', group:'multivariate', icon:'fa-layer-group',     color:'#6366f1', bg:'rgba(99,102,241,.1)',
        name:'Meta-Analysis',       info:['Fixed & random effects models','Forest plot','Heterogeneity (I², Q-test)',"Funnel plot & Egger's test",'Effect size conversions'] },
    ];

    Office.onReady(info => {
      if (info.host === Office.HostType.Excel) renderModules(MODULES);
      else showError('This add-in is designed for Excel only.');
    });

    function renderModules(list) {
      ['descriptive','comparisons','multivariate'].forEach(g => {
        const block = document.querySelector(`.group-block[data-group="${g}"]`);
        if (!block) return;
        block.querySelectorAll('.module-card').forEach(c => c.remove());
        const cards = list.filter(m => m.group === g);
        cards.forEach(m => block.appendChild(makeCard(m)));
        block.classList.toggle('hidden', cards.length === 0);
      });
      document.getElementById('noResults').style.display = list.length ? 'none' : 'block';
    }

    function makeCard(m) {
      const div = document.createElement('div');
      div.className = 'module-card';
      div.onclick = () => navigateToModule(m.id);
      div.innerHTML = `
        <div class="module-icon" style="background:${m.bg};color:${m.color};">
          <i class="fa-solid ${m.icon}"></i>
        </div>
        <div class="module-name">${m.name}</div>
        <button class="mod-info-btn" title="What's included">i</button>
        <i class="fa-solid fa-chevron-right module-arrow"></i>`;

      div.querySelector('.mod-info-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        showPopup(m, this);
      });
      return div;
    }

    /* ── Shared popup logic ────────────────────────────────────── */
    const popup  = document.getElementById('infoPopup');
    const ptitle = document.getElementById('popupTitle');
    const plist  = document.getElementById('popupList');
    let   _activeBtn = null;

    function showPopup(m, btn) {
      if (_activeBtn === btn && popup.classList.contains('open')) {
        closePopup(); return;
      }
      _activeBtn = btn;

      /* Populate */
      ptitle.innerHTML = `<i class="fa-solid ${m.icon}" style="color:${m.color};font-size:11px;"></i> ${m.name}`;
      plist.innerHTML  = m.info.map(b => `<li>${b}</li>`).join('');

      /* Position: fixed, anchored below the button, nudged left so it
         stays fully within the viewport even in a narrow pane */
      const r   = btn.getBoundingClientRect();
      const vw  = window.innerWidth;
      const W   = 220; /* popup width */
      let left  = r.right - W;          /* try right-aligned to button */
      if (left < 6) left = 6;           /* never bleed left */
      if (left + W > vw - 6) left = vw - W - 6; /* never bleed right */

      popup.style.left = left + 'px';
      popup.style.top  = (r.bottom + 5) + 'px';
      popup.classList.add('open');
    }

    function closePopup() {
      popup.classList.remove('open');
      _activeBtn = null;
    }

    document.addEventListener('click', function(e) {
      if (!popup.contains(e.target)) closePopup();
    });

    /* ── Navigation & utils ────────────────────────────────────── */
    function filterModules(q) {
      const t = q.trim().toLowerCase();
      renderModules(t ? MODULES.filter(m => m.name.toLowerCase().includes(t)) : MODULES);
    }

    function navigateToModule(id) {
      window.location.href = `./${id}/${id}.html?v=${Date.now()}`;
    }

    function showAdvisor() {
      alert('AI Test Advisor coming soon!\n\nIt will guide you to the right analysis based on your data type and research goal.');
    }

    function showError(msg) {
      document.getElementById('modulesList').innerHTML =
        `<div style="text-align:center;padding:24px;color:#ef4444;font-size:12px;">
           <i class="fa-solid fa-triangle-exclamation" style="font-size:28px;margin-bottom:10px;display:block;"></i>${msg}</div>`;
    }

    window.navigateToModule = navigateToModule;
  </script>
</body>
</html>
