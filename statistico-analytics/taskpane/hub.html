<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Hub</title>
  
  <!-- Office.js -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  
  <!-- Light Minimal Taskpane CSS -->
  <link rel="stylesheet" href="../src/shared/css/taskpane-light.css" />

  <style>
    /* ── Hub overrides & new components ───────────────────────────── */
    body { overflow-x: hidden; }

    .hub-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-0);
    }
    .hub-brand {
      display: flex; align-items: center; gap: 10px; margin-bottom: 2px;
    }
    .hub-brand-icon {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, #f97316, #ea580c);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff;
      box-shadow: 0 2px 8px rgba(249,115,22,.25);
    }
    .hub-brand-text { line-height: 1.2; }
    .hub-brand-text .name {
      font-size: 15px; font-weight: 700; color: var(--text-primary);
    }
    .hub-brand-text .tagline {
      font-size: 10.5px; color: var(--text-muted);
    }

    /* Search */
    .hub-search-wrap {
      margin-top: 10px; position: relative;
    }
    .hub-search-wrap i {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 12px; pointer-events: none;
    }
    #hubSearch {
      width: 100%; padding: 7px 10px 7px 30px;
      border: 1.5px solid var(--border); border-radius: 7px;
      background: var(--surface-1); color: var(--text-primary);
      font-size: 12px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    #hubSearch:focus {
      outline: none; border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(249,115,22,.08);
      background: var(--surface-0);
    }

    /* Quick start */
    .quick-start {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-1);
    }
    .quick-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 7px;
    }
    .quick-chips {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .quick-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      background: var(--surface-0); border: 1.5px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .quick-chip i { font-size: 10px; color: var(--accent-1); }
    .quick-chip:hover {
      border-color: var(--accent-1); color: var(--accent-1);
      background: rgba(249,115,22,.04);
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(249,115,22,.1);
    }

    /* Module list */
    .modules-list {
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 0;
    }

    /* Group section header */
    .group-label {
      font-size: 9.5px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .7px;
      padding: 12px 4px 5px; display: flex; align-items: center; gap: 6px;
    }
    .group-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Card */
    .module-card {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 7px;
      cursor: pointer; transition: background .13s, transform .13s;
      border: 1.5px solid transparent; margin-bottom: 2px;
      position: relative;
    }
    .module-card:hover {
      background: var(--surface-1);
      border-color: var(--border);
      transform: translateX(2px);
    }
    .module-card:hover .module-arrow { opacity: 1; }
    .module-icon {
      width: 30px; height: 30px; flex-shrink: 0;
      border-radius: 7px; display: flex;
      align-items: center; justify-content: center;
      font-size: 13px;
    }
    .module-text { flex: 1; min-width: 0; }
    .module-name {
      font-size: 12.5px; font-weight: 600; color: var(--text-primary);
      line-height: 1.2; margin-bottom: 1px;
    }
    .module-description {
      font-size: 10.5px; color: var(--text-muted);
      line-height: 1.3; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .module-arrow {
      color: var(--text-muted); font-size: 10px; opacity: 0;
      transition: opacity .13s; flex-shrink: 0;
    }

    /* No results */
    .no-results {
      text-align: center; padding: 24px 16px;
      color: var(--text-muted); font-size: 12px; display: none;
    }
    .no-results i { font-size: 24px; margin-bottom: 8px; display: block; }

    /* AI Advisor footer */
    .advisor-strip {
      margin: 6px 12px 14px;
      border: 1.5px dashed var(--border);
      border-radius: 9px; padding: 11px 14px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: all .15s;
      background: var(--surface-0);
    }
    .advisor-strip:hover {
      border-color: var(--accent-2);
      background: rgba(59,130,246,.03);
    }
    .advisor-icon {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 8px;
      background: linear-gradient(135deg, rgba(59,130,246,.12), rgba(139,92,246,.12));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--accent-2);
    }
    .advisor-text .advisor-title {
      font-size: 12px; font-weight: 700; color: var(--text-primary);
    }
    .advisor-text .advisor-desc {
      font-size: 10.5px; color: var(--text-muted); margin-top: 1px;
    }
    .advisor-chevron {
      margin-left: auto; color: var(--text-muted); font-size: 10px; flex-shrink: 0;
    }

    /* Hide group when all cards hidden */
    .group-block.hidden { display: none; }
  </style>
</head>
<body>
  <div class="hub-container">

    <!-- Header -->
    <div class="hub-header">
      <div class="hub-brand">
        <div class="hub-brand-icon"><i class="fa-solid fa-chart-line"></i></div>
        <div class="hub-brand-text">
          <div class="name">Statistico Analytics</div>
          <div class="tagline">Interactive statistical analysis for Excel</div>
        </div>
      </div>
      <div class="hub-search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="hubSearch" type="text" placeholder="Search analysis…" oninput="filterModules(this.value)" autocomplete="off" />
      </div>
    </div>

    <!-- Quick Start -->
    <div class="quick-start">
      <div class="quick-label">Quick Start</div>
      <div class="quick-chips">
        <span class="quick-chip" onclick="navigateToModule('univariate')"><i class="fa-solid fa-chart-bar"></i> Univariate</span>
        <span class="quick-chip" onclick="navigateToModule('regression')"><i class="fa-solid fa-chart-line"></i> Regression</span>
        <span class="quick-chip" onclick="navigateToModule('factor')"><i class="fa-solid fa-cubes"></i> Factor</span>
        <span class="quick-chip" onclick="navigateToModule('anova')"><i class="fa-solid fa-table-cells"></i> ANOVA</span>
      </div>
    </div>

    <!-- Module Groups -->
    <div class="modules-list" id="modulesList">

      <!-- DESCRIPTIVE -->
      <div class="group-block" data-group="descriptive">
        <div class="group-label"><i class="fa-solid fa-chart-bar" style="color:var(--accent-1);font-size:9px;"></i> Descriptive</div>
      </div>

      <!-- COMPARISONS -->
      <div class="group-block" data-group="comparisons">
        <div class="group-label"><i class="fa-solid fa-scale-balanced" style="color:#10b981;font-size:9px;"></i> Group Comparisons</div>
      </div>

      <!-- MULTIVARIATE -->
      <div class="group-block" data-group="multivariate">
        <div class="group-label"><i class="fa-solid fa-network-wired" style="color:#8b5cf6;font-size:9px;"></i> Multivariate</div>
      </div>

    </div>

    <!-- No results message -->
    <div class="no-results" id="noResults">
      <i class="fa-solid fa-magnifying-glass"></i>
      No modules match your search
    </div>

    <!-- AI Advisor -->
    <div class="advisor-strip" onclick="showAdvisor()">
      <div class="advisor-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
      <div class="advisor-text">
        <div class="advisor-title">Not sure which test to use?</div>
        <div class="advisor-desc">AI Test Advisor — answer 3 questions</div>
      </div>
      <i class="fa-solid fa-chevron-right advisor-chevron"></i>
    </div>

  </div>

  <script>
    const MODULES = [
      /* Descriptive */
      { id: 'univariate',   group: 'descriptive',  icon: 'fa-chart-bar',       color: '#f97316', bg: 'rgba(249,115,22,.1)',
        name: 'Univariate',        desc: 'Summary stats, distributions & normality' },
      { id: 'correlations', group: 'descriptive',  icon: 'fa-diagram-project', color: '#06b6d4', bg: 'rgba(6,182,212,.1)',
        name: 'Correlations',      desc: 'Pearson, Spearman & partial correlations' },
      /* Comparisons */
      { id: 'independent',  group: 'comparisons',  icon: 'fa-not-equal',       color: '#f59e0b', bg: 'rgba(245,158,11,.1)',
        name: 'Independent Means', desc: 'Two-group comparison with robust checks' },
      { id: 'anova',        group: 'comparisons',  icon: 'fa-table-cells',     color: '#10b981', bg: 'rgba(16,185,129,.1)',
        name: 'ANOVA',             desc: 'One-way, two-way & factorial designs' },
      { id: 'dependent',    group: 'comparisons',  icon: 'fa-repeat',          color: '#10b981', bg: 'rgba(16,185,129,.1)',
        name: 'Repeated Measures', desc: 'Paired samples & within-subject designs' },
      { id: 'mixed',        group: 'comparisons',  icon: 'fa-sitemap',         color: '#10b981', bg: 'rgba(16,185,129,.1)',
        name: 'Mixed Model',       desc: 'Linear mixed-effects with random effects' },
      /* Multivariate */
      { id: 'regression',   group: 'multivariate', icon: 'fa-chart-line',      color: '#3b82f6', bg: 'rgba(59,130,246,.1)',
        name: 'Regression',        desc: 'OLS with diagnostics & predictions' },
      { id: 'logistic',     group: 'multivariate', icon: 'fa-percent',         color: '#ef4444', bg: 'rgba(239,68,68,.1)',
        name: 'Logistic Regression', desc: 'Binary & multinomial classification' },
      { id: 'factor',       group: 'multivariate', icon: 'fa-cubes',           color: '#8b5cf6', bg: 'rgba(139,92,246,.1)',
        name: 'Factor Analysis',   desc: 'EFA, latent structure & dimension reduction' },
      { id: 'pca',          group: 'multivariate', icon: 'fa-circle-nodes',    color: '#a855f7', bg: 'rgba(168,85,247,.1)',
        name: 'PCA',               desc: 'Principal components & biplots' },
      { id: 'meta-analysis',group: 'multivariate', icon: 'fa-layer-group',     color: '#6366f1', bg: 'rgba(99,102,241,.1)',
        name: 'Meta-Analysis',     desc: 'Evidence synthesis & effect size pooling' },
    ];

    Office.onReady(info => {
      if (info.host === Office.HostType.Excel) renderModules(MODULES);
      else showError('This add-in is designed for Excel only.');
    });

    function renderModules(list) {
      const groups = ['descriptive', 'comparisons', 'multivariate'];
      groups.forEach(g => {
        const block = document.querySelector(`.group-block[data-group="${g}"]`);
        if (!block) return;
        /* Remove old cards (keep the label div) */
        Array.from(block.querySelectorAll('.module-card')).forEach(c => c.remove());
        const cards = list.filter(m => m.group === g);
        cards.forEach(m => block.appendChild(makeCard(m)));
        block.classList.toggle('hidden', cards.length === 0);
      });
      document.getElementById('noResults').style.display = list.length ? 'none' : 'block';
    }

    function makeCard(m) {
      const div = document.createElement('div');
      div.className = 'module-card';
      div.setAttribute('data-id', m.id);
      div.setAttribute('data-name', m.name.toLowerCase());
      div.setAttribute('data-desc', m.desc.toLowerCase());
      div.onclick = () => navigateToModule(m.id);
      div.innerHTML = `
        <div class="module-icon" style="background:${m.bg}; color:${m.color};">
          <i class="fa-solid ${m.icon}"></i>
        </div>
        <div class="module-text">
          <div class="module-name">${m.name}</div>
          <div class="module-description">${m.desc}</div>
        </div>
        <i class="fa-solid fa-chevron-right module-arrow"></i>`;
      return div;
    }

    function filterModules(q) {
      const term = q.trim().toLowerCase();
      if (!term) { renderModules(MODULES); return; }
      const filtered = MODULES.filter(m =>
        m.name.toLowerCase().includes(term) || m.desc.toLowerCase().includes(term)
      );
      renderModules(filtered);
    }

    function navigateToModule(id) {
      window.location.href = `./${id}/${id}.html?v=${Date.now()}`;
    }

    function showAdvisor() {
      alert('AI Test Advisor coming soon!\n\nIt will guide you to the right analysis based on your data type and research goal.');
    }

    function showError(msg) {
      document.getElementById('modulesList').innerHTML =
        `<div style="text-align:center;padding:24px;color:#ef4444;font-size:12px;">
          <i class="fa-solid fa-triangle-exclamation" style="font-size:28px;margin-bottom:10px;display:block;"></i>${msg}</div>`;
    }

    window.navigateToModule = navigateToModule;
  </script>
</body>
</html>
