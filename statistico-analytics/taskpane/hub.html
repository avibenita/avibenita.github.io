<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistico-Interactive&#8482;</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../src/shared/css/taskpane-light.css" />
  <link rel="stylesheet" href="../dialogs/views/shared-header.css?v=20260519" />

  <style>
    body { overflow-x: hidden; }

    /* ── Header ──────────────────────────────────────────────────── */
    .hub-header {
      padding: 12px 0 8px;
      border-bottom: none;
    }
    .hub-brand {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 10px 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #2f4f6d;
      border-color: color-mix(in srgb, var(--hub-brand-from, #22c55e) 36%, #425a73);
      background-color: #0d2238;
      background-color: color-mix(in srgb, var(--hub-brand-to, #15803d) 30%, #0b1422);
      background-image:
        radial-gradient(110% 140% at 12% 0%, color-mix(in srgb, var(--hub-brand-from, #22c55e) 48%, transparent) 0%, transparent 55%),
        linear-gradient(180deg,
          color-mix(in srgb, var(--hub-brand-from, #22c55e) 40%, #0c1726) 0%,
          color-mix(in srgb, var(--hub-brand-to, #15803d) 34%, #0b1422) 46%,
          color-mix(in srgb, var(--hub-brand-to, #15803d) 24%, #09111d) 100%),
        linear-gradient(rgba(220, 235, 248, 0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(220, 235, 248, 0.16) 1px, transparent 1px),
        linear-gradient(rgba(236, 245, 252, 0.30) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236, 245, 252, 0.30) 1px, transparent 1px);
      background-size: auto, auto, 30px 30px, 30px 30px, 150px 150px, 150px 150px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(7, 16, 28, 0.72),
        0 10px 24px rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow: hidden;
    }
    .hub-brand::before {
      content: "";
      position: absolute;
      width: 132px;
      height: 132px;
      right: -38px;
      top: -36px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.44) 0%, rgba(255,255,255,0.12) 26%, rgba(255,255,255,0) 68%);
      filter: blur(0.4px);
      opacity: 0.34;
      animation: hubBrandPulse 4.6s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }
    .hub-brand::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 10px;
      border: 1px solid rgba(236, 245, 252, 0.32);
      pointer-events: none;
      z-index: 1;
    }
    .hub-brand > * {
      position: relative;
      z-index: 2;
    }
    @keyframes hubBrandPulse {
      0% { transform: translate3d(0, 0, 0) scale(0.9); opacity: 0.2; }
      50% { transform: translate3d(-14px, 10px, 0) scale(1.12); opacity: 0.4; }
      100% { transform: translate3d(0, 0, 0) scale(0.9); opacity: 0.2; }
    }
    .hub-nav-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-top: 11px;
      width: calc(100% + 13px);
      margin-left: -13px;
      padding: 3px;
      box-sizing: border-box;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      position: relative;
      z-index: 4;
    }

    /* Sliding highlight — follows hover, pins to active */
    .hub-tab-slider {
      position: absolute;
      top: 3px;
      left: 3px;
      height: calc(100% - 6px);
      border-radius: 9px;
      background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
      box-shadow: 0 2px 10px rgba(22,163,74,0.45);
      transition: transform 0.22s cubic-bezier(0.34,1.2,0.64,1),
                  width    0.22s cubic-bezier(0.34,1.2,0.64,1),
                  opacity  0.18s ease,
                  background 0.3s ease,
                  box-shadow 0.3s ease;
      pointer-events: none;
      opacity: 0;
      will-change: transform, width;
      z-index: 0;
    }
    .hub-nav-tabs:hover .hub-tab-slider { opacity: 1; }

    .hub-nav-tab {
      position: relative;
      z-index: 1;
      height: 32px;
      padding: 0 14px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
      box-sizing: border-box;
    }
    /* Each tab has its own accent color for inactive state */
    .hub-nav-tab[data-cluster="analytics"]     { color: #374151; }
    .hub-nav-tab[data-cluster="calculators"]   { color: #374151; }
    .hub-nav-tab[data-cluster="applications"]  { color: #374151; }
    .hub-nav-tab:hover { color: #111827 !important; }
    .hub-nav-tab.active {
      color: #ffffff !important;
      font-weight: 700;
    }
    .hub-nav-tab.active::before { display: none; }
    .hub-brand-logo {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .hub-brand-logo .sb-logo-svg {
      width: 100%;
      max-width: 220px;
      height: 52px;
    }

    .hub-search-wrap { position: relative; }
    .hub-search-wrap { display: none; }
    .hub-search-wrap i {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 11px; pointer-events: none;
    }
    #hubSearch {
      width: 100%; padding: 6px 9px 6px 28px;
      border: 1.5px solid var(--border); border-radius: 7px;
      background: var(--surface-1); color: var(--text-primary);
      font-size: 11.5px; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    #hubSearch:focus {
      outline: none; border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(249,115,22,.08);
      background: var(--surface-0);
    }

    /* ── Module list ─────────────────────────────────────────────── */
    .modules-list { padding: 8px 10px; display: flex; flex-direction: column; }

    .group-label {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .7px;
      padding: 10px 2px 4px;
      display: flex; align-items: center; gap: 5px;
    }
    .group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .group-block.hidden { display: none; }

    /* ── Card: single compact row ────────────────────────────────── */
    .module-card {
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      gap: 8px !important;
      padding: 7px 9px !important;
      border-radius: 8px !important;
      cursor: pointer;
      transition: all .13s;
      border: 1.5px solid var(--border) !important;
      background: var(--surface-0) !important;
      margin-bottom: 4px !important;
    }
    .module-card:hover {
      background: var(--surface-1) !important;
      border-color: var(--accent-1) !important;
      box-shadow: 0 1px 6px rgba(249,115,22,.08);
    }
    .module-card:hover .module-arrow { opacity: 1; }
    .module-card.selected {
      background: var(--surface-1) !important;
      border-color: var(--accent-1) !important;
      box-shadow: 0 1px 6px rgba(249,115,22,.12);
    }
    .module-card.selected .module-arrow { opacity: 1; }

    .module-icon {
      width: 26px !important; height: 26px !important; flex-shrink: 0 !important;
      border-radius: 6px !important;
      background: rgba(249,115,22,.1) !important;
      display: flex !important; align-items: center !important; justify-content: center !important;
      font-size: 12px !important;
      color: var(--accent-1) !important;
    }
    .module-icon i { color: var(--accent-1) !important; }
    .module-name {
      flex: 1; min-width: 0;
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .module-arrow {
      color: var(--text-muted); font-size: 9px; opacity: 0;
      transition: opacity .13s; flex-shrink: 0;
    }

    /* ── Info button ─────────────────────────────────────────────── */
    .mod-info-btn {
      width: 18px; height: 18px; flex-shrink: 0; border-radius: 50%;
      background: rgba(0,0,0,.05); border: 1px solid var(--border-dark);
      color: var(--text-muted); font-size: 9.5px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .13s, color .13s, border-color .13s;
      font-style: normal; line-height: 1; user-select: none;
    }
    .mod-info-btn:hover {
      background: var(--accent-1); color: #fff; border-color: var(--accent-1);
    }

    /* ── Info popup: fixed to viewport so it's never clipped ─────── */
    #infoPopup {
      display: none; position: fixed; z-index: 9999;
      background: #fff; border: 1.5px solid var(--border-dark);
      border-radius: 10px; padding: 12px 14px;
      width: 220px;
      box-shadow: 0 8px 28px rgba(0,0,0,.16);
      font-size: 11px; line-height: 1.55; color: var(--text-secondary);
      pointer-events: auto;
    }
    #infoPopup.open { display: block; }
    #infoPopup .pip-title {
      font-size: 11.5px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
    }
    #infoPopup .pip-desc {
      font-size: 10.5px; color: var(--text-secondary); line-height: 1.5;
      margin-bottom: 8px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    #infoPopup ul { margin: 0; padding: 0 0 0 14px; }
    #infoPopup ul li { margin-bottom: 3px; }

    /* ── No results ──────────────────────────────────────────────── */
    .no-results {
      text-align: center; padding: 20px 14px;
      color: var(--text-muted); font-size: 11.5px; display: none;
    }
    .no-results i { font-size: 22px; margin-bottom: 7px; display: block; }
    .hub-tab-shell {
      margin: 0 8px 10px;
      width: 100%;
      box-sizing: border-box;
      background: transparent;
    }
    .hub-content-panel {
      position: relative;
      top: -1px;
      width: 100%;
      box-sizing: border-box;
      background: #ffffff;
      border: 0px solid #8f9baa;
      border-radius: 0 8px 8px 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
      overflow: hidden;
    }

    /* ── Category tiles ───────────────────────────────────────────── */
    .category-tiles {
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .category-tile {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #fcfdff 100%);
      padding: 10px 11px;
      border-left-width: 4px;
      border-left-color: var(--cat-color, #f59e62);
      box-shadow: 0 1px 0 rgba(255,255,255,.85) inset, 0 2px 8px rgba(15,23,42,.04);
      transition: border-color .15s, box-shadow .15s, background .15s, transform .12s;
    }
    .category-tile:hover {
      border-color: var(--cat-color, #f59e62);
      box-shadow: 0 1px 0 rgba(255,255,255,.9) inset, 0 8px 16px rgba(15,23,42,.08);
      background: linear-gradient(180deg, #fffaf6 0%, #fff 100%);
      transform: translateY(-1px);
    }
    .category-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .category-icon {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--cat-color, #f59e62);
      color: #fff;
      box-shadow: 0 2px 6px rgba(15,23,42,.18);
      flex-shrink: 0;
    }
    .category-icon i { font-size: 12px; }
    .category-title {
      font-size: 12.5px;
      font-weight: 700;
      color: #0f172a;
    }
    .category-subtitle {
      font-size: 10.5px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .category-modules {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .category-subgroup + .category-subgroup { margin-top: 8px; }
    .category-subgroup.with-divider {
      padding-top: 8px;
      border-top: 1px dashed #dbe4ee;
    }
    .category-subgroup-label {
      font-size: 10px;
      color: #64748b;
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .category-module-btn {
      border: none;
      background: var(--cat-color, #f59e62);
      color: #ffffff;
      font-size: 10.5px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.22),
        0 6px 8px rgba(0,0,0,0.14);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(0,0,0,0.06) 100%);
      background-blend-mode: overlay;
    }
    .category-module-btn:hover {
      filter: brightness(1.08);
      box-shadow:
        0 4px 0 rgba(0,0,0,0.22),
        0 6px 10px rgba(0,0,0,0.18);
    }
    .category-module-btn:active {
      transform: translateY(3px);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.22),
        0 2px 4px rgba(0,0,0,0.12);
    }
    .category-module-btn.selected {
      transform: translateY(3px);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.22),
        0 2px 4px rgba(0,0,0,0.12);
      font-weight: 700;
    }
    .category-module-btn--soft {
      border-radius: 8px;
    }
    .category-module-btn--soft:hover {
      filter: brightness(1.08);
    }
    .category-module-btn--soft.selected {
      border-color: var(--cat-color-dark, #c2410c);
      background: var(--cat-color-dark, #c2410c);
      color: #fff;
      filter: none;
      box-shadow: 0 0 0 1px rgba(15,23,42,.14);
      font-weight: 700;
    }
    /* ── AI Advisor ──────────────────────────────────────────────── */
    .advisor-strip {
      margin: 4px 10px 14px;
      border: 1.5px dashed var(--border);
      border-radius: 8px; padding: 9px 12px;
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; transition: all .13s;
      background: var(--surface-0);
    }
    .advisor-strip:hover { border-color: var(--accent-2); background: rgba(59,130,246,.03); }
    .advisor-icon {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 7px;
      background: linear-gradient(135deg, rgba(59,130,246,.12), rgba(139,92,246,.12));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--accent-2);
    }
    .advisor-text .advisor-title { font-size: 11.5px; font-weight: 700; color: var(--text-primary); }
    .advisor-text .advisor-desc  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .advisor-chevron { margin-left: auto; color: var(--text-muted); font-size: 9px; flex-shrink: 0; }

    /* ── Global data range (shared across modules) ───────────────── */
    .hub-range-section {
      padding: 10px 10px 6px;
      background: transparent;
      border-bottom: none;
    }
    .hub-range-card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1.5px solid var(--border);
      border-left: 4px solid #35d488;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 4px 14px rgba(15,23,42,.08),
        inset 0 1px 0 rgba(255,255,255,.9);
    }
    .hub-range-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .55px;
      color: var(--text-primary);
      background: linear-gradient(180deg, rgba(53,212,136,.1) 0%, rgba(53,212,136,.04) 100%);
      border-bottom: 1px solid var(--border);
    }
    .hub-range-head > i:first-child {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(53,212,136,.18);
      color: #16a34a;
      font-size: 11px;
      flex-shrink: 0;
    }
    .hub-range-head i { color: var(--accent-1); }
    .hub-range-info-btn {
      margin-left: auto;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border-dark);
      background: var(--surface-0);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .15s;
    }
    .hub-range-info-btn:hover {
      background: var(--accent-1);
      border-color: var(--accent-1);
      color: #fff;
    }
    .hub-range-info {
      display: none;
      margin-top: 8px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-1);
      font-size: 10.5px;
      color: var(--text-secondary);
      line-height: 1.45;
    }
    .hub-range-info.open { display: block; }
    .hub-range-body { padding: 10px 12px 11px; }
    .hub-range-row {
      display: flex;
      gap: 3px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .hub-range-row label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 3px;
      border-radius: 5px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      transition: all .15s;
    }
    .hub-range-row input[type=radio] { display: none; }
    .hub-range-row label.active {
      background: var(--surface-0);
      color: var(--accent-1);
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .hub-range-row label.active i { color: var(--accent-1); }
    .hub-named-list {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .hub-named-list select {
      width: 100%;
      border: none;
      padding: 6px 8px;
      font-size: 12px;
      background: var(--surface-0);
      color: var(--text-primary);
    }
    .hub-range-badge {
      display: none;
      margin-top: 9px;
      padding: 8px 11px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 600;
      color: #166534;
      font-family: Consolas, monospace;
      word-break: break-all;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }
    .hub-range-badge i { color: #16a34a; }
    .hub-range-badge.error {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #9a3412;
    }
    .hub-range-hint {
      margin-top: 8px;
      font-size: 10.5px;
      color: var(--text-muted);
      line-height: 1.45;
    }

  /* ══════════════════════════════════════════════════════════════════
     SVG Preview dark-navy L&F   ·   v2026-05-11
     All palette tokens come from taskpane-preview-animated.svg
     ══════════════════════════════════════════════════════════════════ */

  /* 1. CSS custom properties → dark palette */
  :root {
    --surface-0:      #0f2238;
    --surface-1:      #152d43;
    --surface-2:      #1b3a52;
    --border:         rgba(50,90,130,.50);
    --border-dark:    rgba(50,90,130,.75);
    --text-primary:   #ecf4ff;
    --text-secondary: #b8cbe3;
    --text-muted:     #8ea5c2;
    --accent-1:       #1bcf79;
    --accent-2:       #34f58f;
  }

  /* 2. App shell */
  body {
    background: linear-gradient(160deg, #0a1a2b 0%, #081322 100%) !important;
    color: #ecf4ff !important;
  }

  /* 3. Hub brand header – default dark-green;
        JS writes per-cluster bg via style.background so no !important here */
  .hub-brand {
    background: linear-gradient(160deg, #0d3d24 0%, #071a10 100%);
    background-image: none !important;
    border-color: rgba(53,212,136,.48) !important;
  }
  .hub-brand::after { border-color: rgba(236,245,252,.18) !important; }

  /* 4. Tab bar */
  .hub-nav-tabs {
    background:   #1e3450 !important;
    border-color: rgba(50,90,130,.40) !important;
  }
  .hub-nav-tab { color: #8ea5c2 !important; }
  .hub-nav-tab.active { color: #ffffff !important; }
  .hub-nav-tab:hover:not(.active) { color: #ecf4ff !important; }

  /* 5. Content panel wrapper */
  .hub-content-panel {
    background: transparent !important;
    border:     none !important;
    box-shadow: none !important;
  }

  /* 6. Current-data range section */
  .hub-range-section {
    background:    transparent !important;
    border-bottom: none !important;
    padding:       10px 10px 6px !important;
  }
  .hub-range-card {
    background:       #152d43 !important;
    border:         1.5px solid #21415d !important;
    border-left:    4px solid #35d488 !important;
    border-radius:  10px !important;
    box-shadow:     0 4px 18px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04) !important;
  }
  .hub-range-head {
    background:   linear-gradient(180deg, rgba(53,212,136,.14) 0%, rgba(53,212,136,.05) 100%) !important;
    border-color: #274564 !important;
    color:        #ecf4ff !important;
  }
  .hub-range-head > i:first-child {
    background: rgba(53,212,136,.2) !important;
    color:      #35d488 !important;
  }
  .hub-range-head i { color: #35d488 !important; }
  .hub-range-row {
    background: #162b3f !important;
    border:     1px solid #274564 !important;
  }
  .hub-range-row label { color: #8ea5c2 !important; }
  .hub-range-row label.active {
    background: #214766 !important;
    color:      #d8fbe8 !important;
    box-shadow: 0 1px 4px rgba(0,0,0,.30);
  }
  .hub-range-row label.active i { color: #35d488 !important; }
  .hub-named-list { border-color: #274564 !important; }
  .hub-named-list select { background: #162b3f !important; color: #ecf4ff !important; }
  .hub-range-badge {
    background:   rgba(27,207,121,.14) !important;
    border-color: rgba(53,212,136,.45) !important;
    color:        #d8fbe8 !important;
    box-shadow:   inset 0 1px 0 rgba(255,255,255,.06) !important;
  }
  .hub-range-badge i { color: #35d488 !important; }
  .hub-range-badge.error {
    background:   rgba(239,68,68,.10) !important;
    border-color: rgba(239,68,68,.30) !important;
    color:        #fca5a5 !important;
  }
  .hub-range-hint  { color: #8ea5c2 !important; }
  .hub-range-info  {
    background:   #162b3f !important;
    border-color: #274564 !important;
    color:        #b8cbe3 !important;
  }
  .hub-range-info-btn {
    background:   #1e3a56 !important;
    border-color: #274564 !important;
    color:        #8ea5c2 !important;
  }
  .hub-range-info-btn:hover {
    background:   #35d488 !important;
    border-color: #35d488 !important;
    color:        #071e0e !important;
  }

  /* 7. Category tiles */
  .category-tile {
    background:       #152d43 !important;
    background-image: none !important;
    border-color:     #21415d !important;
    border-left-color: var(--cat-color, #35d488) !important;
    box-shadow:       none !important;
  }
  .category-tile:hover {
    background: #1b3a52 !important;
    box-shadow: 0 4px 16px rgba(0,0,0,.32) !important;
    transform:  translateY(-1px);
  }
  .category-title           { color: #ecf4ff !important; }
  .category-subtitle        { color: #8ea5c2 !important; }
  .category-subgroup-label  { color: #8ea5c2 !important; }
  .category-subgroup.with-divider { border-top-color: #274564 !important; }

  /* 8. Module pill buttons
        JS uses btn.style.setProperty(..., 'important') so CLUSTER_STYLE
        values (updated below) control inline priority; CSS here is fallback */
  .category-module-btn {
    background:       #1e4055 !important;
    background-image: none !important;
    color:            #d8fbe8 !important;
    box-shadow: 0 2px 0 rgba(0,0,0,.38), 0 3px 6px rgba(0,0,0,.22) !important;
  }
  .category-module-btn:hover { filter: brightness(1.14) !important; }
  .category-module-btn:active,
  .category-module-btn.selected {
    background: #1bcf79 !important;
    color:      #071e0e !important;
    box-shadow: 0 1px 2px rgba(0,0,0,.18) !important;
  }
  .category-module-btn--soft {
    background:   #1b3350 !important;
    color:        #b8cbe3 !important;
    border-color: #274564 !important;
    box-shadow:   none !important;
  }
  .category-module-btn--soft.selected {
    background:   #1bcf79 !important;
    border-color: #1bcf79 !important;
    color:        #071e0e !important;
  }

  /* 9. Group separator labels */
  .group-label { color: #8ea5c2 !important; }
  .group-label::after { background: #274564 !important; }

  /* 10. Module list cards (flat view) */
  .module-card { background: #152d43 !important; border-color: #21415d !important; }
  .module-card:hover, .module-card.selected {
    background:   #1b3a52 !important;
    border-color: #35d488 !important;
    box-shadow:   0 2px 8px rgba(27,207,121,.12) !important;
  }
  .module-name  { color: #ecf4ff !important; }
  .module-arrow { color: #8ea5c2 !important; }
  /* module-icon controlled by JS via CLUSTER_STYLE */

  /* 11. AI Advisor strip */
  .advisor-strip {
    background:   #162b3f !important;
    border-color: #274564 !important;
  }
  .advisor-strip:hover {
    background:   #1b3a52 !important;
    border-color: #35d488 !important;
  }
  .advisor-icon { background: rgba(27,207,121,.10) !important; color: #35d488 !important; }
  .advisor-text .advisor-title { color: #ecf4ff !important; }
  .advisor-text .advisor-desc  { color: #8ea5c2 !important; }
  .advisor-chevron              { color: #8ea5c2 !important; }

  /* 12. Info popup */
  #infoPopup {
    background:   #0f2238 !important;
    border-color: #274564 !important;
    color:        #b8cbe3 !important;
  }
  #infoPopup .pip-title { color: #ecf4ff !important; }
  #infoPopup .pip-desc  {
    color:        #b8cbe3 !important;
    border-bottom-color: #274564 !important;
  }

  /* 13. Empty-state */
  .no-results { color: #8ea5c2 !important; }

  /* 14. Scrollbar (WebView2 / Chrome-based) */
  ::-webkit-scrollbar       { width: 5px; }
  ::-webkit-scrollbar-track { background: #0a1a2b; }
  ::-webkit-scrollbar-thumb { background: #274564; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #35d488; }
  </style>
</head>
<body>
  <div class="hub-container">
    <div class="hub-tab-shell">

    <!-- Header -->
    <div class="hub-header">
      <div class="hub-brand">
        <div class="hub-brand-logo" data-statistico-brand-logo></div>
      </div>
      <div class="hub-nav-tabs" role="tablist" aria-label="Statistico clusters" id="hubNavTabs">
        <div class="hub-tab-slider" id="hubTabSlider"></div>
        <button type="button" class="hub-nav-tab active" data-cluster="analytics" onclick="setHubCluster('analytics')">Analytics</button>
        <button type="button" class="hub-nav-tab" data-cluster="calculators" onclick="setHubCluster('calculators')">Calculators</button>
        <button type="button" class="hub-nav-tab" data-cluster="applications" onclick="setHubCluster('applications')">Applications</button>
      </div>
      <div class="hub-search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="hubSearch" type="text" placeholder="Search analysis…" oninput="filterModules(this.value)" autocomplete="off" />
      </div>
    </div>

    <div class="hub-content-panel">
    <!-- Global workbook range (used by all modules) -->
    <div class="hub-range-section" id="hubRangeSection">
      <div class="hub-range-card">
        <div class="hub-range-head">
          <i class="fa-solid fa-table-cells-large"></i> Current Data
          <button
            type="button"
            class="hub-range-info-btn"
            id="hubRangeInfoBtn"
            onclick="hubToggleRangeInfo(event)"
            aria-label="Data range options info"
            title="About range options"
          >i</button>
        </div>
        <div class="hub-range-body">
          <div class="hub-range-row">
            <label id="hubLblNamed" onclick="hubSetRangeMode('named')">
              <input type="radio" name="hubRm" value="named">
              <i class="fa-solid fa-bookmark"></i> Named
            </label>
            <label id="hubLblUsed" class="active" onclick="hubSetRangeMode('used')">
              <input type="radio" name="hubRm" value="used" checked>
              <i class="fa-solid fa-wand-magic-sparkles"></i> Default
            </label>
            <label id="hubLblSelection" onclick="hubSetRangeMode('selection')">
              <input type="radio" name="hubRm" value="selection">
              <i class="fa-solid fa-hand-pointer"></i> Selected
            </label>
          </div>
          <div class="hub-named-list" id="hubNamedRangePanel" style="display:none;">
            <select id="hubNamedRangeSelect" size="4" onchange="hubLoadFromNamedRange()">
              <option value="">— Select a named range —</option>
            </select>
          </div>
          <div class="hub-range-badge" id="hubRangeBadge">
            <i class="fa-solid fa-check-circle"></i> <span id="hubRangeBadgeText"></span>
          </div>
          <div class="hub-range-info" id="hubRangeInfo">
            <strong>Named</strong>: use an existing named range.<br />
            <strong>Default</strong>: use the worksheet used range.<br />
            <strong>Selected</strong>: use your current Excel selection.<br />
            Include a header row with variable names and at least one data row.
          </div>
        </div>
      </div>
    </div>

    <div class="category-tiles" id="categoryTiles"></div>

    <!-- No results -->
    <div class="no-results" id="noResults">
      <i class="fa-solid fa-magnifying-glass"></i>
      No categories match your search
    </div>

    <!-- AI Advisor -->
    <div class="advisor-strip" id="advisorStrip" onclick="showAdvisor()">
      <div class="advisor-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
      <div class="advisor-text">
        <div class="advisor-title">Not sure which test to use?</div>
        <div class="advisor-desc">AI Test Advisor — answer 3 questions</div>
      </div>
      <i class="fa-solid fa-chevron-right advisor-chevron"></i>
    </div>
    </div>
    </div>

  </div>

  <!-- Single shared info popup (fixed, never clipped) -->
  <div id="infoPopup">
    <div class="pip-title" id="popupTitle"></div>
    <p class="pip-desc" id="popupDesc"></p>
    <ul id="popupList"></ul>
  </div>

  <script src="../dialogs/views/shared-brand-logo.js?v=20260520"></script>
  <script src="global-range-store.js?v=20260325a"></script>
  <script src="hub-range.js?v=20260325c"></script>
  <script src="../src/shared/js/tooltip-template.js?v=20260429c"></script>
  <script src="dialog-sizes.js?v=20260519b"></script>
  <script src="univariate/univariate-dialog-payload.js?v=20260519e"></script>
  <script src="hub-app.js?v=20260519e"></script>
  <script>
    /* ── Segmented-control sliding highlight for hub tabs ─────────── */
    (function initHubTabSlider() {
      var tabsRow = document.getElementById('hubNavTabs');
      var slider  = document.getElementById('hubTabSlider');
      if (!tabsRow || !slider) return;

      /* Per-cluster appearance — colours to match the header card */
      var CLUSTER_STYLE = {
        analytics:    {
          bg: 'linear-gradient(135deg,#1bcf79 0%,#34f58f 100%)',
          shadow: '0 2px 10px rgba(27,207,121,0.45)',
          activeText: '#071e0e',
          headerBg: 'linear-gradient(160deg,#0d3d24 0%,#071a10 100%)',
          iconBg: 'linear-gradient(135deg,#1bcf79,#34f58f)',
          iconShadow: '0 2px 6px rgba(27,207,121,0.30)',
          listIconBg: 'rgba(27,207,121,0.12)',
          listIconColor: '#35d488',
          tileAccent: '#35d488',
          btnBg: '#1e4055',
          btnText: '#d8fbe8',
          catIconBg: 'rgba(27,207,121,0.12)',
          catIconColor: '#35d488'
        },
        calculators:  {
          bg: 'linear-gradient(135deg,#fde047 0%,#ca8a04 100%)',
          shadow: '0 2px 8px rgba(202,138,4,0.40)',
          activeText: '#3a2a00',
          headerBg: 'linear-gradient(160deg,#2a1e00 0%,#120c00 100%)',
          iconBg: 'linear-gradient(135deg,#fde047,#ca8a04)',
          iconShadow: '0 2px 6px rgba(202,138,4,0.35)',
          listIconBg: 'rgba(253,224,71,0.14)',
          listIconColor: '#fbbf24',
          tileAccent: '#ca8a04',
          btnBg: '#2a1e04',
          btnText: '#fde68a',
          catIconBg: 'rgba(253,224,71,0.14)',
          catIconColor: '#fbbf24'
        },
        applications: {
          bg: 'linear-gradient(135deg,#c7b6ff 0%,#7d6bc7 100%)',
          shadow: '0 2px 10px rgba(125,107,199,0.45)',
          activeText: '#180e38',
          headerBg: 'linear-gradient(160deg,#1a0e38 0%,#0d0820 100%)',
          iconBg: 'linear-gradient(135deg,#c7b6ff,#7d6bc7)',
          iconShadow: '0 2px 6px rgba(125,107,199,0.35)',
          listIconBg: 'rgba(125,107,199,0.15)',
          listIconColor: '#a78bfa',
          tileAccent: '#7d6bc7',
          btnBg: '#1e1040',
          btnText: '#c4b5fd',
          catIconBg: 'rgba(125,107,199,0.15)',
          catIconColor: '#a78bfa'
        }
      };

      function applyClusterStyle(clusterId) {
        var s = CLUSTER_STYLE[clusterId] || CLUSTER_STYLE.analytics;

        /* Pill colour only — strip track stays neutral */
        slider.style.background = s.bg;
        slider.style.boxShadow  = s.shadow;

        /* Active tab text colour (dark for light pills like yellow) */
        var active = tabsRow.querySelector('.hub-nav-tab.active');
        if (active) active.style.setProperty('color', s.activeText, 'important');
        /* Reset inline color on inactive tabs so CSS class colors apply */
        tabsRow.querySelectorAll('.hub-nav-tab:not(.active)').forEach(function(t) { t.style.removeProperty('color'); });

        /* Header card background (bypasses color-mix which WebView2 doesn't support) */
        var brandCard = document.querySelector('.hub-brand');
        if (brandCard) brandCard.style.background = s.headerBg;


        /* Update global --cat-color so CSS-driven tile borders respond */
        document.documentElement.style.setProperty('--cat-color', s.tileAccent);
        document.documentElement.style.setProperty('--cat-color-dark', s.tileAccent);

        /* Category icons: light gray bg + dark symbol */
        document.querySelectorAll('.category-icon').forEach(function(icon) {
          icon.style.setProperty('background', s.catIconBg, 'important');
          icon.style.boxShadow = 'none';
          var sym = icon.querySelector('i');
          if (sym) sym.style.setProperty('color', s.catIconColor, 'important');
        });

        /* Category module buttons: filled with cluster color + 3D ledge */
        document.querySelectorAll('.category-module-btn').forEach(function(btn) {
          btn.style.setProperty('background', s.btnBg, 'important');
          btn.style.setProperty('color', s.btnText, 'important');
          btn.style.removeProperty('border-color');
        });

        /* Module list icons (Analytics modules list): light cluster tint + colored symbol */
        document.querySelectorAll('.module-icon').forEach(function(icon) {
          icon.style.setProperty('background', s.catIconBg, 'important');
          var sym = icon.querySelector('i');
          if (sym) sym.style.setProperty('color', s.catIconColor, 'important');
        });
      }

      function getActiveCluster() {
        var active = tabsRow.querySelector('.hub-nav-tab.active');
        return active ? (active.dataset.cluster || 'analytics') : 'analytics';
      }

      function pin(tab) {
        var rowRect = tabsRow.getBoundingClientRect();
        var tabRect = tab.getBoundingClientRect();
        slider.style.width     = tabRect.width + 'px';
        slider.style.transform = 'translateX(' + (tabRect.left - rowRect.left - 3) + 'px)';
      }

      var tabs = Array.from(tabsRow.querySelectorAll('.hub-nav-tab'));
      tabs.forEach(function(tab) {
        tab.addEventListener('mouseenter', function() {
          pin(tab);
          /* Preview only the slider colour */
          var s = CLUSTER_STYLE[tab.dataset.cluster] || CLUSTER_STYLE.analytics;
          slider.style.background = s.bg;
          slider.style.boxShadow  = s.shadow;
          /* Pill left the active tab — make its text dark so it stays readable */
          var active = tabsRow.querySelector('.hub-nav-tab.active');
          if (active && active !== tab) {
            active.style.setProperty('color', '#374151', 'important');
          }
        });
      });

      tabsRow.addEventListener('mouseleave', function() {
        var active = tabsRow.querySelector('.hub-nav-tab.active');
        if (active) {
          pin(active);
          /* Restore slider + active tab text to the pinned cluster */
          var s = CLUSTER_STYLE[active.dataset.cluster] || CLUSTER_STYLE.analytics;
          slider.style.background = s.bg;
          slider.style.boxShadow  = s.shadow;
          active.style.setProperty('color', s.activeText, 'important');
        } else { slider.style.opacity = '0'; }
      });

      /* Re-pin and recolour whenever .active moves (set by hub-app.js setHubCluster) */
      new MutationObserver(function() {
        var active = tabsRow.querySelector('.hub-nav-tab.active');
        if (active) {
          pin(active);
          slider.style.opacity = '1';
          applyClusterStyle(active.dataset.cluster || 'analytics');
        }
      }).observe(tabsRow, { subtree: true, attributeFilter: ['class'] });

      /* Re-apply icon colours whenever hub content re-renders */
      var contentPanel = document.getElementById('hubContent') || document.querySelector('.hub-content-panel');
      if (contentPanel) {
        new MutationObserver(function() {
          applyClusterStyle(getActiveCluster());
        }).observe(contentPanel, { childList: true, subtree: true });
      }

      /* Initial pin after layout */
      requestAnimationFrame(function() {
        var active = tabsRow.querySelector('.hub-nav-tab.active');
        if (active) {
          pin(active);
          slider.style.opacity = '1';
          applyClusterStyle(active.dataset.cluster || 'analytics');
        }
      });
    })();
  </script>
</body>
</html>
