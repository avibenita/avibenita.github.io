<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Mixed Model – Statistico Analytics</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7c3aed;
      --purple-dark: #6d28d9;
      --purple-light: #f5f3ff;
      --purple-border: #ddd6fe;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f3f4f6;
    }

    /* ── Module header ────────────────────────────────────── */
    .module-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 2px solid var(--purple-border);
    }
    .module-header-title {
      display: flex; align-items: center; gap: 7px;
      font-weight: 700; font-size: 14px; color: var(--purple-dark);
    }
    .module-header-title i { color: var(--purple); }
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      background: none; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 12px; color: #6b7280; cursor: pointer;
      transition: background .15s;
    }
    .back-btn:hover { background: var(--purple-light); color: var(--purple-dark); border-color: var(--purple-border); }

    /* ── Main content ─────────────────────────────────────── */
    .taskpane-content {
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Section card ─────────────────────────────────────── */
    .section-card {
      background: #fff;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      transition: border-color .2s;
    }
    .section-card:focus-within { border-color: var(--purple-border); }
    .section-label {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--purple-dark);
      background: var(--purple-light);
      border-bottom: 1px solid var(--purple-border);
    }
    .section-label i { color: var(--purple); }
    .section-body { padding: 12px; }

    /* ── Saved models row ────────────────────────────────── */
    .saved-row { display: flex; gap: 6px; align-items: center; }
    .saved-select {
      flex: 1; min-width: 0;
      padding: 7px 10px;
      font-size: 12px; color: #1f2937;
      border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; cursor: pointer;
    }
    .saved-select:focus { outline: 2px solid var(--purple); border-color: var(--purple); }
    .reset-btn {
      flex-shrink: 0; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #fca5a5; border-radius: 6px;
      background: #fff; color: #ef4444;
      font-size: 13px; cursor: pointer; transition: background .15s;
    }
    .reset-btn:hover:not(:disabled) { background: #fef2f2; }
    .reset-btn:disabled { opacity: .3; cursor: default; }

    /* Delete model hint ─────────────────────────────────── */
    .delete-hint {
      display: none;
      margin-top: 8px;
      padding: 7px 10px;
      background: var(--purple-light); border: 1px solid var(--purple-border); border-radius: 6px;
      font-size: 11px; color: #4c1d95;
      align-items: center; justify-content: space-between; gap: 8px;
    }
    .delete-hint.visible { display: flex; }
    .delete-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      background: #ef4444; color: #fff; border: none; border-radius: 5px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .delete-btn:hover { background: #dc2626; }

    /* ── Segmented radio row ────────────────────────────── */
    .radio-row {
      display: flex; gap: 3px;
      background: #f3f4f6; border-radius: 7px; padding: 3px;
    }
    .radio-row label {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 6px 3px;
      border-radius: 5px;
      font-size: 11.5px; color: #6b7280;
      cursor: pointer; user-select: none;
      transition: all .15s;
    }
    .radio-row input[type=radio] { display: none; }
    .radio-row label.active {
      background: #fff; color: var(--purple-dark); font-weight: 600;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .radio-row label.active i { color: var(--purple); }

    /* ── Named range list ───────────────────────────────── */
    .named-list {
      margin-top: 8px;
      border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden;
    }
    .named-list select {
      width: 100%; border: none;
      padding: 6px 8px; font-size: 12px;
      background: #fff; color: #1f2937;
    }
    .named-list select:focus { outline: none; }

    /* ── Range address badge ────────────────────────────── */
    .range-badge {
      display: none;
      margin-top: 8px; padding: 6px 10px;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
      font-size: 11px; color: #166534; font-family: 'Consolas', monospace;
      word-break: break-all;
    }
    .range-badge i { color: #16a34a; }
    .range-badge.error {
      background: #fff7ed; border-color: #fed7aa; color: #9a3412;
    }

    /* ── Configure / Run button ─────────────────────────── */
    .configure-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 28px;
      font-size: 13px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      border: none; border-radius: 8px;
      cursor: pointer; transition: all .2s;
      width: auto; align-self: center;
      min-width: 180px; max-width: 260px;
      box-shadow: 0 2px 8px rgba(124,58,237,.3);
    }
    .configure-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(124,58,237,.45);
    }
    .configure-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
    .configure-btn.run-mode { background: linear-gradient(135deg, #059669 0%, #047857 100%); box-shadow: 0 2px 8px rgba(5,150,105,.3); }
    .configure-btn.run-mode:hover:not(:disabled) { box-shadow: 0 5px 14px rgba(5,150,105,.45); }

    /* ── Hint text ──────────────────────────────────────── */
    .hint { font-size: 11px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="module-header">
    <div class="module-header-title">
      <i class="fa-solid fa-layer-group"></i>
      Mixed Model
    </div>
    <button class="back-btn" onclick="goBack()">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
  </div>

  <div class="taskpane-content">

    <!-- ① Saved Models ─────────────────────────────────── -->
    <div class="section-card">
      <div class="section-label">
        <i class="fa-solid fa-folder-open"></i> Saved Models
      </div>
      <div class="section-body">
        <div class="saved-row">
          <select id="savedModelSelect" class="saved-select" onchange="onSavedModelChange()">
            <option value="">— New model (configure from scratch) —</option>
          </select>
          <button class="reset-btn" id="resetModelBtn" onclick="resetSavedModel()" disabled title="Deselect model">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="delete-hint" id="deleteHint">
          <span><i class="fa-solid fa-triangle-exclamation"></i> Remove this saved model?</span>
          <button class="delete-btn" onclick="deleteSavedModel()">
            <i class="fa-solid fa-trash"></i> Delete
          </button>
        </div>
      </div>
    </div>

    <!-- ② Pick Range ────────────────────────────────────── -->
    <div class="section-card">
      <div class="section-label">
        <i class="fa-solid fa-table-cells-large"></i> Pick Range
      </div>
      <div class="section-body">

        <div class="radio-row">
          <label id="lblNamed" onclick="setRangeMode('named')">
            <input type="radio" name="rm" value="named">
            <i class="fa-solid fa-bookmark"></i> Named
          </label>
          <label id="lblUsed" class="active" onclick="setRangeMode('used')">
            <input type="radio" name="rm" value="used" checked>
            <i class="fa-solid fa-wand-magic-sparkles"></i> Used Range
          </label>
          <label id="lblSelection" onclick="setRangeMode('selection')">
            <input type="radio" name="rm" value="selection">
            <i class="fa-solid fa-hand-pointer"></i> XL Selection
          </label>
        </div>

        <div class="named-list" id="namedRangePanel" style="display:none;">
          <select id="namedRangeSelect" size="4" onchange="loadFromNamedRange()">
            <option value="">— Select a named range —</option>
          </select>
        </div>

        <div class="range-badge" id="rangeBadge">
          <i class="fa-solid fa-check-circle"></i> <span id="rangeBadgeText"></span>
        </div>
      </div>
    </div>

    <!-- ③ Configure / Run button ─────────────────────────── -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <button class="configure-btn" id="configureBtn" disabled onclick="onConfigureClick()">
        <i class="fa-solid fa-sliders" id="cfgIcon"></i>
        <span id="cfgLabel">Configure Model</span>
      </button>
      <p class="hint" id="hintText">Select a data range to continue</p>
    </div>

  </div><!-- /taskpane-content -->

  <!-- Scripts -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="../../src/shared/js/core/saved-analyses-manager.js"></script>

  <script>
    // ================================================================
    // STATE
    // ================================================================
    let rangeData        = null;
    let rangeAddress     = '';
    let rangeMode        = 'used';
    let selectedModelId  = '';
    let savedModels      = [];
    let activeDialog     = null;

    // ================================================================
    // NAVIGATION
    // ================================================================
    function goBack() { window.location.href = '../hub.html'; }

    // ================================================================
    // RANGE MODE
    // ================================================================
    function setRangeMode(mode) {
      rangeMode = mode;
      document.getElementById('lblNamed')    .classList.toggle('active', mode === 'named');
      document.getElementById('lblUsed')     .classList.toggle('active', mode === 'used');
      document.getElementById('lblSelection').classList.toggle('active', mode === 'selection');
      document.querySelector(`input[value="${mode}"]`).checked = true;
      document.getElementById('namedRangePanel').style.display = (mode === 'named') ? 'block' : 'none';
      if (mode === 'used')           autoDetectRange();
      else if (mode === 'selection') useSelection();
    }

    // ================================================================
    // NAMED RANGES
    // ================================================================
    async function loadNamedRanges() {
      try {
        await Excel.run(async (ctx) => {
          const names = ctx.workbook.names.load('items');
          await ctx.sync();
          const sel = document.getElementById('namedRangeSelect');
          sel.innerHTML = '<option value="">— Select a named range —</option>';
          names.items.forEach(n => {
            const o = document.createElement('option');
            o.value = o.textContent = n.name;
            sel.appendChild(o);
          });
        });
      } catch(e) { console.warn('Named ranges unavailable:', e); }
    }

    async function loadFromNamedRange() {
      const name = document.getElementById('namedRangeSelect').value;
      if (!name) return;
      showRangeLoading();
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.names.getItem(name).getRange();
          rng.load(['values','address']);
          await ctx.sync();
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeError('Could not load: ' + e.message); }
    }

    // ================================================================
    // USED RANGE
    // ================================================================
    async function autoDetectRange() {
      showRangeLoading();
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.worksheets.getActiveWorksheet().getUsedRange();
          rng.load(['values','address']);
          await ctx.sync();
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeError('Could not detect used range'); }
    }

    // ================================================================
    // XL SELECTION
    // ================================================================
    async function useSelection() {
      showRangeLoading();
      try {
        await Excel.run(async (ctx) => {
          const rng = ctx.workbook.getSelectedRange();
          rng.load(['values','address']);
          await ctx.sync();
          if (!rng.values || rng.values.length < 2)
            return showRangeError('Selection too small — needs a header row + data');
          applyRangeData(rng.values, rng.address);
        });
      } catch(e) { showRangeError('Could not read selection'); }
    }

    async function watchSelection() {
      try {
        await Excel.run(async (ctx) => {
          ctx.workbook.onSelectionChanged.add(async () => {
            if (rangeMode === 'selection') await useSelection();
          });
          await ctx.sync();
        });
      } catch(e) {}
    }

    // ================================================================
    // RANGE HELPERS
    // ================================================================
    function applyRangeData(values, address) {
      if (!values || values.length < 2)
        return showRangeError('Need at least 2 rows (header + 1 data row)');
      rangeData    = values;
      rangeAddress = address || '';
      const cols   = (values[0] || []).length;
      const rows   = values.length - 1;
      showRangeBadge(`${address}  –  ${rows} rows × ${cols} cols`, false);
      updateConfigureBtn();
    }

    function showRangeLoading() { showRangeBadge('Loading…', false); }

    function showRangeError(msg) {
      rangeData = null;
      showRangeBadge(msg, true);
      updateConfigureBtn();
    }

    function showRangeBadge(text, isError) {
      const badge = document.getElementById('rangeBadge');
      const txt   = document.getElementById('rangeBadgeText');
      badge.className = 'range-badge' + (isError ? ' error' : '');
      badge.style.display = 'block';
      txt.textContent = text;
    }

    // ================================================================
    // SAVED MODELS
    // ================================================================
    async function loadSavedModels() {
      try {
        savedModels = await SavedAnalysesManager.getAnalysesByModule('mixed');
        savedModels.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        const sel = document.getElementById('savedModelSelect');
        sel.innerHTML = '<option value="">— New model (configure from scratch) —</option>';
        savedModels.forEach(m => {
          const ts = m.timestamp
            ? new Date(m.timestamp).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
            : '';
          const o = document.createElement('option');
          o.value = m.id;
          o.textContent = `${m.name}${ts ? '  (' + ts + ')' : ''}`;
          sel.appendChild(o);
        });
        const saved = sessionStorage.getItem('activeMixedModelId');
        if (saved && savedModels.find(m => m.id === saved)) {
          sel.value = saved;
          selectedModelId = saved;
        } else {
          sel.value = '';
          selectedModelId = '';
        }
        document.getElementById('resetModelBtn').disabled = !selectedModelId;
        document.getElementById('deleteHint').classList.toggle('visible', !!selectedModelId);
        updateConfigureBtn();
      } catch(e) { console.warn('Could not load saved models:', e); }
    }

    function onSavedModelChange() {
      selectedModelId = document.getElementById('savedModelSelect').value;
      if (selectedModelId) sessionStorage.setItem('activeMixedModelId', selectedModelId);
      else                  sessionStorage.removeItem('activeMixedModelId');
      document.getElementById('resetModelBtn').disabled = !selectedModelId;
      document.getElementById('deleteHint').classList.toggle('visible', !!selectedModelId);
      updateConfigureBtn();

      if (selectedModelId && rangeData) {
        const m = savedModels.find(m => m.id === selectedModelId);
        if (m) {
          sessionStorage.setItem('mixedModelSpec', JSON.stringify(m.config));
          openMixedResultsDialog();
        }
      }
    }

    function resetSavedModel() {
      document.getElementById('savedModelSelect').value = '';
      selectedModelId = '';
      sessionStorage.removeItem('activeMixedModelId');
      document.getElementById('resetModelBtn').disabled = true;
      document.getElementById('deleteHint').classList.remove('visible');
      sessionStorage.removeItem('mixedModelSpec');
      updateConfigureBtn();
    }

    async function deleteSavedModel() {
      if (!selectedModelId) return;
      const m = savedModels.find(m => m.id === selectedModelId);
      const name = m ? m.name : 'this model';
      if (!confirm(`Permanently delete "${name}"?`)) return;
      try {
        if (typeof SavedAnalysesManager !== 'undefined')
          await SavedAnalysesManager.deleteAnalysis(selectedModelId);
      } catch(e) { console.warn('Delete failed:', e); }
      resetSavedModel();
      await loadSavedModels();
    }

    // ================================================================
    // CONFIGURE BUTTON STATE
    // ================================================================
    function updateConfigureBtn() {
      const btn      = document.getElementById('configureBtn');
      const lbl      = document.getElementById('cfgLabel');
      const icon     = document.getElementById('cfgIcon');
      const hint     = document.getElementById('hintText');
      const hasSaved = !!selectedModelId;
      const hasRange = !!rangeData;

      btn.disabled = !hasRange;

      if (hasSaved) {
        btn.classList.add('run-mode');
        icon.className = 'fa-solid fa-play';
        lbl.textContent = 'Run Saved Model';
        const m = savedModels.find(m => m.id === selectedModelId);
        hint.textContent = m ? m.name : '';
      } else {
        btn.classList.remove('run-mode');
        icon.className = 'fa-solid fa-sliders';
        lbl.textContent = 'Configure Model';
        hint.textContent = hasRange
          ? 'Ready — click to open the model builder'
          : 'Select a data range to continue';
      }
    }

    function onConfigureClick() {
      if (!rangeData) return;
      if (selectedModelId) {
        const m = savedModels.find(m => m.id === selectedModelId);
        if (m) sessionStorage.setItem('mixedModelSpec', JSON.stringify(m.config));
        openMixedResultsDialog();
      } else {
        openMixedInputDialog();
      }
    }

    // ================================================================
    // DIALOGS
    // ================================================================
    function getDialogsBaseUrl() {
      const href = window.location.href;
      if (href.includes('/taskpane/')) return `${href.split('/taskpane/')[0]}/dialogs/views/`;
      return `${window.location.origin}/dialogs/views/`;
    }

    // Step 1 — open mixed-input.html (model builder)
    function openMixedInputDialog() {
      if (!rangeData) return;
      const url = `${getDialogsBaseUrl()}mixed/mixed-input.html`;
      Office.context.ui.displayDialogAsync(url, { height: 88, width: 25, displayInIframe: false }, (res) => {
        if (res.status === Office.AsyncResultStatus.Failed) {
          alert('Could not open dialog: ' + res.error.message); return;
        }
        activeDialog = res.value;
        setTimeout(() => sendBuilderData(), 600);

        activeDialog.addEventHandler(Office.EventType.DialogMessageReceived, (arg) => {
          try {
            const msg = JSON.parse(arg.message);
            if (msg.action === 'ready' || msg.action === 'requestData') {
              sendBuilderData();
            } else if (msg.action === 'mixedModel') {
              // Model spec received from input screen → store & open results
              const spec = msg.payload || msg.data || {};
              sessionStorage.setItem('mixedModelSpec', JSON.stringify(spec));
              activeDialog.close(); activeDialog = null;
              setTimeout(() => openMixedResultsDialog(), 500);
            } else if (msg.action === 'cancel' || msg.action === 'close') {
              activeDialog.close(); activeDialog = null;
            }
          } catch(e) { console.warn('Dialog message parse error:', e); }
        });
        activeDialog.addEventHandler(Office.EventType.DialogEventReceived, () => { activeDialog = null; });
      });
    }

    // Step 2 — open mixed-results.html (results dashboard)
    function openMixedResultsDialog() {
      const url = `${getDialogsBaseUrl()}mixed/mixed-results.html?cb=${Date.now()}`;
      Office.context.ui.displayDialogAsync(url, { height: 90, width: 75, displayInIframe: false }, (res) => {
        if (res.status === Office.AsyncResultStatus.Failed) {
          alert('Could not open dialog: ' + res.error.message); return;
        }
        activeDialog = res.value;

        activeDialog.addEventHandler(Office.EventType.DialogMessageReceived, (arg) => {
          try {
            const msg = JSON.parse(arg.message);
            if (msg.action === 'ready' || msg.action === 'mixedModelDashboardReady' || msg.action === 'requestData') {
              sendMixedResults();
            } else if (msg.action === 'SAVE_ANALYSIS') {
              handleSaveFromDialog(msg.data);
            } else if (msg.action === 'close') {
              activeDialog.close(); activeDialog = null; loadSavedModels();
            }
          } catch(e) { console.warn('Results dialog message error:', e); }
        });
        activeDialog.addEventHandler(Office.EventType.DialogEventReceived, () => {
          activeDialog = null; loadSavedModels();
        });
        setTimeout(() => sendMixedResults(), 1200);
      });
    }

    // Send data to mixed-input.html
    function sendBuilderData() {
      if (!activeDialog || !rangeData) return;
      const savedSpec = sessionStorage.getItem('mixedModelSpec');
      activeDialog.messageChild(JSON.stringify({
        type: 'MIXED_DATA',
        payload: {
          headers: rangeData[0] || [],
          rows: rangeData.slice(1),
          address: rangeAddress,
          savedModelSpec: savedSpec ? JSON.parse(savedSpec) : null
        }
      }));
    }

    // Send data + model spec to mixed-results.html
    function sendMixedResults() {
      if (!activeDialog || !rangeData) return;
      const modelSpec = JSON.parse(sessionStorage.getItem('mixedModelSpec') || '{}');
      activeDialog.messageChild(JSON.stringify({
        type: 'MIXED_RESULTS',
        payload: {
          headers: rangeData[0] || [],
          rows: rangeData.slice(1),
          address: rangeAddress,
          modelSpec
        }
      }));
    }

    async function handleSaveFromDialog(analysisData) {
      try {
        if (typeof SavedAnalysesManager !== 'undefined') {
          await SavedAnalysesManager.saveAnalysis(analysisData);
          await loadSavedModels();
        }
      } catch(e) { console.error('Save failed:', e); }
    }

    // ================================================================
    // INIT
    // ================================================================
    Office.onReady(async (info) => {
      if (info.host === Office.HostType.Excel) {
        await loadNamedRanges();
        await loadSavedModels();
        await watchSelection();
        await autoDetectRange();
        updateConfigureBtn();
      }
    });
  </script>
</body>
</html>
