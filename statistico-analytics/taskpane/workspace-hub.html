<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistico Workspace</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="../src/shared/css/taskpane-light.css" />
  <style>
    body { overflow-x: hidden; }
    .workspace-header {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }
    .workspace-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .workspace-brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      box-shadow: 0 2px 8px rgba(249,115,22,.25);
      flex-shrink: 0;
    }
    .workspace-brand-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.25;
    }
    .workspace-brand-sub {
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .workspace-nav-tabs {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .workspace-nav-tab {
      border: 1px solid var(--border);
      background: var(--surface-0);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 5px 9px;
      font-size: 10.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .workspace-nav-tab:hover {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: var(--surface-1);
    }
    .workspace-nav-tab.active {
      border-color: var(--accent-1);
      background: rgba(249,115,22,.1);
      color: var(--accent-1);
      box-shadow: 0 0 0 1px rgba(249,115,22,.12) inset;
    }
    .cluster-list {
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .cluster-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface-0);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .12s;
    }
    .cluster-card:hover {
      border-color: var(--cluster-color, #f97316);
      box-shadow: 0 3px 10px rgba(15,23,42,.08);
      transform: translateY(-1px);
    }
    .cluster-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--cluster-color, #f97316);
      color: #fff;
      flex-shrink: 0;
    }
    .cluster-title {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .cluster-subtitle {
      font-size: 10.5px;
      color: var(--text-muted);
      line-height: 1.35;
    }
    .cluster-arrow {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 10px;
      opacity: .75;
    }
    .cluster-card.coming-soon {
      cursor: default;
      opacity: .85;
    }
    .cluster-card.coming-soon:hover {
      border-color: var(--border);
      box-shadow: none;
      transform: none;
    }
    .cluster-badge {
      margin-left: auto;
      font-size: 9px;
      font-weight: 700;
      color: #7c2d12;
      background: #ffedd5;
      border: 1px solid #fdba74;
      border-radius: 999px;
      padding: 3px 7px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
  </style>
</head>
<body>
  <div class="workspace-header">
    <div class="workspace-brand">
      <div class="workspace-brand-icon"><i class="fa-solid fa-layer-group"></i></div>
      <div>
        <div class="workspace-brand-name">Statistico Workspace</div>
        <div class="workspace-brand-sub">Choose an app cluster to continue</div>
      </div>
    </div>
    <div class="workspace-nav-tabs" role="tablist" aria-label="Workspace clusters">
      <button type="button" class="workspace-nav-tab active" aria-current="page"><i class="fa-solid fa-layer-group"></i> Workspace</button>
      <button type="button" class="workspace-nav-tab" onclick="goToAnalyticsHub()"><i class="fa-solid fa-chart-line"></i> Analytics</button>
      <button type="button" class="workspace-nav-tab" onclick="goToCalculatorsHub()"><i class="fa-solid fa-calculator"></i> Calculators</button>
    </div>
  </div>

  <div class="cluster-list" id="clusterList"></div>

  <script src="workspace-hub.js?v=20260412a"></script>
  <script>
    function goToAnalyticsHub() {
      window.location.href = "./hub.html?fromWorkspace=1";
    }
    function goToCalculatorsHub() {
      window.location.href = "https://statistico.live/statistico-calculators/hub.html?fromWorkspace=1";
    }
  </script>
</body>
</html>
