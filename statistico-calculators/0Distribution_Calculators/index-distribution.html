<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution Calculators</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #060f1d;
            --panel: #111f34;
            --panel-2: #0d1a2c;
            --border: rgba(120, 200, 255, 0.25);
            --text: #e7f0ff;
            --muted: #9ab1cc;
            --accent: #78c8ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 20% 0%, rgba(120,165,255,0.10), transparent 25%),
                radial-gradient(circle at 80% 0%, rgba(255,154,99,0.08), transparent 30%),
                linear-gradient(180deg, #071423 0%, #081728 100%);
            color: var(--text);
            overflow: hidden;
        }

        .shell {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 82px 1fr 34px;
        }

        .top-header {
            display: grid;
            grid-template-columns: 220px 1fr 180px;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            border-bottom: 1px solid rgba(120, 200, 255, 0.2);
            background: linear-gradient(90deg, #0a1730 0%, #0e1e39 58%, #14284a 100%);
        }

        .brand {
            color: #f1f7ff;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand i {
            color: #f2a277;
        }

        .header-title {
            justify-self: center;
            color: #ffac80;
            font-size: clamp(1.65rem, 2.2vw, 2.2rem);
            font-weight: 800;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 12px rgba(242, 162, 119, 0.16);
        }

        .header-title i {
            font-size: clamp(1.55rem, 2vw, 2rem);
        }

        .mode-chip {
            justify-self: end;
            border: 1px solid rgba(120, 200, 255, 0.34);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.75rem;
            color: #d8e9ff;
            background: rgba(120, 200, 255, 0.12);
        }

        .app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 10px;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .app::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(to right, rgba(120,165,255,0.14) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(120,165,255,0.14) 1px, transparent 1px),
                linear-gradient(to right, rgba(242,162,119,0.18) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(242,162,119,0.18) 1px, transparent 1px);
            background-size:
                24px 24px,
                24px 24px,
                120px 120px,
                120px 120px;
            opacity: 0.34;
            z-index: 0;
        }

        .app > * {
            position: relative;
            z-index: 1;
        }

        .sidebar {
            border: 1px solid var(--border);
            border-radius: 14px;
            background:
                radial-gradient(circle at 20% 0%, rgba(120,165,255,0.12), transparent 35%),
                linear-gradient(180deg, rgba(10, 28, 52, 0.98) 0%, rgba(6, 18, 36, 1) 100%);
            padding: 12px;
            overflow-y: auto;
            box-shadow:
                inset -1px 0 0 rgba(255,255,255,0.05),
                inset 0 0 40px rgba(120,165,255,0.06);
        }

        .sidebar h1 {
            font-size: 1.02rem;
            margin-bottom: 8px;
            color: #ffd8c1;
        }

        .sidebar p {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .dist-list {
            display: grid;
            gap: 16px;
        }

        details.dist-group {
            margin: 0;
            border: 1px solid rgba(120, 200, 255, 0.24);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(10, 24, 42, 0.7);
        }

        .dist-group summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: 700;
            color: #eef5ff;
            border-bottom: 1px solid rgba(120, 200, 255, 0.18);
            background: linear-gradient(180deg, rgba(16, 37, 64, 0.95), rgba(10, 28, 50, 0.95));
        }

        .dist-group summary::-webkit-details-marker {
            display: none;
        }

        .summary-left {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .summary-left i {
            color: #f2a277;
        }

        .summary-caret {
            color: #f2a277;
            font-size: 0.76rem;
            transition: transform 0.2s ease;
        }

        .dist-group[open] .summary-caret {
            transform: rotate(90deg);
        }

        .dist-items {
            display: grid;
            gap: 1px;
            background: rgba(120, 200, 255, 0.1);
        }

        .dist-btn {
            display: block;
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            border-radius: 8px;
            margin: 2px 2px;
            padding: 8px 10px;
            color: var(--text);
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            font-size: 0.84rem;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .dist-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.08);
        }

        .dist-btn.active {
            background: linear-gradient(180deg, rgba(120,165,255,0.18), rgba(120,165,255,0.10));
            border: 1px solid rgba(120,165,255,0.35);
            box-shadow:
                0 0 12px rgba(120,165,255,0.18),
                inset 0 0 8px rgba(120,165,255,0.08);
        }

        .workspace {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(16, 37, 69, 0.96), rgba(9, 21, 40, 0.98));
            box-shadow: 0 0 0 1px rgba(120, 200, 255, 0.1) inset, 0 0 26px rgba(120, 200, 255, 0.14);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .footer {
            display: grid;
            place-items: center;
            border-top: 1px solid rgba(120, 200, 255, 0.18);
            color: #9fb6d2;
            font-size: 0.76rem;
            background: rgba(7, 20, 34, 0.92);
        }

        /* ── Hamburger button (shown only on mobile) ── */
        .menu-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(120,200,255,0.1);
            border: 1px solid rgba(120,200,255,0.25);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ── Overlay backdrop (mobile sidebar) ── */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 98;
        }
        .sidebar-backdrop.open { display: block; }

        /* ── Medium screens: narrower sidebar ── */
        @media (max-width: 1024px) {
            .top-header { grid-template-columns: 180px 1fr 140px; }
            .app { grid-template-columns: 220px 1fr; }
        }

        /* ── Mobile: full-width workspace + slide-out drawer ── */
        @media (max-width: 767px) {
            html, body { overflow: auto; }

            .shell { grid-template-rows: 56px 1fr 30px; }

            .top-header {
                grid-template-columns: 40px 1fr auto;
                gap: 6px;
                padding: 0 8px;
            }
            .brand { display: none; }
            .mode-chip { display: none; }
            .menu-toggle { display: flex; }
            .header-title { font-size: clamp(1rem, 4vw, 1.4rem); }

            .app {
                grid-template-columns: 1fr;
                gap: 0;
                padding: 6px;
                overflow: auto;
            }

            /* Drawer */
            .sidebar {
                position: fixed;
                top: 56px;
                left: 0;
                width: min(280px, 85vw);
                height: calc(100dvh - 56px - 30px);
                z-index: 99;
                border-radius: 0 14px 14px 0;
                transform: translateX(-105%);
                transition: transform 0.25s cubic-bezier(.4,0,.2,1);
                overflow-y: auto;
            }
            .sidebar.drawer-open { transform: translateX(0); }

            .workspace {
                height: calc(100dvh - 56px - 30px - 12px);
                min-height: 0;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <header class="top-header">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation"><i class="fa-solid fa-bars"></i></button>
        <div class="brand"><i class="fa-solid fa-flask-vial"></i> Distribution Suite</div>
        <div class="header-title"><i class="fa-solid fa-chart-line"></i> Normal Distribution Calculator</div>
        <div class="mode-chip">Interactive Mode</div>
    </header>

    <div class="app">
        <aside class="sidebar">
            <h1>Distribution Calculators</h1>
            <p>Select a calculator to load it in the right panel.</p>
            <div class="dist-list">
                <details class="dist-group" open>
                    <summary>
                        <span class="summary-left"><i class="fa-solid fa-chart-line"></i> Continuous Distributions</span>
                        <i class="fa-solid fa-caret-right summary-caret"></i>
                    </summary>
                    <div class="dist-items">
                        <button class="dist-btn active" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/Normal.html">Normal Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/UniformDistribution.html">Uniform Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/ExponentialDistribution.html">Exponential Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/LogNormalDistribution.html">Log-Normal Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/WeibullDistribution.html">Weibull Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/BetaDistribution.html">Beta Distribution</button>
                    </div>
                </details>

                <details class="dist-group" open>
                    <summary>
                        <span class="summary-left"><i class="fa-solid fa-cubes"></i> Discrete Distributions</span>
                        <i class="fa-solid fa-caret-right summary-caret"></i>
                    </summary>
                    <div class="dist-items">
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/BinomialDistribution.html">Binomial Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/PoissonDistribution.html">Poisson Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/GeometricDistribution.html">Geometric Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/HypergeometricDistribution.html">Hypergeometric Distribution</button>
                    </div>
                </details>

                <details class="dist-group" open>
                    <summary>
                        <span class="summary-left"><i class="fa-solid fa-flask-vial"></i> H0 Testing Distributions</span>
                        <i class="fa-solid fa-caret-right summary-caret"></i>
                    </summary>
                    <div class="dist-items">
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/ChiSquare.html">Chi-Square Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/FDistribution.html">F Distribution</button>
                        <button class="dist-btn" data-src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/TDistribution.html">t Distribution</button>
                    </div>
                </details>
            </div>
        </aside>

        <section class="workspace">
            <iframe id="distFrame" src="https://avibenita.github.io/statistico-calculators/0Distribution_Calculators/statistical-distributions/Normal.html" title="Distribution calculator"></iframe>
        </section>
    </div>

    <footer class="footer">All rights reserved © Statistico</footer>
</div>

<script>
    (function () {
        var buttons = document.querySelectorAll(".dist-btn");
        var frame = document.getElementById("distFrame");
        var title = document.querySelector(".header-title");
        var sidebar = document.querySelector(".sidebar");
        var backdrop = document.getElementById("sidebarBackdrop");
        var menuToggle = document.getElementById("menuToggle");
        var cacheVersion = "20260422e";

        /* ── Mobile drawer ── */
        function openDrawer() {
            sidebar.classList.add("drawer-open");
            backdrop.classList.add("open");
        }
        function closeDrawer() {
            sidebar.classList.remove("drawer-open");
            backdrop.classList.remove("open");
        }
        menuToggle.addEventListener("click", function () {
            sidebar.classList.contains("drawer-open") ? closeDrawer() : openDrawer();
        });
        backdrop.addEventListener("click", closeDrawer);

        function withCacheVersion(url) {
            return url + (url.indexOf("?") >= 0 ? "&" : "?") + "v=" + cacheVersion;
        }

        function hideEmbeddedHeader() {
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (!doc) return;
                if (!doc.getElementById("shellHideHeaderStyle")) {
                    var style = doc.createElement("style");
                    style.id = "shellHideHeaderStyle";
                    style.textContent = ".header { display: none !important; }";
                    doc.head.appendChild(style);
                }
            } catch (e) {}
        }

        function applyNormalLayoutProfile() {
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (!doc) return;
                if (!doc.getElementById("shellNormalLayoutStyle")) {
                    var style = doc.createElement("style");
                    style.id = "shellNormalLayoutStyle";
                    style.textContent = [
                        /* Outer wrappers fill the shell iframe */
                        "html, body { width: 100% !important; height: 100% !important; overflow: auto !important; margin: 0 !important; }",
                        "#mainContentWrapper { width: 100% !important; max-width: none !important; height: auto !important; }",
                        ".container { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 10px !important; border-radius: 12px !important; box-sizing: border-box !important; }",

                        /* Force the correct two-column layout with named grid areas regardless of CDN load state */
                        ".main-content {",
                        "  display: grid !important;",
                        "  grid-template-columns: 1fr 2fr !important;",
                        "  grid-template-rows: auto auto !important;",
                        "  grid-template-areas: 'controlPanel resultHero' 'controlPanel vizPanel' !important;",
                        "  gap: 14px !important;",
                        "  align-items: start !important;",
                        "}",
                        ".result-hero      { grid-area: resultHero  !important; min-width: 0 !important; }",
                        ".control-panel    { grid-area: controlPanel !important; min-width: 0 !important; }",
                        ".visualization-panel { grid-area: vizPanel  !important; min-width: 0 !important; }",

                        /* At narrow iframe widths: single column (control panel first, then results, then viz) */
                        "@media (max-width: 860px) {",
                        "  .main-content {",
                        "    grid-template-columns: 1fr !important;",
                        "    grid-template-areas: 'controlPanel' 'resultHero' 'vizPanel' !important;",
                        "  }",
                        "  html, body { overflow-y: auto !important; }",
                        "}",

                        "@media (max-width: 600px) {",
                        "  .result-hero { flex-direction: column !important; }",
                        "  .result-hero-right { min-width: 0 !important; width: 100% !important; }",
                        "  .embedded-stats-grid { grid-template-columns: repeat(2, 1fr) !important; }",
                        "  .tabs { flex-wrap: wrap !important; }",
                        "}"
                    ].join("\n");
                    doc.head.appendChild(style);
                }

                var panels = doc.querySelectorAll("h3, h4, .panel-title");
                panels.forEach(function (el) {
                    var txt = (el.textContent || "").trim();
                    if (txt.indexOf("Input Panel") >= 0) {
                        el.textContent = "Inputs";
                    } else if (txt.indexOf("Results Panel - Visualizations & Statistics") >= 0) {
                        el.textContent = "Results";
                    }
                });
            } catch (e) {}
        }

        frame.addEventListener("load", function () {
            hideEmbeddedHeader();
            applyNormalLayoutProfile();
        });

        buttons.forEach(function (btn) {
            btn.addEventListener("click", function () {
                buttons.forEach(function (b) { b.classList.remove("active"); });
                btn.classList.add("active");
                frame.src = withCacheVersion(btn.getAttribute("data-src"));
                var label = btn.textContent.trim();
                title.innerHTML = '<i class="fa-solid fa-chart-line"></i> ' + label + ' Calculator';
                closeDrawer();
            });
        });

        var activeButton = document.querySelector(".dist-btn.active");
        if (activeButton) {
            frame.src = withCacheVersion(activeButton.getAttribute("data-src"));
        }

        hideEmbeddedHeader();
        applyNormalLayoutProfile();
    })();
</script>
</body>
</html>
