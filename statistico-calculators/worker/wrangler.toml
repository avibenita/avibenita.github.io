name = "statistico-ai"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace — create it first with:
#   npx wrangler kv:namespace create LICENSE_KV
# then paste the returned id below
[[kv_namespaces]]
binding = "LICENSE_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secret env var — set it with:
#   npx wrangler secret put GROQ_API_KEY
# (paste your Groq key when prompted — it is NEVER stored in this file)
