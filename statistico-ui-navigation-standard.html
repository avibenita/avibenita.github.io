<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Statistico™ Global Navigation Standard (Standalone)</title>
  <style>
    :root{
      --bg0:#070b12;
      --bg1:#0b1220;
      --stroke:rgba(255,255,255,.10);
      --stroke2:rgba(255,255,255,.14);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.70);
      --muted2:rgba(234,240,255,.52);

      --accent:#7c3aed;
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;

      --shadow: 0 18px 40px rgba(0,0,0,.45);
      --radius: 18px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(124,58,237,.22), transparent 55%),
        radial-gradient(900px 500px at 85% 0%, rgba(34,197,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 40%, var(--bg0));
    }

    .wrap{
      max-width:1200px;
      margin:28px auto;
      padding:0 18px 46px;
    }

    /* Header */
    .moduleHeader{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin-bottom:14px;
    }
    .titleBlock h1{
      margin:0;
      font-size:26px;
      letter-spacing:.4px;
      font-weight:900;
    }
    .titleBlock p{
      margin:6px 0 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      max-width:760px;
    }
    .headerActions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      border:1px solid var(--stroke2);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-weight:800;
      font-size:12px;
      letter-spacing:.2px;
      cursor:pointer;
      transition:transform .08s ease, background .2s ease, border-color .2s ease;
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }
    .btn:hover{background:rgba(255,255,255,.06); transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btnPrimary{
      border-color:rgba(124,58,237,.55);
      background:linear-gradient(180deg, rgba(124,58,237,.25), rgba(124,58,237,.12));
    }
    .btnOk{
      border-color:rgba(34,197,94,.5);
      background:linear-gradient(180deg, rgba(34,197,94,.18), rgba(34,197,94,.08));
    }
    .btnGhost{
      background:transparent;
      border-color:var(--stroke);
      color:var(--muted);
    }

    /* Primary workflow nav */
    .navBar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(10px);
      background:linear-gradient(180deg, rgba(7,11,18,.88), rgba(7,11,18,.55));
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding:10px;
      margin-bottom:14px;
    }
    .navRow{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:space-between;
    }
    .tabs{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
    }
    .tab{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid transparent;
      cursor:pointer;
      user-select:none;
      color:var(--muted);
      font-weight:800;
      font-size:12px;
      letter-spacing:.25px;
      transition: background .18s ease, border-color .18s ease, color .18s ease, transform .08s ease;
      position:relative;
      background:transparent;
    }
    .tab:hover{background:rgba(255,255,255,.05); color:var(--text)}
    .tab:active{transform:translateY(1px)}
    .tab svg{width:16px;height:16px;opacity:.9}
    .tabActive{
      background:linear-gradient(180deg, rgba(124,58,237,.22), rgba(124,58,237,.08));
      border-color:rgba(124,58,237,.42);
      color:var(--text);
    }
    .tabActive::after{
      content:"";
      position:absolute;
      left:12px; right:12px;
      bottom:-6px;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(124,58,237,.85), rgba(124,58,237,.15));
    }
    .tabDisabled{
      opacity:.38;
      cursor:not-allowed;
    }
    .tabDisabled:hover{background:transparent; color:var(--muted)}

    .badge{
      font-size:11px;
      font-weight:900;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--stroke2);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      margin-left:6px;
    }
    .badgeOk{border-color:rgba(34,197,94,.55); background:rgba(34,197,94,.12); color:rgba(207,255,227,.92)}
    .badgeWarn{border-color:rgba(245,158,11,.62); background:rgba(245,158,11,.12); color:rgba(255,231,191,.92)}
    .badgeAi{border-color:rgba(124,58,237,.6); background:rgba(124,58,237,.13); color:rgba(244,236,255,.95)}

    .navRight{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .select{
      border:1px solid var(--stroke2);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:9px 10px;
      border-radius:12px;
      font-weight:800;
      font-size:12px;
      outline:none;
    }

    /* Layout */
    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:14px;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHdr{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      border-bottom:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(16,26,46,.8), rgba(16,26,46,.35));
    }
    .cardHdr h2{
      margin:0;
      font-size:13px;
      font-weight:950;
      letter-spacing:.35px;
      text-transform:uppercase;
      color:rgba(234,240,255,.88);
    }
    .cardHdr .hint{
      font-size:12px;color:var(--muted2);font-weight:700
    }
    .cardBody{padding:14px}

    .kpis{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }
    @media (max-width: 980px){ .kpis{grid-template-columns:repeat(2,1fr)}}
    .kpi{
      padding:12px;
      border:1px solid var(--stroke);
      border-radius:14px;
      background:rgba(255,255,255,.03);
    }
    .kpi .t{font-size:11px;color:var(--muted2);font-weight:900;letter-spacing:.2px;text-transform:uppercase}
    .kpi .v{font-size:18px;font-weight:950;margin-top:6px}
    .kpi .s{font-size:12px;color:var(--muted);margin-top:4px;font-weight:700}

    /* Secondary nav */
    .subTabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:0 0 12px 0;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(14,24,48,.85);
      color:var(--muted);
      font-weight:900;
      font-size:12px;
      cursor:pointer;
      user-select:none;
      transition:background .18s ease, border-color .18s ease, color .18s ease;
    }
    .chip:hover{background:rgba(255,255,255,.05); color:var(--text)}
    .chipOn{
      background:linear-gradient(180deg, rgba(124,58,237,.18), rgba(124,58,237,.08));
      border-color:rgba(124,58,237,.4);
      color:var(--text);
    }

    .note{
      border-left:4px solid rgba(124,58,237,.55);
      background:rgba(124,58,237,.08);
      border-radius:14px;
      padding:12px 12px;
      color:rgba(244,236,255,.92);
      font-weight:750;
      font-size:13px;
      line-height:1.35;
    }
    .muted{color:var(--muted)}
    .divider{height:1px;background:var(--stroke); margin:12px 0}

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      padding:7px 10px;
      border:1px solid var(--stroke);
      border-radius:999px;
      background:rgba(255,255,255,.03);
      font-weight:900;
      font-size:12px;
      color:var(--muted);
    }
    .pill.ok{border-color:rgba(34,197,94,.55); background:rgba(34,197,94,.11); color:rgba(207,255,227,.92)}
    .pill.warn{border-color:rgba(245,158,11,.62); background:rgba(245,158,11,.11); color:rgba(255,231,191,.92)}

    .tbl{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border:1px solid var(--stroke);
      border-radius:14px;
      overflow:hidden;
      background:rgba(255,255,255,.02);
    }
    .tbl th, .tbl td{
      padding:10px 10px;
      border-bottom:1px solid var(--stroke);
      font-size:12px;
    }
    .tbl th{
      text-align:left;
      color:rgba(234,240,255,.85);
      font-weight:950;
      background:rgba(16,26,46,.50);
    }
    .tbl tr:last-child td{border-bottom:none}
    .right{text-align:right}

    .aiBox{
      border:1px solid rgba(124,58,237,.35);
      background:linear-gradient(180deg, rgba(124,58,237,.14), rgba(124,58,237,.06));
      border-radius:var(--radius);
      padding:14px;
    }
    .aiBox h3{
      margin:0 0 8px 0;
      font-size:13px;
      font-weight:950;
      letter-spacing:.3px;
      text-transform:uppercase;
    }
    textarea{
      width:100%;
      min-height:170px;
      resize:vertical;
      border-radius:14px;
      border:1px solid var(--stroke2);
      background:rgba(0,0,0,.18);
      color:var(--text);
      padding:12px;
      font-size:13px;
      line-height:1.35;
      outline:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="moduleHeader">
      <div class="titleBlock">
        <h1>Statistico™ Global UI Navigation Standard</h1>
        <p>
          Primary workflow tabs (top bar with icons) + secondary pill tabs inside a page.
          Demo includes tab-gating and an AI Interpretation step.
        </p>
      </div>
      <div class="headerActions">
        <button class="btn btnGhost" id="btnReset">Reset demo</button>
        <button class="btn btnOk" id="btnSimData"><span>✓</span>Simulate “Data Loaded”</button>
        <button class="btn btnPrimary" id="btnSimSig"><span>⚡</span>Toggle “Omnibus Significant”</button>
      </div>
    </div>

    <div class="navBar">
      <div class="navRow">
        <div class="tabs" id="workflowTabs"></div>
        <div class="navRight">
          <span class="pill warn" id="pillState">State: no data</span>
          <label class="small">Decimals</label>
          <select class="select" id="decimals">
            <option>2</option><option>3</option><option>4</option>
          </select>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="cardHdr">
          <h2 id="pageTitle">Explore</h2>
          <div class="hint" id="pageHint">Start with descriptives and data quality.</div>
        </div>
        <div class="cardBody" id="pageBody"></div>
      </div>

      <div class="card">
        <div class="cardHdr">
          <h2>Advisor & Gating</h2>
          <div class="hint">Why tabs enable/disable</div>
        </div>
        <div class="cardBody" id="advisorBody"></div>
      </div>
    </div>
  </div>

<script>
  const icons = {
    explore: `<svg viewBox="0 0 24 24" fill="none"><path d="M4 19V5m0 14h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 16l3-4 3 2 4-6 2 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    traj: `<svg viewBox="0 0 24 24" fill="none"><path d="M4 18V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M6 14c4-6 8 6 12-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
    shield: `<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l8 4v6c0 5-3.5 8-8 8s-8-3-8-8V7l8-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`,
    results: `<svg viewBox="0 0 24 24" fill="none"><path d="M6 7h12M6 12h12M6 17h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
    posthoc: `<svg viewBox="0 0 24 24" fill="none"><path d="M7 7h10M7 12h6M7 17h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17 10l3 2-3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    effects: `<svg viewBox="0 0 24 24" fill="none"><path d="M7 17V9m5 8V6m5 11v-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
    power: `<svg viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`,
    ai: `<svg viewBox="0 0 24 24" fill="none"><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2"/><path d="M6 7h12a2 2 0 012 2v9a3 3 0 01-3 3H7a3 3 0 01-3-3V9a2 2 0 012-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 12h6M9 15h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
    report: `<svg viewBox="0 0 24 24" fill="none"><path d="M7 3h7l3 3v15a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="currentColor" stroke-width="2"/><path d="M14 3v4h4" stroke="currentColor" stroke-width="2"/><path d="M8 12h8M8 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
  };

  const workflow = [
    { id:"explore", label:"Explore", icon:icons.explore, hint:"Start with descriptives and data quality." },
    { id:"trajectories", label:"Trajectories", icon:icons.traj, hint:"Inspect subject-level patterns and within-subject correlation." },
    { id:"assumptions", label:"Assumptions", icon:icons.shield, hint:"Validate sphericity/missingness and decide the correct model." },
    { id:"results", label:"Results", icon:icons.results, hint:"Omnibus inference: RM-ANOVA / Friedman / Mixed Model." },
    { id:"posthoc", label:"Post-hoc", icon:icons.posthoc, hint:"Where differences occur with correction." },
    { id:"effects", label:"Effects", icon:icons.effects, hint:"Practical magnitude: η², f, Kendall’s W, ICC, etc." },
    { id:"power", label:"Power", icon:icons.power, hint:"Observed + planning power (with cautions)." },
    { id:"ai", label:"AI Interpretation", icon:icons.ai, hint:"Unified narrative." },
    { id:"report", label:"Report", icon:icons.report, hint:"APA-ready report + export." }
  ];

  const state = { dataLoaded:false, omnibusSignificant:true, assumptionsOk:true };
  let active = "explore";

  const els = {
    tabs: document.getElementById("workflowTabs"),
    title: document.getElementById("pageTitle"),
    hint: document.getElementById("pageHint"),
    body: document.getElementById("pageBody"),
    advisor: document.getElementById("advisorBody"),
    pill: document.getElementById("pillState"),
  };

  function computeGating(){
    return {
      explore: true,
      trajectories: state.dataLoaded,
      assumptions: state.dataLoaded,
      results: state.dataLoaded,
      posthoc: state.dataLoaded && state.omnibusSignificant,
      effects: state.dataLoaded,
      power: state.dataLoaded,
      ai: state.dataLoaded,
      report: state.dataLoaded
    };
  }

  function badgeFor(tabId){
    if(tabId==="assumptions"){
      return state.dataLoaded
        ? (state.assumptionsOk ? `<span class="badge badgeOk">OK</span>` : `<span class="badge badgeWarn">WARN</span>`)
        : "";
    }
    if(tabId==="posthoc"){
      if(!state.dataLoaded) return "";
      return state.omnibusSignificant ? `<span class="badge badgeOk">ON</span>` : `<span class="badge">OFF</span>`;
    }
    if(tabId==="ai"){
      return state.dataLoaded ? `<span class="badge badgeAi">AI</span>` : "";
    }
    return "";
  }

  function setPillState(){
    if(!state.dataLoaded){
      els.pill.textContent = "State: no data";
      els.pill.className = "pill warn";
      return;
    }
    if(!state.assumptionsOk){
      els.pill.textContent = "State: assumption warning";
      els.pill.className = "pill warn";
      return;
    }
    if(!state.omnibusSignificant){
      els.pill.textContent = "State: omnibus n.s.";
      els.pill.className = "pill";
      return;
    }
    els.pill.textContent = "State: clean";
    els.pill.className = "pill ok";
  }

  function renderTabs(){
    const gate = computeGating();
    els.tabs.innerHTML = "";
    workflow.forEach(w=>{
      const enabled = !!gate[w.id];
      const btn = document.createElement("div");
      btn.className = "tab" + (w.id===active ? " tabActive":"") + (!enabled ? " tabDisabled":"");
      btn.innerHTML = `${w.icon}<span>${w.label}</span>${badgeFor(w.id)}`;
      btn.title = enabled ? w.hint : "Disabled until prerequisites are met.";
      btn.onclick = ()=>{ if(enabled){ active = w.id; render(); } };
      els.tabs.appendChild(btn);
    });
  }

  function explainGate(id){
    if(id==="explore") return "Always available.";
    if(!state.dataLoaded) return "Requires data (descriptives computed).";
    if(id==="posthoc") return state.omnibusSignificant ? "Enabled because omnibus is significant." : "Disabled because omnibus is not significant.";
    return "Enabled because upstream prerequisites are satisfied.";
  }

  function renderAdvisor(){
    const gate = computeGating();
    els.advisor.innerHTML = `
      <div class="note"><b>Global standard:</b> workflow tabs at the top; pill tabs only inside a page. Disable Post-hoc when omnibus is not significant (unless explicitly “Exploratory”).</div>
      <div class="divider"></div>
      <div class="row">
        <span class="pill ${state.dataLoaded?'ok':'warn'}">Data loaded: ${state.dataLoaded ? "Yes":"No"}</span>
        <span class="pill ${state.assumptionsOk?'ok':'warn'}">Assumptions: ${state.assumptionsOk ? "OK":"Warn"}</span>
        <span class="pill ${state.omnibusSignificant?'ok':''}">Omnibus: ${state.omnibusSignificant ? "Significant":"n.s."}</span>
      </div>
      <div class="divider"></div>
      <table class="tbl">
        <thead><tr><th>Tab</th><th class="right">Enabled</th><th>Reason</th></tr></thead>
        <tbody>
          ${workflow.map(w=>{
            const enabled = gate[w.id];
            return `<tr><td><b>${w.label}</b></td><td class="right">${enabled ? "✓":"—"}</td><td class="muted">${explainGate(w.id)}</td></tr>`;
          }).join("")}
        </tbody>
      </table>
    `;
  }

  function pageContent(id){
    if(id==="explore"){
      const omni = state.dataLoaded ? (state.omnibusSignificant ? "<span style='color:rgba(207,255,227,.92)'>p&lt;.001</span>" : "p=.23") : "—";
      return `
        <div class="kpis">
          <div class="kpi"><div class="t">Design</div><div class="v">RM (3+)</div><div class="s">Within-subject factor: Time</div></div>
          <div class="kpi"><div class="t">Subjects</div><div class="v">${state.dataLoaded? "20":"—"}</div><div class="s">Complete cases</div></div>
          <div class="kpi"><div class="t">Missing</div><div class="v">${state.dataLoaded? "0":"—"}</div><div class="s">Listwise in RM-ANOVA</div></div>
          <div class="kpi"><div class="t">Omnibus</div><div class="v">${omni}</div><div class="s">Demo value</div></div>
        </div>
        <div class="divider"></div>
        <div class="note"><b>Onload standard:</b> land on Explore (never Results). Show design + N + missing + “eligibility” signals.</div>
      `;
    }
    if(id==="results"){
      return `
        <div class="subTabs">
          <div class="chip chipOn" data-sub="omnibus">Omnibus</div>
          <div class="chip" data-sub="robust">Robust/Alt</div>
          <div class="chip" data-sub="notes">Notes</div>
        </div>
        <div id="subPanel"></div>
      `;
    }
    if(id==="ai"){
      return `
        <div class="aiBox">
          <h3>AI Interpretation</h3>
          <div class="small">Button lives inside the AI tab (AI is first-class, but action is local).</div>
          <div class="divider"></div>
          <button class="btn btnPrimary" id="btnGenAi">AI Interpret</button>
          <div class="divider"></div>
          <textarea id="aiOut" placeholder="Click AI Interpret to generate a demo narrative..."></textarea>
        </div>
      `;
    }
    return `<div class="note">Demo content for <b>${id}</b> (keep this page focused; push details into sub-tabs / panels).</div>`;
  }

  function mountSubtabsIfNeeded(){
    if(active !== "results") return;
    const chips = Array.from(document.querySelectorAll(".chip"));
    const panel = document.getElementById("subPanel");
    if(!chips.length || !panel) return;

    function render(sub){
      chips.forEach(c => c.classList.toggle("chipOn", c.dataset.sub === sub));
      if(sub === "omnibus"){
        panel.innerHTML = `
          <div class="note"><b>Omnibus (demo):</b> F(2,38)=12.34, p<.001 (RM-ANOVA). Friedman χ²(2)=18.90, p<.001.</div>
          <div class="divider"></div>
          <table class="tbl">
            <thead><tr><th>Model</th><th class="right">Statistic</th><th class="right">df</th><th class="right">p</th></tr></thead>
            <tbody>
              <tr><td>RM-ANOVA</td><td class="right">12.34</td><td class="right">2, 38</td><td class="right">&lt;.001</td></tr>
              <tr><td>Friedman</td><td class="right">18.90</td><td class="right">2</td><td class="right">&lt;.001</td></tr>
            </tbody>
          </table>
        `;
      } else if(sub === "robust"){
        panel.innerHTML = `<div class="note"><b>Robust:</b> If missing exists, recommend Auto-Mixed Model (random intercept per subject). Random slopes are advanced.</div>`;
      } else {
        panel.innerHTML = `<div class="note"><b>Rule:</b> Enable Post-hoc only if omnibus is significant (unless user opts into exploratory mode).</div>`;
      }
    }

    chips.forEach(c => c.onclick = () => render(c.dataset.sub));
    render("omnibus");
  }

  function mountAiButtonIfNeeded(){
    if(active !== "ai") return;
    const btn = document.getElementById("btnGenAi");
    const out = document.getElementById("aiOut");
    if(!btn || !out) return;
    btn.onclick = () => {
      out.value = "Unified narrative (demo): design → assumptions → omnibus → post-hoc (if enabled) → effect sizes → power note.";
    };
  }

  function render(){
    setPillState();
    renderTabs();

    const meta = workflow.find(w => w.id === active);
    els.title.textContent = meta.label;
    els.hint.textContent = meta.hint;

    els.body.innerHTML = pageContent(active);
    renderAdvisor();

    mountSubtabsIfNeeded();
    mountAiButtonIfNeeded();
  }

  document.getElementById("btnReset").onclick = () => {
    state.dataLoaded = false;
    state.omnibusSignificant = true;
    state.assumptionsOk = true;
    active = "explore";
    render();
  };
  document.getElementById("btnSimData").onclick = () => { state.dataLoaded = true; render(); };
  document.getElementById("btnSimSig").onclick = () => {
    state.omnibusSignificant = !state.omnibusSignificant;
    if(active === "posthoc" && !computeGating().posthoc) active = "results";
    render();
  };

  render();
</script>
</body>
</html>
