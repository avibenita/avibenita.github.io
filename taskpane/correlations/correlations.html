<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Correlation Analysis - Statistico Analytics</title>
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  
  <!-- Shared Styles -->
  <link rel="stylesheet" href="../../src/shared/css/taskpane-light.css">
  <link rel="stylesheet" href="../../src/shared/css/data-input-panel.css">

  <style>
    .controls-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 14px;
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }
    .controls-container > div > .saved-analyses-panel,
    .controls-container > div > .panel-section,
    .controls-container > div > [class$="-panel"] { margin-bottom: 0 !important; }
  </style>
</head>

<body>
  <div class="taskpane-container">
    <!-- Header -->
    <div class="module-header">
      <div class="module-header-title">
        <i class="fa-solid fa-chart-line"></i>
        Correlation Analysis
      </div>
      <button class="back-btn" onclick="goBack()">
        <i class="fa-solid fa-arrow-left"></i>
        Back
      </button>
    </div>
    
    <!-- Main Content -->
    <div class="taskpane-content">
      <div class="controls-container">
        <!-- Shared Data Range Selection Component -->
        <div id="dataInputPanelContainer"></div>
        <!-- Correlation-Specific Column Selection Component -->
        <div id="correlationInputPanelContainer"></div>
      </div>
    </div>
  </div>
  
  <!-- Scripts -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  
  <!-- Shared Data Input Panel -->
  <script src="../../src/shared/js/components/DataInputPanel.js"></script>
  
  <!-- Correlation Input Panel Logic -->
  <script src="correlation-input-panel.js"></script>
  
  <script>
    // Go back to hub
    function goBack() {
      window.location.href = '../hub.html';
    }
    
    // Initialize when Office is ready
    Office.onReady((info) => {
      if (info.host === Office.HostType.Excel) {
        console.log('Correlation Analysis Module Loaded');
        
        // Load shared data input panel HTML
        fetch('../../src/shared/components/data-input-panel.html')
          .then(response => response.text())
          .then(html => {
            document.getElementById('dataInputPanelContainer').innerHTML = html;
            // Initialize the shared data input panel
            initDataInputPanel();
          })
          .catch(error => console.error('Error loading data input panel:', error));
        
        // Load correlation input panel HTML
        fetch('correlation-input-panel.html')
          .then(response => response.text())
          .then(html => {
            document.getElementById('correlationInputPanelContainer').innerHTML = html;
          })
          .catch(error => console.error('Error loading correlation input panel:', error));
      }
    });
  </script>
  
</body>
</html>
