<!-- PCA Input Panel -->
<style>
  .pca-panel {
    margin-top: 0;
    padding: 14px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
  }
  .pca-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 10px;
    color: #374151;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pca-summary {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 10px;
  }
  .pca-summary span {
    display: inline-block;
    margin-right: 12px;
  }
  .pca-actions {
    display: flex;
    gap: 8px;
  }
  .pca-btn {
    flex: 1;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pca-btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
  }
  .pca-btn-secondary {
    flex: 0 0 auto;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
  }
  .pca-btn-secondary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .pca-note {
    margin-top: 8px;
    font-size: 12px;
    color: #5b21b6;
    background: #f5f3ff;
    border: 1px solid #ddd6fe;
    border-radius: 6px;
    padding: 8px 10px;
  }
</style>

<div id="pcaPanel" class="pca-panel" style="display:none;">
  <div class="pca-title">
    <i class="fa-solid fa-circle-nodes"></i>
    PCA Setup
  </div>
  <div class="pca-summary">
    <span>Range: <strong id="pcaRange">—</strong></span>
    <span>Rows: <strong id="pcaRows">0</strong></span>
    <span>Columns: <strong id="pcaCols">0</strong></span>
  </div>
  <div class="pca-actions">
    <button id="openPcaModelBuilder" class="pca-btn" onclick="openPcaModelBuilder()" disabled>
      <i class="fa-solid fa-up-right-from-square"></i>
      Open PCA Builder
    </button>
    <button id="resetPcaModelBtn" class="pca-btn-secondary" onclick="resetPcaModel()" style="display:none;">
      <i class="fa-solid fa-rotate-left"></i>
      Reset
    </button>
  </div>
  <div class="pca-note">
    Choose variables in the popup, then open the PCA dashboard.
  </div>
</div>
