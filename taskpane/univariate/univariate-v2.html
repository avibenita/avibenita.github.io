  <script>
    function goBack() { window.location.href = '../hub.html'; }
    Office.onReady((info) => {
      if (info.host !== Office.HostType.Excel) return;
      fetch('../../src/shared/components/data-input-panel.html')
        .then(r => r.text()).then(html => {
          document.getElementById('dataInputPanelContainer').innerHTML = html;
          initDataInputPanel();
        });
      fetch('univariate-input-panel.html?v=2.0.0')
        .then(r => r.text()).then(html => {
          document.getElementById('univariateInputPanelContainer').innerHTML = html;
        });
    });
  </script>
